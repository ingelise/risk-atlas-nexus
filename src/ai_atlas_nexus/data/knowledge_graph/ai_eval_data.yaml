  - id: ai_eval_WMDP
    name: Weapons of Mass Destruction Proxy (WMDP)
    description: >-
      The Weapons of Mass Destruction Proxy (WMDP) benchmark is a dataset of 3,668 multiple-choice questions surrounding
      hazardous knowledge inBiosecurity Iconbiosecurity,Cybersecurity Iconcybersecurity, and Chemical Security Iconchemical
      security. WMDP serves as both a proxy evaluation for hazardous knowledge in large language models (LLMs) and a
      benchmark for unlearning methods to remove such knowledge.
    url: https://github.com/centerforaisafety/wmdp
    hasDocumentation:
      - https://arxiv.org/abs/2403.03218
    hasDataset:
      - cais/wmdp
