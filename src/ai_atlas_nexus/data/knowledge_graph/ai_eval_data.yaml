  - id: ai_eval_Prompt_Injection
    name: Prompt Injection
    description: >-
      A benchmark to assess an LLM’s susceptibility to “prompt injection attacks” - attacks in which a portion of the LLM
      prompt coming from untrusted user input contains malicious instructions intended to override the LLM’s original task.
    url: "https://github.com/meta-llama/PurpleLlama/tree/main/CybersecurityBenchmarks"
