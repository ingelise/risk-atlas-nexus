  - id: ai_eval_CTI-Bench
    name: CTI-Bench
    description: >-
      CTIBench is a comprehensive suite of benchmark tasks and datasets designed to evaluate Large Language Models (LLMs) in
      the field of Cyber Threat Intelligence (CTI).
    url: "https://github.com/xashru/cti-bench"
    hasDocumentation:
