    name: CRUXEval-O
    description: >-
      CRUXEval (Code Reasoning, Understanding, and eXecution Evaluation) is a benchmark consisting of 800 Python functions
      (3-13 lines of code). CRUXEval-O specifically evaluates language models on their ability to predict code output and
      understand code semantics.
    url: "https://huggingface.co/datasets/cruxeval-org/cruxeval"
    hasDataset:
      - cruxeval-org/cruxeval
    hasTasks:
      - code-generation
      - code-understanding
      - code-execution
  - id: ai_eval_bigcodebench
    name: BigCodeBench
    description: >-
      BigCodeBench is a comprehensive benchmark for evaluating code generation towards AGI, specifically designed to
      benchmark code generation with diverse function calls and complex instructions. It consists of 1,140 questions covering
      various programming tasks.
    url: "https://huggingface.co/datasets/bigcode/bigcodebench"
    hasDataset:
      - bigcode/bigcodebench
    hasTasks:
      - code-generation
      - program-synthesis
      - function-calling
  - id: ai_eval_multiple
    name: MULTIPLE
    description: >-
      MULTIPLE is a multi-programming language benchmark designed to evaluate code generation capabilities of language models
      across multiple programming languages and diverse programming tasks.
    url: "https://github.com/nuprl/MultiPL-E"
    hasTasks:
      - code-generation
      - program-synthesis
      - multi-language
  - id: ai_eval_bfcl_v3
    name: BFCL v3
    description: >-
      Berkeley Function Calling Leaderboard (BFCL) V3 evaluates language models on their ability to understand and call
      functions across diverse scenarios including missing parameters and multi-turn function calling. It is a key benchmark
      for tool use and agent capabilities.
    url: "https://huggingface.co/datasets/gorilla-llm/Berkeley-Function-Calling-Leaderboard"
    hasDataset:
      - gorilla-llm/Berkeley-Function-Calling-Leaderboard
    hasTasks:
      - function-calling
      - multi-turn
  - id: ai_eval_salad_bench
    name: SALAD-Bench
    description: >-
      SALAD-Bench is a challenging safety benchmark specifically designed for evaluating LLMs, attack, and defense methods.
      It features a hierarchical taxonomy with three levels and includes questions in standard format as well as with attack
      and defense modifications.
    url: "https://github.com/OpenSafetyLab/SALAD-BENCH"
    hasTasks:
      - safety-evaluation
      - toxicity-detection
      - adversarial-robustness
  - id: ai_eval_attaq
    name: AttaQ
    description: >-
      AttaQ (AttaQ red teaming dataset) consists of 1,402 carefully crafted adversarial questions designed to assess the
      tendency of Large Language Models to generate harmful or undesirable responses. It is categorized into seven distinct
      classes: deception, discrimination, harmful information, substance abuse, sexual content, personally identifiable
      information (PII), and violence.
    url: "https://huggingface.co/datasets/ibm-research/AttaQ"
    hasTasks:
      - safety-evaluation
      - adversarial-robustness
      - red-teaming
  - id: ai_eval_tulu3_safety
    name: Tulu3 Safety Eval
    description: >-
      Tulu3 Safety Evaluation is a comprehensive benchmark for assessing the safety and alignment of language models. It
      evaluates models on their robustness and appropriate handling of diverse safety-related prompts and scenarios.
    url: "https://github.com/allenai/tulu"
    hasTasks:
      - safety-evaluation
      - alignment
      - instruction-following
