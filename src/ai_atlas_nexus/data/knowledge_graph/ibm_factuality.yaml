documents:
  - id: arxiv.org/2504.11704
    name: A Library of LLM Intrinsics for Retrieval-Augmented Generation
    description: >-
      In the developer community for large language models (LLMs), there is not yet a clean pattern analogous to a software
      library, to support very large scale collaboration. Even for the commonplace use case of Retrieval-Augmented Generation
      (RAG), it is not currently possible to write a RAG application against a well-defined set of APIs that are agreed upon
      by different LLM providers. Inspired by the idea of compiler intrinsics, we propose some elements of such a concept
      through introducing a library of LLM Intrinsics for RAG. An LLM intrinsic is defined as a capability that can be
      invoked through a well-defined API that is reasonably stable and independent of how the LLM intrinsic itself is
      implemented. The intrinsics in our library are released as LoRA adapters on HuggingFace, and through a software
      interface with clear structured input/output characteristics on top of vLLM as an inference platform, accompanied in
      both places with documentation and code. This article describes the intended usage, training details, and evaluations
      for each intrinsic, as well as compositions of multiple intrinsics.
    author: >-
      Marina Danilevsky, Kristjan Greenewald, Chulaka Gunasekara, Maeda Hanafi, Lihong He, Yannis Katsis, Krishnateja
      Killamsetty, Yulong Li, Yatin Nandwani, Lucian Popa, Dinesh Raghu, Frederick Reiss, Vraj Shah, Khoi-Nguyen Tran, Huaiyu
      Zhu, Luis Lastras
    url: https://arxiv.org/abs/2504.11704
    hasLicense: license-cc-by-4.0
    dateCreated: 2025-07-20
  - id: arxiv.org/2504.12397
    name: "Activated LoRA: Fine-tuned LLMs for Intrinsics"
    author: >-
      Kristjan Greenewald, Luis Lastras, Thomas Parnell, Vraj Shah, Lucian Popa, Giulio Zizzo, Chulaka Gunasekara, Ambrish
      Rawat, David Cox
    description: >-
      Low-Rank Adaptation (LoRA) has emerged as a highly efficient framework for finetuning the weights of large foundation
      models, and has become the go-to method for data-driven customization of LLMs. Despite the promise of highly customized
      behaviors and capabilities, switching between relevant LoRAs in a multiturn setting is inefficient, as the key-value
      (KV) cache of the entire turn history must be recomputed with the LoRA weights before generation can begin. To address
      this problem, we propose Activated LoRA (aLoRA), an adapter architecture which modifies the LoRA framework to only
      adapt weights for the tokens in the sequence \emph{after} the aLoRA is invoked. This change crucially allows aLoRA to
      accept the base model's KV cache of the input string, meaning that aLoRA can be instantly activated whenever needed in
      a chain without recomputing the cache. This enables building what we call \emph{intrinsics}, i.e. specialized models
      invoked to perform well-defined operations on portions of an input chain or conversation that otherwise uses the base
      model by default. We train a set of aLoRA-based intrinsics models, demonstrating competitive accuracy with standard
      LoRA while achieving significant inference benefits.
    url: https://arxiv.org/abs/2504.12397
    hasLicense: license-cc-by-4.0
    dateCreated: 2025-05-10
  - id: arxiv.org/2409.15398
    name: "Attack Atlas: A Practitioner's Perspective on Challenges and Pitfalls in Red Teaming GenAI"
    author: >-
      Ambrish Rawat, Stefan Schoepf, Giulio Zizzo, Giandomenico Cornacchia, Muhammad Zaid Hameed, Kieran Fraser, Erik
      Miehling, Beat Buesser, Elizabeth M. Daly, Mark Purcell, Prasanna Sattigeri, Pin-Yu Chen, Kush R. Varshney
    description: >-
      As generative AI, particularly large language models (LLMs), become increasingly integrated into production
      applications, new attack surfaces and vulnerabilities emerge and put a focus on adversarial threats in natural language
      and multi-modal systems. Red-teaming has gained importance in proactively identifying weaknesses in these systems,
      while blue-teaming works to protect against such adversarial attacks. Despite growing academic interest in adversarial
      risks for generative AI, there is limited guidance tailored for practitioners to assess and mitigate these challenges
      in real-world environments. To address this, our contributions include: (1) a practical examination
       of red- and blue-teaming strategies for securing generative AI, (2) identification of key challenges and open
       questions in defense development and evaluation, and (3) the Attack Atlas, an intuitive framework that brings a
       practical approach to analyzing single-turn input attacks, placing it at the forefront for practitioners. This work
        aims to bridge the gap between academic insights and practical security measures for the protection of generative
        AI systems.
    url: https://arxiv.org/abs/2409.15398
    hasLicense: license-cc-by-4.0
    dateCreated: 2024-09-23

