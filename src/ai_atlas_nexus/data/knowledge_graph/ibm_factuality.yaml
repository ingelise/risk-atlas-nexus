llmintrinsics:
  - id: ibm-factuality-intrinsic-qr
    name: Query Rewrite (QR)
    description: >-
      Given a conversation ending with a user query, QR will decontextualize that last user query by rewriting it (whenever
      necessary) into an equivalent version that is standalone and can be understood by itself. While this adapter is general
      purpose for any multi-turn conversation, it is especially effective in RAG settings where its ability to rewrite a user
      query into a standalone version directly improves the retriever performance, which in turn improves the answer
      generation performance. This is a pre-retrieval intrinsic since its suggested use is before invoking retrieval.
    isDefinedByVocabulary: ibm-factuality
    hasAdapter:
      - ibm-factuality-adapter-granite-3.3-8b-instruct-lora-query-rewrite
      - ibm-factuality-adapter-granite-3.2-8b-instruct-alora-query-rewrite
    hasDocumentation:
      - arxiv.org/2504.11704
    hasRelatedRisk:
      - granite-relevance
  - id: ibm-factuality-intrinsic-qe
    name: Query Expansion (QE)
    description: >-
      Given a conversation ending with a user query, QE is designed to probe the retriever from multiple angles by generating
      a set of semantically diverse versions of that last user query. This expanded set of queries provides diverse retrieval
      paths, and thus this intrinsic is particularly effective in RAG settings, especially with terse, general, or
      underspecified queries. Like Query Rewrite, this is a pre-retrieval intrinsic.
    isDefinedByVocabulary: ibm-factuality
    hasAdapter:
      - ibm-factuality-adapter-granite-3.3-8b-instruct-lora-query-expansion
    hasDocumentation:
      - arxiv.org/2504.11704
    hasRelatedRisk:
      - granite-relevance
  - id: ibm-factuality-intrinsic-cr
    name: Context Relevance (CR).
    description:
      Given a conversation ending with a user query, and an individual passage, CR classifies whether the passage is
      relevant, partially relevant, or irrelevant for answering the last user query or if the passage may instead mislead or
      harm the downstream generator model's response quality. This is a pre-generation intrinsic.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapter:
      - ibm-factuality-adapter-granite-3.3-8b-instruct-lora-context-relevance
    hasRelatedRisk:
      - granite-relevance
  - id: ibm-factuality-intrinsic-ad
    name: Answerability Determination (AD)
    description: >-
      Given a conversation ending with a user query, and a set of passages, AD classifies whether that final user query is
      answerable or unanswerable based on the available information in the passages. It is valuable for restraining
      over-eager models by identifying unanswerable queries and prevent the generation of hallucinated responses. It can also
      be used to indicate that the system should re-query the retriever with alternate formulations, to fetch more relevant
      passages. This is a pre-generation intrinsic.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - arxiv.org/2504.11704
    hasRelatedRisk:
      - granite-relevance
      - atlas-hallucination
      - atlas-over-or-under-reliance
    hasAdapter:
      - ibm-factuality-adapter-granite-3.3-8b-instruct-lora-answerability-determination
      - ibm-factuality-adapter-granite-3.2-8b-instruct-alora-answerability-classification
  - id: ibm-factuality-intrinsic-prr
    name: Passage Reranking (PRR)
    description: >-
      Given a conversation ending with a user query, and a set of passages, PRR returns a ranked list of the passages ordered
      by suitability to answering the query. If the number of passages is small (< 10) all passages are compared pairwise and
      returned ranked by win count; otherwise a tournament algorithm is used. This is a pre-generation intrinsic.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapter:
      - ibm-factuality-adapter-granite-3.3-instruct-lora-passage-reranking
    hasRelatedRisk:
      - granite-relevance
      - atlas-hallucination
  - id: ibm-factualityintrinsic-uq
    name: Uncertainty Quantification (UQ)
    description: >-
      Given a conversation ending with an assistant response, UQ calculates a certainty percentage to reflect how ertain it
      is about the answer generated to the previous user query. UQ can also take as input a conversation ending with an user
      query and predicting the certainty score based solely on the query, prior to generating an answer. UQ is also
      calibrated on document-based question answering datasets, and hence it can be applied to giving certainty scores for
      RAG responses created using grounding passages. This intrinsic could be used in a post-generation or pre-generation
      step.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapter:
      - ibm-factuality-adapter-granite-3.3-8b-instruct-lora-uncertainty
      - ibm-factuality-adapter-granite-3.3-8b-instruct-lora-uncertainty-quantification
      - ibm-factuality-adapter-granite-3.3-8b-instruct-alora-uncertainty
      - ibm-factuality-adapter-granite-3.2-8b-instruct-alora-uncertainty
    hasRelatedRisk:
      - atlas-poor-model-accuracy
      - nist-information-integrity
  - id: ibm-factuality-intrinsic-hd
    name: Hallucination Detection (HD)
    description: >-
      Given a conversation ending with an assistant response, and a set of passages, HD outputs a hallucination risk for each
      sentence in the last assistant response, with respect to the set of passages. It could be used in concert with sampling
      techniques that yield multiple generated responses, some of which could then be filtered according to their
      hallucination risks. This is a post-generation intrinsic since its expected use is after invoking the LLM to create the
      response.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapter:
      - ibm-factuality-adapter-granite-3.3-8b-instruct-lora-hallucination-detection
    hasRelatedRisk:
      - atlas-hallucination
      - atlas-function-calling-hallucination-agentic
      - nist-confabulation
      - llm092025-misinformation
      - credo-risk-021
      - granite-function-call
  - id: ibm-factuality-intrinsic-cg
    name: Citation Generation (CG)
    description: >-
      Given a conversation ending with an assistant response, and a set of passages, CG generates citations for that last
      assistant response from the provided passages. Citations are generated for each sentence in the response (when
      available), where each citation consists of a set of sentences from the supporting passages. This is a post-generation
      intrinsic since its expected use is after invoking the LLM, and therefore can be used to create citations for responses
      generated by any model.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapter:
      - ibm-factuality-adapter-granite-3.3-8b-instruct-lora-citation-generation
    hasRelatedRisk:
      - granite-relevance
      - atlas-hallucination
      - atlas-over-or-under-reliance
  - id: ibm-factuality-intrinsic-jailbreak
    name: Jailbreak Detection
    description: >-
      This intrinsic is designed for detecting jailbreak risk within user prompts. Prompts with jailbreak risk vary across a
      wide range of attack styles - from direct instructions, to encoding-style, social-hacking based attacks and even ones
      that exploit special token or context overload (Rawat et al., 2024). isDefinedByVocabulary: ibm-factuality
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - arxiv.org/2504.12397
    hasAdapter:
      - ibm-factuality-adapter-granite-3.2-8b-instruct-alora-jailbreak
    hasRelatedRisk:
      - atlas-jailbreaking
      - nist-information-security
      - llm052025-improper-output-handling
  - id: ibm-factuality-intrinsic-guardian-core
    name: Guardian Core
    description: >-
      Guardian Core judges whether input prompts and output responses meet specified criteria including safety risks (harm,
      jailbreaking, profanity, violence, sexual content, social bias, unethical behavior), hallucinations related to
      tool/function calls, and retrieval-augmented generation (RAG) in agent-based systems. It outputs a JSON object with a
      score field indicating "yes" or "no". This intrinsic can be applied to both input prompts and generated responses.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - granite-4.1-blog
    hasAdapter:
      - ibm-factuality-adapter-granitelib-guardian-r1.0-guardian-core
    hasRelatedRisk:
      - atlas-harmful-output
      - atlas-jailbreaking
      - atlas-function-calling-hallucination-agentic
  - id: ibm-factuality-intrinsic-factuality-detection
    name: Factuality Detection
    description: >-
      Factuality Detection assesses the factual correctness of LLM-generated responses by evaluating them against provided
      context sources. It identifies conflicts, misrepresentations, or selective omissions of evidence, helping ensure that
      responses are grounded in and consistent with the provided information. This is a post-generation intrinsic.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - granite-4.1-blog
    hasAdapter:
      - ibm-factuality-adapter-granitelib-guardian-r1.0-factuality-detection
    hasRelatedRisk:
      - atlas-hallucination
      - nist-confabulation
      - nist-information-integrity
  - id: ibm-factuality-intrinsic-factuality-correction
    name: Factuality Correction
    description: >-
      Factuality Correction corrects factually incorrect responses by accounting for contextual passages with conflicting
      information. It corrects inaccuracies in long-form responses while preserving the model's capabilities and maintaining
      overall response quality and coherence. This is a post-generation intrinsic.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - granite-4.1-blog
    hasAdapter:
      - ibm-factuality-adapter-granitelib-guardian-r1.0-factuality-correction
    hasRelatedRisk:
      - atlas-hallucination
      - nist-confabulation
      - nist-information-integrity
  - id: ibm-factuality-intrinsic-policy-guardrails
    name: Policy Guardrails
    description: >-
      Policy Guardrails provides policy compliance checking by determining whether scenarios comply with or violate given
      policies. It provides an 'Ambiguous' response when certainty is insufficient, enabling nuanced policy evaluation in
      complex scenarios. This intrinsic can be applied to assess whether prompts or responses align with orgranizational
      policies and compliance requirements.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - granite-4.1-blog
    hasAdapter:
      - ibm-factuality-adapter-granitelib-guardian-r1.0-policy-guardrails
    hasRelatedRisk:
      - atlas-harmful-output
      - nist-information-integrity
  - id: ibm-factuality-intrinsic-context-attribution
    name: Context Attribution
    description: >-
      Predicts which sentences in the context (including documents and previous conversation turns) were most important for
      the base model to generate each sentence in its response. The adapter provides contributive attribution, identifying
      the context sentences that actually influenced the model's response, and ranks them by importance. This is a
      post-generation intrinsic designed to explain the base model's behavior.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - granite-4.1-blog
    hasAdapter:
      - ibm-factuality-adapter-granitelib-core-r1.0-context-attribution
    hasRelatedRisk:
      - granite-relevance
  - id: ibm-factuality-intrinsic-requirement-check
    name: Requirement Check
    description: >-
      Judges whether an assistant's generation satisfies a set of user-specified requirements, outputting a binary yes/no
      assessment. It is designed for evaluating constraint satisfaction in instruction-following scenarios, including
      formatting, content, structural requirements, and quality assurance pipelines.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - granite-4.1-blog
    hasAdapter:
      - ibm-factuality-adapter-granitelib-core-r1.0-requirement-check
    hasRelatedRisk:
      - granite-relevance
  - id: ibm-factuality-intrinsic-uncertainty
    name: Uncertainty
    description: >-
      Provides calibrated certainty scores for the base model's responses. Given a conversation ending with an assistant
      response, it calculates a certainty percentage reflecting how confident the model is about its answer.
    isDefinedByVocabulary: ibm-factuality
    hasDocumentation:
      - granite-4.1-blog
    hasAdapter:
      - ibm-factuality-adapter-granitelib-core-r1.0-uncertainty
    hasRelatedRisk:
      - granite-relevance
