    adaptsModel:
      - granite-3.2-8b-instruct
  - id: ibm-factuality-adapter-granite-3.2-8b-instruct-alora-answerability-classification
    name: Granite 3.2 8B Instruct - Answerability Classification aLoRA
    description: >-
      Granite 3.2 8b Instruct - Answerability Classification is an Activated LoRA (aLoRA) adapter for
      ibm-granite/granite-3.2-8b-instruct that is fine-tuned for binary answerability classification task. The model takes as
      input a multi-turn conversation and a set of documents, and classifies whether the user's final query is answerable or
      unanswerable based on the available information in the documents.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.2-8b-alora-rag-answerability-prediction
    hasDocumentation:
      - arxiv.org/2504.12397
    hasAdapterType:
      - ALORA
    adaptsModel:
      - granite-3.2-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-lora-math-prm
    # missing parent intrinsic
    name: Granite-3.3-8B-LoRA-Math-PRM
    description: >-
      Granite 3.3 8B LoRA Math PRM is a LoRA adapter for the 8-billion parameter language model, Granite-3.3-8B-Instruct,
      built for use a generative process reward model (PRM) for process supervision in mathematical reasoning. Crucially,
      this model has only been trained on curated data from sources with permissive licenses, and we release this model under
      a Apache 2.0 license.

      This model can be used to asses the correctness of each step of a mathematical reasoning process, and shows strong
      performance on Best-of-N evaluations for a variety of generators on Math-500, as well as strong error identification
      performance in both ProcessBench and PRMBench.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-lora-math-prm
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
    # missing documentation
  - id: ibm-factuality-adapter-granitelib-guardian-r1.0-guardian-core
    name: Granite Guardian Core
    description: >-
      Guardian Core is a capability that judges whether input prompts and output responses meet specified criteria including
      safety risks (harm, jailbreaking, profanity, violence, sexual content, social bias, unethical behavior), hallucinations
      related to tool/function calls, and retrieval-augmented generation (RAG) in agent-based systems. It outputs a JSON
      object with a score field indicating "yes" or "no".
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granitelib-guardian-r1.0
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
      - ALORA
    adaptsModel:
      - granite-4.1-3b
      - granite-4.1-30b
      - granite-4.1-8b
  - id: ibm-factuality-adapter-granitelib-guardian-r1.0-factuality-detection
    name: Granite Factuality Detection
    description: >-
      Factuality Detection is a capability that assesses factual correctness by evaluating LLM-generated responses against
      context sources. It identifies conflicts, misrepresentations, or selective omissions of evidence, helping ensure
      responses are grounded in provided information.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granitelib-guardian-r1.0
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
      - ALORA
    adaptsModel:
      - granite-4.1-3b
      - granite-4.1-30b
      - granite-4.1-8b
  - id: ibm-factuality-adapter-granitelib-guardian-r1.0-factuality-correction
    name: Granite Factuality Correction
    description: >-
      Factuality Correction is a capability that corrects factually incorrect responses by accounting for contextual passages
      with conflicting information. It corrects inaccuracies in long-form responses while preserving model capabilities and
      maintaining response quality.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granitelib-guardian-r1.0
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
      - ALORA
    adaptsModel:
      - granite-4.1-3b
      - granite-4.1-30b
      - granite-4.1-8b
  - id: ibm-factuality-adapter-granitelib-guardian-r1.0-policy-guardrails
    name: Granite Policy Guardrails
    description: >-
      Policy Guardrails is a capability that provides policy compliance checking by determining if scenarios comply with or
      violate given policies. It provides an 'Ambiguous' response when certainty is insufficient, allowing for nuanced policy
      evaluation in complex scenarios.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granitelib-guardian-r1.0
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
      - ALORA
    adaptsModel:
      - granite-4.1-3b
      - granite-4.1-30b
      - granite-4.1-8b
  - id: ibm-factuality-adapter-granitelib-core-r1.0-context-attribution
    name: Granite Context Attribution
    description: >-
      Context Attribution is a LoRA purpose-built for a base model to predict the sentences in the context that were most
      important for the base model to generate each sentence in its response or output.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granitelib-core-r1.0/blob/main/context-attribution/README.md
    hasDocumentation:
      - granite-4.1-blog
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-4.1-3b
      - granite-4.1-30b
      - granite-4.1-8b
  - id: ibm-factuality-adapter-granitelib-core-r1.0-requirement-check
    name: Granite Requirement Check
    description: >-
      Judges whether an assistant's generation satisfies a set of user-specified requirements, outputting a binary
       yes/no assessment. It is designed for evaluating constraint satisfaction in instruction-following scenarios,
       including formatting, content, structural requirements, and quality assurance pipelines.
    isDefinedByVocabulary: ibm-factuality
