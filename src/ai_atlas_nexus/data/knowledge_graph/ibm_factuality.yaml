adapters:
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-lora-query-rewrite
    name: Granite 3.3 8b Instruct - Query Rewrite
    description: >-
      Query Rewrite is a LoRA adapter for ibm-granite/granite-3.3-8b-instruct fine-tuned for the following task: Given a
      multi-turn conversation between a user and an AI assistant, decontextualize the last user utterance (query) by
      rewriting it (whenever necessary) into an equivalent version that is standalone and can be understood by itself.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-rag-agent-lib
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-lora-query-expansion
    name: Granite 3.3 8b Instruct - Query Expansion
    description: >-
      Query Expansion is a LoRA adapter for ibm-granite/granite-3.3-8b-instruct that generates a set of semantically diverse
      queries designed to probe the retriever from multiple angles. Instead of relying on a single rewrite, this intrinsic
      generates multiple candidate queries. These reflect different interpretations or formulations of the original user
      intent, improving the likelihood of retrieving relevant supporting passages.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-rag-agent-lib
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-lora-context-relevance
    name: Granite 3.3 8b Instruct - Context Relevance
    description: >-
      Granite 3.3 8b Instruct - Context Relevance is a LoRA adapter for granite-3.3-8b-instruct, that is fine-tuned for the
      context relevancy task:

      Given (1) a document and (2) a multi-turn conversation between a user and an AI assistant, identify whether the
      document is relevant (including partially relevant) and useful to answering the last user question. While this adapter
      is general-purpose and can even be used in cases where there is only one question, it is especially effective in RAG
      settings right after the retrieval model's step, where the adapter can be used to identify documents or passages that
      may mislead or harm the downstream generator model's response generation.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-rag-agent-lib
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-lora-answerability-determination
    name: Granite 3.3 8b Instruct - Answerability Determination
    description: >-
      Granite 3.3 8b Instruct - Answerability Determination is a LoRA adapter for ibm-granite/granite-3.3-8b-instruct
      fine-tuned for binary answerability classification task. The model takes as input a multi-turn conversation and a set
      of documents, and classifies whether the user's final query is answerable or unanswerable based on the available
      information in the set of input documents.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-rag-agent-lib
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-instruct-lora-passage-reranking
    name: Granite 3.3 Instruct - Passage Reranking
    description: >-
      Granite 3.3 Instruct - Passage Reranking is a prompt-based intrinsic for reranking retrieved passages. It takes the
      output of the retrieval step as input and returns a reranked (subset of the) retrieved passages which can be then used
      for generation.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-rag-agent-lib
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-lora-uncertainty-quantification
    name: Granite 3.3 8b Instruct - Uncertainty Quantification
    description: >-
      Granite 3.3 8b Instruct - Uncertainty Quantification is a LoRA adapter for ibm-granite/granite-3.3-8b-instruct, adding
      the capability to provide calibrated certainty scores when answering questions when prompted, in addition to retaining
      the full abilities of the ibm-granite/granite-3.3-8b-instruct model. The model is a LoRA adapter finetuned to provide
      certainty scores mimicking the output of a calibrator trained via the method in Shen et al. (2024).
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-rag-agent-lib
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-lora-uncertainty
    name: Granite 3.3 8b Instruct - Uncertainty LoRA
    description: >-
      Granite 3.3 8b Instruct - Uncertainty is a LoRA adapter for ibm-granite/granite-3.3-8b-instruct, adding the capability
      to provide calibrated certainty scores when answering questions when prompted, in addition to retaining the full
      abilities of the ibm-granite/granite-3.3-8b-instruct model.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-lora-uncertainty
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-lora-hallucination-detection
    name: Granite 3.3 8b Instruct - Hallucination detection
    description: >-
      Granite 3.3 8b Instruct - Hallucination Detection is a LoRA adapter for ibm-granite/granite-3.3-8b-instruct fine-tuned
      for the hallucination detection task of model outputs. Given a multi-turn conversation between a user and an AI
      assistant ending with an assistant response and a set of documents/passages on which the last assistant response is
      supposed to be based, the adapter outputs a hallucination risk for each sentence in the assistant response.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-rag-agent-lib
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-lora-citation-generation
    name: Granite 3.3 8b Instruct - Citation Generation
    description: >-
      Granite 3.3 8b Instruct - Citation Generation is a RAG-specific LoRA adapter for ibm-granite/granite-3.3-8b-instruct
      fine-tuned for the citation generation task. Given a multi-turn conversation between a user and an AI assistant ending
      with an assistant response and a set of documents/passages on which the last assistant response is supposed to be
      based, the adapter generates citations for the last assistant response from the provided documents/passages.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-rag-agent-lib
    hasDocumentation:
      - arxiv.org/2504.11704
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.2-5b-harm-correction
    # missing intrinsic parent
    name: Granite Guardian 3.2 5b Harm Correction LoRA
    description: >-
      Granite Guardian 3.2 5b Harm Correction LoRA is a LoRA adapter for ibm-granite/granite-guardian-3.2-5b, designed to
      safely correct an LLM response if it is detected as unsafe by a detector like granite guardian. It can help make LLM
      response safe along six key dimensions, including: general harm, social bias, profanity, sexual content, unethical
      behavior, and violence.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-guardian-3.2-5b-lora-harm-correction
    hasDocumentation:
      - granite-guardian-paper
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.2-5b
  - id: ibm-factuality-adapter-granite-3.2-5b-harm-categories
    # missing intrinsic parent
    name: Granite Guardian 3.2 5b Harm Categories LoRA
    description: >-
      Granite Guardian 3.2 5b Harm Categories LoRA is a LoRA adapter for ibm-granite/granite-guardian-3.2-5b, designed to
      detect specific and multi-risks in prompts and responses. While the base model identifies a broad range of harms, this
      adapter allows users to detect specific sub-categories of harm without requiring multiple, parallel calls. It can help
      with risk detection along many key dimensions catalogued in the IBM AI Risk Atlas.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-guardian-3.2-5b-lora-harm-categories
    hasDocumentation:
      - granite-guardian-paper
    hasAdapterType:
      - LORA
    adaptsModel:
      - granite-guardian-3.2-5b
  - id: ibm-factuality-adapter-granite-3.2-8b-instruct-alora-jailbreak
    name: Granite 3.2 8B Instruct - Jailbreak aLoRA
    description: >-
      An aLoRA adapter for ibm-granite/granite-3.2-8b-instruct, adding the capability to detect the risk of jailbreak and
      prompt injections in input prompts. This aLoRA intrinsic is finetuned for jailbreak and prompt injection risk detction
      within user prompts covering social hacking attack technique described in Attack Atlas: A Practitioner's Perspective on
      Challenges and Pitfalls in Red Teaming GenAI .
    isDefinedByVocabulary: ibm-factuality
    hasAdapterType:
      - ALORA
    url: https://huggingface.co/ibm-granite/granite-3.2-8b-alora-jailbreak
    hasDocumentation:
      - arxiv.org/2504.12397
      - arxiv.org/2409.15398
    adaptsModel:
      - granite-3.2-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-alora-uncertainty
    name: Granite 3.3 8B Instruct - Uncertainty aLoRA
    description: >-
      Granite 3.3 8b Instruct - Uncertainty is an Activated LoRA (aLoRA) adapter for ibm-granite/granite-3.3-8b-instruct,
      adding the capability to provide calibrated certainty scores when answering questions when prompted, in addition to
      retaining the full abilities of the ibm-granite/granite-3.3-8b-instruct model.
    isDefinedByVocabulary: ibm-factuality
    hasAdapterType:
      - ALORA
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-alora-uncertainty
    hasDocumentation:
      - arxiv.org/2504.12397
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.2-8b-instruct-alora-uncertainty
    name: Granite 3.2 8B Instruct - Uncertainty aLoRA
    description: >-
      Granite 3.2 8b Instruct - Uncertainty is an Activated LoRA (aLoRA) adapter for ibm-granite/granite-3.2-8b-instruct,
      adding the capability to provide calibrated certainty scores when answering questions when prompted, in addition to
      retaining the full abilities of the ibm-granite/granite-3.2-8b-instruct model.
    isDefinedByVocabulary: ibm-factuality
    hasAdapterType:
      - ALORA
    url: https://huggingface.co/ibm-granite/granite-3.2-8b-alora-uncertainty
    hasDocumentation:
      - arxiv.org/2504.12397
    adaptsModel:
      - granite-3.2-8b-instruct
  - id: ibm-factuality-adapter-granite-3.3-8b-instruct-requirement-checker
    name: Granite 3.3 8B Instruct - Requirement Checker
    description: >-
      Granite 3.3 8b Instruct - Requirement Checker is an Activated LoRA (aLoRA) adapter for
      ibm-granite/granite-3.3-8b-instruct, adding the capability to check if specified requirements were satisfied by the
      last model generation. Only one requirement is checked at a time (but can be checked in parallel).
    isDefinedByVocabulary: ibm-factuality
    hasAdapterType:
      - ALORA
    hasLicense: license-apache-2.0
    url: https://huggingface.co/ibm-granite/granite-3.3-8b-alora-requirement-check
    hasDocumentation:
      - arxiv.org/2504.12397
    adaptsModel:
      - granite-guardian-3.3-8b-instruct
  - id: ibm-factuality-adapter-granite-3.2-8b-instruct-requirement-checker
    name: Granite 3.2 8B Instruct - Requirement Checker
    description: >-
      Granite 3.2 8b Instruct - Requirement Checker is an Activated LoRA (aLoRA) adapter for
      ibm-granite/granite-3.2-8b-instruct, adding the capability to check if specified requirements were satisfied by the
      last model generation. Only one requirement is checked at a time (but can be checked in parallel).
    isDefinedByVocabulary: ibm-factuality
    hasAdapterType:
      - ALORA
    hasLicense: license-apache-2.0
    url: https://huggingface.co/ibm-granite/granite-3.2-8b-alora-requirement-check
    hasDocumentation:
      - arxiv.org/2504.12397
    adaptsModel:
      - granite-3.2-8b-instruct
  - id: ibm-factuality-adapter-granite-3.2-8b-instruct-alora-query-rewrite
    name: Granite 3.2 8B Instruct - Query Rewrite aLoRA
    description: >-
      Granite 3.2 8b Instruct - Query Rewrite is an Activated LoRA (aLoRA) adapter for ibm-granite/granite-3.2-8b-instruct
      that is fine-tuned for the query rewrite task in multi-turn conversations: Given a multi-turn conversation between a
      user and an AI assistant, decontextualize the last user utterance (query) by rewriting it (whenever necessary) into an
      equivalent version that is standalone and can be understood by itself.
    isDefinedByVocabulary: ibm-factuality
    url: https://huggingface.co/ibm-granite/granite-3.2-8b-alora-rag-query-rewrite
    hasDocumentation:
      - arxiv.org/2504.12397
    hasAdapterType:
      - ALORA
    hasLicense: license-apache-2.0
    hasRelatedRisk:
