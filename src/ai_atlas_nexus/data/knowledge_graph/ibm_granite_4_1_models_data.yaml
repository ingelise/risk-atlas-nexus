documents:
  - id: granite-4.1-blog
    name: Granite 4.1 Language Models Technical Blog
    description: >-
      Technical blog post describing Granite 4.1, a family of dense, decoder-only language models (3B, 8B, and 30B) trained
      on approximately 15 trillion tokens using a five-phase training strategy, including long-context extension to 512K
      tokens. The models are further refined with supervised fine-tuning on ~4.1M curated samples and reinforcement learning
      via on-policy GRPO with DAPO loss.
    author: Yousaf Shah
    url: https://huggingface.co/blog/ibm-granite/granite-4-1
    dateCreated: 2026-04-29

aimodelfamilies:
  - id: ibm-granite
    hasDocumentation:
      - granite-4.1-blog

