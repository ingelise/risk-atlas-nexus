    type: Action
  - id: A0957_Gipiskis2024
    name: Demonstrating a “margin of safety” for the worst plausible system failures
    description:
      "Model developers can demonstrate that there is an acceptable “margin of safety” between the current
      version of the model and a plausible version with dangerous capabilities or potential system failures, whether
      these arise from the model itself or through scaffolding. This “margin of safety” can be tracked and evaluated
      based on the model’s performance on either component tasks or proxy tasks with varying levels of difficulty [44],
      and it is particularly relevant for general- purpose models with emergent properties, where some of the risks, use
      cases, and model capabilities may be unknown even at the time of deployment.

      Margin of safety (also called “safety factor”) is a common practice in many in- dustries - particularly in
      physical structures. It is common for this margin to be very conservative when feasible (e.g., 4+ in fasteners on
      critical structures). In situations where a high margin of safety is impractical, it may be supplemented by more
      frequent inspections and additional process controls. A lower safety factor can also be managed by adopting
      conservative assumptions regarding worst-case conditions."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0959_Gipiskis2024
    name: Scenario analysis
    description:
      "Scenario analysis involves development of several plausible future scenarios, where these scenarios
      may be generated from varying the assumptions of a small set of driving forces. The scenarios developed can be
      used to take further actions to improve overall preparedness [107].

      For example, scenarios to explore frontier AI risks can be developed, where they can involve different assumptions
      on factors such as AI capability, ownership, safety, usage, and geopolitical contexts, as well as its implications
      on key policy issues [203]."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0960_Gipiskis2024
    name: Fishbone diagram
    description:
      "The fishbone diagram, or a “cause-and-effect diagram” [107], can be used to show the potential causes
      of an undesirable event.

      The diagram is created by first placing a specific risk event at the “head” of the diagram, typically facing the
      right. Then, to the left of the risk event, the “ribs” branch off from the “backbone” to represent major causes,
      which further branch into sub-branches to represent root-causes, extending to as many levels as required. This is
      typically done via backward-reasoning, where various potential causes are explored after the risk event has been
      selected for analysis using this method.

      For example, the risk event “AI systems generate toxic content” can be placed at the “head” of the diagram, where
      the branches may include causal factors like “AI trained on data containing toxicity” and “successful jailbreaking
      of AI despite fine-tuning.”"
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0961_Gipiskis2024
    name: Causal mapping
    description:
      "Causal mapping is a technique used to explore and map complex interactions between cause and effect of
      risks. It involves coming up with potential events related to an undesirable issue, with each event represented by
      a text box, then clustering similar events according to themes, and finally drawing arrows to illustrate the
      causal relationship between the different events. The completed causal map can then be analyzed to identify
      central events, clusters of events, feedback loops, and other relevant patterns [107].

      For example, causal mapping can be used to explore factors that lead to high- level model capabilities (e.g.,
      “machine intelligence”), and the nodes may in- clude factors such as “concept formation” and “flexible memory,”
      where certain nodes may be found to be especially crucial if they have more outgoing arrows connecting them to
      other nodes."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0962_Gipiskis2024
    name: Delphi technique
    description:
      "The Delphi technique is a multi-round forecasting process based on a structured framework on
      collecting and collating multiple expert judgments. It brings the benefits of anonymous and remote participation
      which may result in increased likelihood estimation accuracy compared to merely averaging individual estima- tions
      or simple group discussions [107].Given a panel of experts, at each round, the experts are presented with an ag-
      gregated summary of the results from the previous round, and are then allowed to update their answers accordingly.
      The process ends when either a consen- sus is reached or the responses in later rounds no longer change
      significantly. This method enables elicitation of expert judgment while utilizing wisdom of the crowd in the
      process.

      A potential application of the Delphi technique is to solicit expert judgment on the likelihood of systemic risks
      from AI development, where crucial variables identified during each round of questionnaire can be further studied
      for the purpose of risk mitigation."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0963_Gipiskis2024
    name: Cross-impact analysis
    description:
      "Cross impact analysis is a forecasting methodology that analyzes the likelihood of a particular issue
      using expert analysis (i.e., Delphi technique) in combination with analysis of events correlated with the said
      issue. It involves decomposing an issue into discrete and correlated events, and then collecting expert opinion on
      each of those events. Analysis of each event from multiple viewpoints can yield potential future scenarios [107].

      For example, an issue may be “advances in AI,” which can be broken down into two correlated events like “advances
      in hardware” or “advances in algorithms,” where the likelihood of occurrences of each event can be estimated via
      the Delphi technique while taking into account their interactions with other events."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0964_Gipiskis2024
    name: Bow-tie analysis
    description:
      "Bow-tie analysis is a method to assess the utility of implemented controls against a particular risk
      event. It involves centering the unwanted risk event within a diagram. On the left, the factors that can cause the
      event are listed, followed by the controls that will prevent or minimize the likelihood of the event. On the
      right, the event is assumed to happen, and the potential effects and the relevant post-hoc controls that could
      minimize their impact are listed [107].

      For example, given a hazard where an AI model has the capability of generating potentially harmful outputs, a risk
      event may be an AI providing information on how to create dangerous bioweapons. The risk factors could include the
      use of dangerous data for training as well as a lack of fine-tuning prior to deploy- ment. The risk effects may
      include creation and use of bioweapons using the AI generated information. Once these risk factors and risk
      effects are in place, both preventive controls and post-hoc controls can be planned, such as appropriate filtering
      of training data and rigorous red teaming prior to model deployment as preventive barriers, as well as
      know-your-customer policies and model output censoring techniques as reactive barriers."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0965_Gipiskis2024
    name: System-theoretic process analysis (STPA)
    description:
      "STPA is a method to assess the utility of implemented controls against a partic- ular risk within a
      complex system. Unlike bow-tie analysis, STPA factors in the interactions between components as events that can
      cause the risk in question [107]. First, the system and its boundaries to the environment are defined. The sys-
      tem is primarily delineated from the environment because there is at least some partial control over it. Second,
      several items are enumerated, including (i) un- wanted risk events (“losses”), (ii) system states that cause
      losses (“system-level hazards”), and (iii) system states that do not cause losses (“system-level con- straints”).
      Third, a diagram mapping the system, environment, their different controls, and the interactions between these
      elements is created. This diagram must be comprehensive in listing the different losses and possible interactions
      that can cause each loss. Finally, the diagram can be used to identify “unsafe control actions” (UCAs), which are
      the causal pathways between a control and system-level hazards, including all interactions involved.

      For example, in the context of text-to-image models, losses may include ‘loss of diversity’ and ‘loss of quality’;
      hazards may include ‘low quality text-image pairs within training dataset’ and ‘harmful content within training
      dataset’; and the controls may include human controllers and automated controllers (e.g., annotators, data owners,
      data crawlers) [165]. Subsequent analysis may result in identification of UCAs such as ‘current data filtering
      actions’ and neglecting current filter thresholds’ which are linked to specific hazards. Specific actions that
      counter or prevent such UCAs can reduce the associated losses."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0966_Gipiskis2024
    name: Risk matrices
    description:
      "A risk matrix is a method for risk evaluation. It is a heatmap that, for each cell, shows the severity
      score weighted by the likelihood score of a particular risk, usually from a scale of 1-5. Two rankings are
      required to construct a risk matrix: a ranking for the severity of risks, and a corresponding ranking of the
      likelihood of risks [107].

      AI-related risks can be generated using appropriate taxonomies, and placed into the relevant cells according to
      their assessed likelihood and severity based on predefined criteria (e.g., likelihood level 1 corresponds to < 1%
      chance, and likelihood level 5 corresponds to > 90% chance; while severity level 1 corresponds to mild
      inconveniences to the user, and severity level 5 corresponds to a fatality or financial damage upwards of $10
      million, etc.), such that particular focus can be given to mitigating risks with higher weighted scores (i.e.,
      likelihood multiplied by severity)."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0967_Gipiskis2024
    name: Pre-allocate sufficient resources for risk man- agement
