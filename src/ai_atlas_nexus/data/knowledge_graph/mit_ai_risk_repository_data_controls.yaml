    name: Report new model deployments to the AG within 30 days
    description: ""
    hasDocumentation:
      - doc-Wiener2024
    type: Action
  - id: A0259_Wiener2024
    name: Publish assessment of the risk of catastrophic harms from the model
    description: ""
    hasDocumentation:
      - doc-Wiener2024
