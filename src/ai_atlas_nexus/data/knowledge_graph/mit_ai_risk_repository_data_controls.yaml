  - id: A0203_Schuett2023
    name: Publish views about AGI risk
    description:
      AGI labs should make public statements about their views on the risks and benefits from AGI, including the level
      of risk they are willing to take in its development.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0212_Schuett2023
    name: Statement about governance structure
    description:
      AGI labs should make public statements about how they make high-stakes decisions regarding model development and
      deployment.*
    hasDocumentation:
      - doc-Schuett2023
