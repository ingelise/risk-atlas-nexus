      - doc-Schuett2023
    type: Action
  - id: A0201_Schuett2023
    name: Publish internal risk assessment results
    description:
      AGI labs should publish the results or summaries of internal risk assessments, unless this would unduly reveal
      proprietary information or itself produce significant risk. This should include a justification of why the lab is
      willing to accept remaining risks.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0220_Schuett2023
    name: Notify other labs
    description: AGI labs should notify other labs before deploying powerful models.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
