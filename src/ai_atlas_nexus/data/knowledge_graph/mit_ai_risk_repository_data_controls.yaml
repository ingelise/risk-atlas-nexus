    type: Action
  - id: A0764_UK_Government2023
    name: Rigorous Risk Assessment Processes
    description:
      "Develop rigorous risk assessment processes for models, which: 1) Attempt to encompass all plausible and
      consequential risks from AI systems, including low-probability risks of severe harm; 2) Are informed by factors
      including, but not limited to: Model evaluations and red teaming, evidence of previous models' impacts and
      capabilities, knowledge of the latest research and developments in the field, domain expertise both internally and
      externally, and the results of data input audits. Take into account the difficulty of producing reliable risk
      assessments, creating a culture that takes seriously the significant uncertainty underlying predictions of the
      risks associated with frontier models. Take into account the potential benefits of the model. Include learnings
      from information exchanges with industry, academia and government on the capabilities of comparable models"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0765_UK_Government2023
    name: Pre-Deployment Risk Assessments
    description:
      Devote resources to pre-development risk assessments, alongside prioritising pre- deployment risk assessments.
      Pre-development risk assessments are also important, because training a high-risk system can still lead to harm if
      the model is leaked, stolen, or otherwise unintentionally distributed.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0766_UK_Government2023
    name: Development and Post-Deployment Monitoring
    description:
      Monitor systems both during development and after deployment. New risk assessments could be carried out in cases
      of fine-tuning or other substantial changes that could increase the danger of a model, such as the model gaining
      access to tools or plugins. This could occur alongside attempts to detect unexpected developments and new
      information that might have changed the results of the existing risk assessment, and which could also trigger a
      new risk assessment.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0767_UK_Government2023
    name: Risk Thresholds for Specific Models
    description:
      Describe and continually refine risk assessment results for each model (“risk thresholds”) that would trigger
      particular risk-reducing actions, defining such results in terms of risk to all relevant stakeholders given
      currently existing mitigations. Given the high uncertainty around future model capabilities, risk thresholds may
      be refined periodically.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0768_UK_Government2023
    name: Defining Risk Thresholds
    description:
      Define risk thresholds, based on the outcomes that would constitute a breach of the threshold and linked to
      dangerous capabilities that a given model or combination of models could exhibit. For example, a frontier AI
      organisation might identify the objective of avoiding deploying an AI system that significantly increases the risk
      of cyberattacks or fraud.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0769_UK_Government2023
    name: Operationalizing Risk Thresholds
    description:
      "Operationalise risk thresholds, including specific, testable observations, such that multiple
      observers with access to the same information would agree on whether a given threshold had been met. Specific
      observations would provide frontier AI organisations with opportunities to determine proactively how they would
      respond in difficult potential situations, and so respond immediately to such situations should they arise, as
      well as allowing for accountability and external verification.

      Given the nascent science of AI evaluation, however, it is unlikely to be possible to define a set of testable
      observations that detect all identified risks sufficiently reliably. Instead of relying solely on these predefined
      tests, risk assessments may take into account wider sources of evidence, such as concerning and unexpected
      observations that show up in exploratory analyses, expert forecasts, or risk related information from other
      frontier AI organisations. In particular, consideration may be given to any risks caused by the combination of a
      given model with other models or tools, whether developed by the same frontier AI organisation or otherwise."
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0770_UK_Government2023
    name: Refinement of Risk Evaluation Frameworks
    description:
      Continue to refine and redefine risk evaluation frameworks for models as necessary, aiming to reduce the gap
      between the intended objectives of risk thresholds and their present operationalisations. Such gaps are expected
      to exist due to limitations in the science of evaluation and in the state of knowledge surrounding capabilities,
      so progress towards a robust framework will probably be iterative. Risk evaluation frameworks may use multiple
      methods, including probability estimations and qualitative assessments of current capabilities.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0771_UK_Government2023
    name: Mitigation of Overshooting Risk Thresholds
    description:
      Mitigate the risk of ‘overshooting’ risk thresholds. This may be achieved by setting deliberately conservative
      thresholds, including using intentionally lower buffer thresholds to trigger actions, such that the most
      concerning thresholds are difficult to overshoot without having already implemented mitigations at an earlier
      stage.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0772_UK_Government2023
    name: Risk Threshold Engagement with Relevant External Stakeholders
    description:
      Engage with relevant external stakeholders when developing risk thresholds. Risk thresholds often concern
      externalities frontier AI organisations place on society, including both the potentially significant benefits of
      AI advancement and negative effects that might disproportionately affect specific stakeholder groups. As such,
      their risk thresholds may be made public to allow for external scrutiny, with thresholds set in consultation with
      relevant external stakeholders including relevant government authorities.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0774_UK_Government2023
    name: Reassessment of Residual Risk
    description:
      After putting in place mitigations, reassess any residual risk posed to determine whether additional mitigations
      are required. Due to the unpredictability of capabilities advancements and the limitations of model evaluation
      science, pre-agreed mitigations may prove insufficient to place a given model within a risk threshold. Risk
      acceptance criteria may be used, as is standard in many other contexts, and may provide an important tool for
      clarification. These criteria may evolve with time, and could be quantitative or qualitative. For example, risk
      may only be accepted if it has been reduced to a level ‘as low as reasonably practicable’.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0775_UK_Government2023
    name: Disclosure of Risk Threshold to Government Authorities
    description:
      Inform relevant government authorities when a risk threshold has been met, along with proposed mitigations. Inform
      governments again, in advance of deployment, when the mitigations and residual risk assessment have been carried
      out. Proactively engage other relevant actors in addition to governments as appropriate.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0776_UK_Government2023
    name: Adaptation of Mitigations to Development and Deployment Stages
    description:
      "When planning required mitigations, consider the full range of development and deployment stages. In general,
      meeting a risk threshold could require mitigations at multiple such stages. Important stages may include the
      following: 1) Continued training of model; 2) Deployment of model in small-scale ways, e.g., internal use; 3)
      Deployment of model in large-scale ways e.g., public release via API ; 4) Extension of model through greater
      affordances, e.g., tool use or internet access; 5) Irreversible deployment e.g. open-sourcing of models"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0777_UK_Government2023
    name: Adaptation of Mitigations for Unintended Model Use
    description:
      Adapt mitigations in recognition of risks from unintended model use or use in unexpected contexts, such as a model
      that is modified to remove safeguards after open- sourcing or a model that is combined with another model for
      unanticipated purposes. For example, at a given risk threshold, information security control mitigations might be
      put in place before even internal use of a model within a frontier AI organisation. In general, the use of caution
      may be helpful, given current limitations in information security controls and the prediction of models’ emergent
      abilities.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0778_UK_Government2023
    name: Recognition of Dangerous Model Possession
    description:
      Recognise that even the possession of some models may be dangerous, even if not deployed or not deployed widely,
      due to the risk of being unable to secure a model sufficiently to prevent, for instance, a bad actor obtaining the
      model weights. In contrast, other models may pose significant risk only if deployed in a large-scale or
      irreversible way.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0781_UK_Government2023
    name: Risks of Open-Source Models
    description:
      Acknowledge that some models may pose additional risks if made available “open-source”, even after mitigation
      attempts. This is because of the inability of recalling an open-sourced model and the potential ability of users
      to remove safeguards and introduce new (and potentially dangerous) capabilities. However, it is also important to
      bear in mind the significant benefits of “open-source” AI systems for researchers, including for advancing AI
      safety, which may in some cases outweigh these potential risks.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0784_UK_Government2023
    name: Effective Risk Governance
    description:
      Establish effective risk governance to ensure that risks are appropriately identified, assessed, and addressed,
      and their nature and scale transparently reported. Most importantly, provide internal checks and balances, which
      may include thoughtful separation of roles within risk management.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0822_UK_Government2023
    name: Documentation of the Cyber security threats
    description:
      Assess and document the cyber security threats against the AI system overall and mitigate the impact of
      vulnerabilities. Good documentation and monitoring will inform your overall risk posture and help you respond in
      the event of a security incident.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0823_UK_Government2023
    name: Value of AI-related Assets
    description:
      Understand the value of AI-related assets such as models, data (including user feedback), prompts, software,
      documentation, and assessments (including information about potentially unsafe capabilities and failure modes) to
      their organisation. Protect these different categories of information as appropriate.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0824_UK_Government2023
    name: Security Integration into Business Decisions
    description:
      Ensure security is factored into all business decisions and AI-related assets are identified and protected with
      proportionate cyber, physical and personnel security measures. Secure Innovation guidance from NCSC and NPSA is
      available to help companies and investors to protect their technology .
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0828_UK_Government2023
    name: Awareness of Security Threats
    description:
      Maintain an awareness of security threats and failure modes, in particular data scientists and developers. AI
      development and cyber security are two different skill sets and building a team at the intersection of the two
      will require effort and time.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0829_UK_Government2023
    name: Model of System Threats in Misuse Scenarios
    description:
      Model the threats to your system to understand the impacts to the system, users, organisation and wider society if
      the model is misused or behaves unexpectedly. This can help build systems where unanticipated model outputs are
      handled safely by other parts of a data pipeline.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0839_UK_Government2023
    name: Identification of Assets of Organizational Value
    description:
      Identify assets & systems that are important for the delivery of effective operations, or are of specific
      organisational value (e.g. commercially sensitive information)
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0840_UK_Government2023
    name: Categorization of Assets
    description:
      Categorise and classify assets in order to ensure that the correct level of resource is used in implementing risk
      mitigations. - risk management
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0841_UK_Government2023
    name: Threat Identification
    description:
      Identify threats. These may include terrorism or hostile state threats and/or more local and specific threats, and
      use a range of internal and external resources.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0842_UK_Government2023
    name: Risk Assessment via Recognized Processes
    description: Assess risk using recognised processes.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0843_UK_Government2023
    name: Protective Security Risk Register
    description:
      Build a protective security risk register to record, in sufficient detail, all the data gathered during this risk
      management process, ensuring compatibility with existing organisational risk management registers and processes.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0844_UK_Government2023
    name: Development of Protective Security Strategy
    description:
      Develop a protective security strategy for mitigating the risks identified, which reviews protective security
      measures in relation to a prioritised list of risks. Where mitigations are assessed as inadequate, additional
      measures could be proposed for approval by the decision maker(s).
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0845_UK_Government2023
    name: Development and Implementation Plans
    description:
      Produce development & implementation plans. Aim to arrive at a clear, prioritised list of protective security
      mitigations, which span physical, personnel and cyber security disciplines, and are linked to the technical
      guidance needed to implement them.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0846_UK_Government2023
    name: Regular Risk Management Review
    description:
      Review risk management measures regularly and when required e.g. on a change in threat or change to operational
