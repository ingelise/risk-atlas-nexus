      specific mitigations are in place. Such mitigations could include many of the practices outlined in this document.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0780_UK_Government2023
    name: Pause of Training Runs
    description:
      Prepare to pause training runs or reduce access to deployed models, if risk thresholds are reached without the
      committed risk mitigations being in place. This may involve warning existing customers that access reductions are
      a possibility and creating contingency plans to minimise negative impacts on customer use.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0790_UK_Government2023
    name: Response Processes for Evaluation Results
    description:
      Ensure processes are in place to respond to evaluation results. Evaluations are a necessary input to a responsible
      capability scaling policy which, depending on the results of the evaluation, would probably require implementation
      of practices outlined in other sections of this document such as preventing model misuse, information sharing and
      other risk mitigation measures.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0881_UK_Government2023
    name: Defense Tool Availability Before system release
    description:
      The larger the risk is and the more effective tools may be, the more important it is to prepare defensive tools
      ahead of time. It may be important to delay system releases until appropriate defensive tools are ready.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A1038_Uuk2024
    name: Safety vs. capabilities investments
    description:
      A significant fraction of employees and computational resources are dedicated to enhancing model safety rather
      than advancing its capabilities.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0073_Eisenberg2025
    name: Implement environmental impact management system
    description:
      Implement comprehensive environmental impact monitoring and optimization procedures, including energy efficiency
      measures, carbon footprint tracking, and hardware lifecycle management.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0094_Future_of_Life_Institute2024
    name: Carbon emission analyses and offsets
    description: Information about carbon emission analyses and offsets.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0095_Future_of_Life_Institute2024
    name: Carbon footprint assessment
    description:
      The development and deployment of the largest AI models use vast amounts of energy and resources. Does your
      organization rigorously assess its carbon footprint?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0131_Future_of_Life_Institute2024
    name: Offsetting of carbon footprint
    description:
      Does your organization fully offset its carbon footprint by donating to projects that capture or reduce carbon
      emissions?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0683_Barrett2024
    name: Assess Environmental Impact
    description: "Environmental impact

      and sustainability of

      AI model training and

      management activities –

      as identified in the Map

      function – are assessed

      and documented."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0712_NIST2024
    name: Environmental Degradation Minimisation
    description: "Document anticipated environmental impacts of model development,

      maintenance, and deployment in product design decisions."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0713_NIST2024
    name: Environmental Impact Assessment
    description: "Measure or estimate environmental impacts (e.g., energy and water

      consumption) for training, fine tuning, and deploying models: Verify tradeoffs

      between resources used at inference time versus additional resources required

      at training time."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0714_NIST2024
    name: Effectiveness of Carbon Capture
    description:
      "Verify effectiveness of carbon capture or offset programs for GAI training and

      applications, and address green-washing concerns."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0994_Gipiskis2024
    name: More energy-efficient models or techniques
    description:
      Deploying more energy-efficient models can reduce their environmental impact. Different model architectural
      choices result in varying environmental costs, and identifying and adopting more energy-efficient options can
      result in significant environmental savings, especially when implemented at scale. Consideration should be given
      to both training energy usage, and deployment (“inference”) usage for the expected model lifecycle.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0995_Gipiskis2024
    name: Disclosure of energy consumption by AI systems to authorities
    description:
      Disclosures can direct more necessary attention and scrutiny to projects that consume significant energy.
      Disclosure involves releasing a summary of key details of the energy consumption of the AI system by all users,
      including the compute resources used, the amount of power consumed, the measures to reduce excess energy
      consumption that were in place, and energy sources [133].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0996_Gipiskis2024
    name: Using low carbon intensity energy grids
    description:
      Moving model training to energy grids with low carbon intensity can reduce the negative environmental impact [30].
      The efficiency of energy grids can vary greatly depending on location. Models can be trained in different
      locations, as latency is not an issue.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0006_Bengio2025
    name: Engagement with Relevant Experts and Communities
    description:
      "Domain experts, users, and impacted communities have unique insights into likely risks.


      There are emerging guidelines for participatory and inclusive AI."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0008_Bengio2025
    name: Impact Assessment
    description:
      "A tool used to assess the potential impacts of a technology or project.


      The EU AI Act requires developers of high- risk AI systems to carry out Fundamental Rights Impact Assessments."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0026_Bengio2025
    name: Safety by Design
    description:
      "An approach that centres user safety in the design and development of products and services.


      This approach is common across engineering and safety- critical fields including aviation and energy."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0036_Casper2025
    name: Plans to minimize risks to society
    description:
      Developers can be required to produce a report on risks (Slattery et al., 2024) posed by their frontier systems
      and risk mitigation practices that they are taking to reduce them.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0072_Eisenberg2025
    name: Implement psychological impact management system
    description:
      Establish monitoring and intervention procedures to detect and prevent unhealthy user-AI relationships, including
      emotional dependency tracking, interaction boundary enforcement, and well-being safeguards.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0076_Eisenberg2025
    name: Establish societal impact assessment framework
    description:
      Implement comprehensive processes for assessing and documenting potential societal impacts of AI systems,
      including effects on employment, economic systems, power dynamics, and cultural value. Include stakeholder
      consultation and impact mitigation planning.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0111_Future_of_Life_Institute2024
    name: Expert Consultation on Societal Risks
    description:
      "Has your organization consulted with top-level domain experts to assess whether your most capable
      models increase societal risks across the following domains?

      Risks from biological weapons

      Risks from autonomy (e.g., self-replication, deception)

      Risks from cyber attacks

      Risks from chemical weapons

      Risks from manipulation and political influence

      Risks from systematic discrimination against marginalized groups"
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0115_Future_of_Life_Institute2024
    name: Fundamental Rights Impact Assessments
    description:
      Is your organization conducting fundamental rights impact assessments that seek input from a diverse group of
      external stakeholders who are impacted by your organization’s AI systems?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0394_NIST2024
    name: Stakeholder Input Collection
    description:
      Obtain input from stakeholder communities to identify unacceptable use, in accordance with activities in the AI
      RMF Map function.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0422_NIST2024
    name: Actor Inclusion in Risk ID
    description: Include relevant AI Actors in the GAI system risk identification process.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0428_NIST2024
    name: Joint Educational Activities
    description:
      Conduct joint educational activities and events in collaboration with third parties to promote best practices for
      managing GAI risks.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0444_NIST2024
    name: Purpose Identification Factors
    description:
      When identifying intended purposes, consider factors such as internal vs. external use, narrow vs. broad
      application scope, fine-tuning, and varieties of data sources (e.g., grounding, retrieval-augmented generation).
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0445_NIST2024
    name: Context of Use Documentation
    description:
      "Determine and document the expected and acceptable GAI system context of use in collaboration with socio-cultural
      and other domain experts, by assessing: Assumptions and limitations; Direct value to the organization; Intended
      operational environment and observed usage patterns; Potential positive and negative impacts to individuals,
      public safety, groups, communities, organizations, democratic institutions, and the physical environment; Social
      norms and expectations."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0492_NIST2024
    name: Interest Group Definition
    description:
      Define relevant groups of interest (e.g., demographic groups, subject matter experts, experience with GAI
      technology) within the context of use as part of plans for gathering structured public feedback.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0509_NIST2024
    name: Value Chain Wellbeing Assessment
    description:
      Assess adverse impacts, including health and wellbeing impacts for value chain or other AI Actors that are exposed
      to sexually explicit, offensive, or violent information during GAI training and maintenance.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0532_NIST2024
    name: End-User Expectation Engagement
    description:
      Engage directly with end-users and other stakeholders to understand their expectations and concerns regarding
      content provenance. Use this feedback to guide the design of provenance data-tracking techniques.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0626_Barrett2024
    name: Anticipate Misuse & Impact
    description:
      "Identify reasonably foreseeable uses, and misuses or abuses for a GPAIS (e.g, auto-

      mated generation of toxic or illegal content or disinformation, or aiding with proliferation

      of cyber, chemical, biological, or radiological weapons), and identify reasonably foreseeable

      potential impacts (e.g., to fundamental rights)"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0648_Barrett2024
    name: External Feedback on Impacts
    description: "Organizational policies

      and practices are in

      place

      to collect, consider,

      prioritize, and integrate

      feedback from those

      external to the team

      that developed or

      deployed the AI system

      regarding the potential

      individual and societal

      impacts related to AI

      risks."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0708_NIST2024
    name: Assessments for Environmental; Harmful Bias and Homogenization
    description:
      "Identify the classes of individuals, groups, or environmental ecosystems which

      might be impacted by GAI systems through direct engagement with potentially

      impacted communities."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0711_NIST2024
    name: Dangerous, Violent, or Hateful Content Mitigation
    description: Assess safety to physical environments when deploying GAI systems
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0716_NIST2024
    name: Harmful Bias and Homogenization Assessments
    description: "Conduct impact assessments on how AI-generated content might affect

      different social, economic, and cultural groups."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0717_NIST2024
    name: Human-AI Configuration; Information Integrity Studies
    description:
      "Conduct studies to understand how end users perceive and interact with GAI

      content and accompanying content provenance within context of use. Assess

      whether the content aligns with their expectations and how they may act upon

      the information presented."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0733_NIST2024
    name: Human-AI Configuration
    description:
      "Use feedback from internal and external AI Actors, users, individuals, and

      communities, to assess impact of AI-generated content. (AI Deployment, AI Impact Assessment, Governance and
      Oversight, Operation and Monitoring)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0753_NIST2024
    name: Human-AI Configuration
    description:
      "Evaluate the use of sentiment analysis to gauge user sentiment regarding GAI

      content performance and impact, and work in collaboration with AI Actors

      experienced in user research and experience."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0884_UK_Government2023
    name: Societal Impact Research
    description:
      Study the societal impacts of AI systems they have deployed, particularly by collaborating with external
      researchers, independent research organisations, and third party data owners. By collaborating and joining their
      data with that of third parties, such as internet platforms, frontier AI organisations can assess the impacts of
      their AI systems. Privacy-enhancing technologies could be employed to enable data sharing between frontier AI
      organisations, third parties, and external researchers while protecting confidential information. As well as data,
      frontier AI organisations could also facilitate research on the societal impacts of their AI systems by providing
      access to the necessary infrastructure and compute.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0885_UK_Government2023
    name: Third Party Knowledge for AI systems' Downstream societal impacts
    description:
      Draw on multidisciplinary expertise and the lived experience of impacted communities to assess the downstream
      societal impacts of their AI systems. Impact assessments that account for a wide range of potential societal
      impacts and meaningfully involve affected stakeholder groups could help to anticipate further downstream societal
      impacts.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0886_UK_Government2023
    name: Societal Impact Informed Risk Assessments
    description:
      Use assessments of downstream societal impacts to inform and corroborate risk assessments. Downstream societal
      impacts, such as threats to democracy, widespread unemployment, and environmental impacts, could be considered in
      risk assessments of AI systems, alongside more direct risks. See the Responsible Capability Scaling section for
      more information on good practices for risk assessment.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0910_UK_Government2023
    name: Assessment of Safeguard Costs for Users
    description:
      Regularly assess the costs of safeguards to users, including bias and loss of privacy, as well as restrictions on
      users’ freedom to discuss sensitive topics with AI agents in appropriate contexts. This may involve, for instance,
      estimating the false positive rates of filters by sampling blocked inputs and outputs; comparing the capabilities,
      efficiency, and user ratings of models that lack certain safeguards against models that have the safeguards in
      place; and conducting user interviews to understand how concerned informed users are about losses in privacy and
      the emergence of biases in algorithmically filtered content.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0634_Barrett2024
    name: Trustworthy AI practices
    description: "The characteristics

      of trustworthy AI

      are integrated into

      organizational policies,

      processes, procedures,

      and practices."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0645_Barrett2024
    name: Safety-First Culture
    description: "Organizational policies

      and practices are in

      place to foster a critical

      thinking and safety-

      first mindset in the

      design, development,

      deployment, and uses of

      AI systems to minimize

      potential negative

      impacts."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0038_Casper2025
    name: Security measures
    description:
      Given the challenges of securing model weights and the hazards of leaks (Nevo et al., 2024), frontier developers
      can be required to document high-level noncompromising information about their security measures (e.g., Anthropic,
      2024).
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0043_Eisenberg2025
    name: Implement AI asset protection framework
    description:
      Deploy technical protection measures including encryption, secure enclaves, and versioning controls for AI models
      and associated data.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0044_Eisenberg2025
    name: Establish security validation framework
    description:
      Execute comprehensive pre-deployment security validation including AI-specific vulnerability assessments,
      penetration testing, and security requirement verification.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0045_Eisenberg2025
    name: Implement continuous security testing system
    description:
      Deploy ongoing security testing mechanisms including automated vulnerability scanning, continuous security
      monitoring, and periodic reassessment of security controls.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0046_Eisenberg2025
    name: Implement AI security defense system
    description:
      Deploy active defense mechanisms combining continuous security monitoring, input validation, adversarial
      detection, and adaptive response capabilities specific to AI systems.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0100_Future_of_Life_Institute2024
    name: Compliance certification with ISO, SOC, HIPAA
    description: ""
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0126_Future_of_Life_Institute2024
    name: Mandatory security controls
    description: "- Use of password managers

      - Physical security keys

      - Compliance monitoring software for software updates

      - Multifactor authentification on all platforms

      - Regular cybersecurity training"
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0134_Future_of_Life_Institute2024
    name: Physical security controls
    description:
      "Please indicate whether your organization implements the following physical security controls. Please
      specify further whether they are implemented at all staff locations or more sparsely

      - Offices guarded by physical security teams

      - Comprehensive access logging for premises

      - Office entrances monitored by security cameras

      - Office access controlled via key cards implementing least access priviledge"
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0148_Future_of_Life_Institute2024
    name: Require security clearances and have private investigators conduct security checks
    description:
      "Does your organization defend against insider threats by requiring security clearances or by having
      private investigators conduct background checks? Please select which interventions are applied when hiring or
      appointing individuals for the groups listed below.

      - Members of the board of directors

      - All staff with access to model weights

      - Certain key employees

      - All Staff"
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0188_Schuett2023
    name: Military-grade information security
    description:
      The information security of AGI labs should be proportional to the capabilities of their models, eventually
      matching or exceeding that of intelligence agencies (e.g. sufficient to defend against nation states).
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0199_Schuett2023
    name: Protection against espionage
    description: AGI labs should take adequate measures to tackle the risk of state-sponsored or industrial espionage.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0210_Schuett2023
    name: Security standards
    description:
      AGI labs should comply with information security standards (e.g. ISO/IEC 27001 or NIST Cybersecurity Framework).
      These standards need to be tailored to an AGI context.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0215_Schuett2023
    name: Tracking model weights
    description: AGI labs should have a system that is intended to track all copies of the weights of powerful models.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0252_Wiener2024
    name: Cybersecurity protocols to prevent the model from being unintentionally stolen
    description: "Implement reasonable administrative, technical, and physical

      cybersecurity protections to prevent unauthorized access to, misuse

      of, or unsafe post-training modifications of, the covered model

      and all covered model derivatives controlled by the developer that

      are appropriate in light of the risks associated with the covered

      model, including from advanced persistent threats or other

      sophisticated actors."
    hasDocumentation:
      - doc-Wiener2024
    type: Action
  - id: A0261_EU_AI_Office2025
    name: Security mitigations
    description:
      Signatories commit to implementing state-of-the-art security mitigations designed to thwart such unauthorised
      access by well-resourced and motivated non-state-level adversaries, including insider threats from humans or AI
      systems, so as to meet at least the RAND SL3 security goal or equivalent, and achieve higher security goals (e.g.,
      RAND SL4 or SL5)
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0513_NIST2024
    name: Architecture Monitoring Verification
    description:
      Verify that GAI system architecture can monitor outputs and performance, and handle, recover from, and repair
      errors when security anomalies, threats and impacts are detected.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0516_NIST2024
    name: Security Vulnerability Assessment
    description:
      "Apply established security measures to: Assess likelihood and magnitude of vulnerabilities and threats such as
      backdoors, compromised dependencies, data breaches, eavesdropping, man-in-the-middle attacks, reverse engineering,
      autonomous agents, model theft or exposure of model weights, AI inference, bypass, extraction, and other baseline
      security concerns."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0519_NIST2024
    name: Security Effectiveness Metrics
    description:
      Identify metrics that reflect the effectiveness of security measures, such as data provenance, the number of
      unauthorized access attempts, inference, bypass, extraction, penetrations, or provenance verification.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0679_Barrett2024
    name: Evaluate Security & Resilience
    description: "AI system security and

      resilience – as identified

      in the Map function

      – are evaluated and

      documented."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0819_UK_Government2023
    name: Application of Infrastructure Principles
    description:
      Apply good infrastructure principles to every part of this process from design to decommissioning. This is
      important as threats can occur at different stages of an AI project’s life cycle.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0820_UK_Government2023
    name: Regular Assessment of Supply Chain Security
    description:
      Regularly assess the security of their supply chains and ensure suppliers adhere to the same standards their own
      organisation applies. Ensuring data, software components and hardware are obtained from trusted sources will help
      mitigate supply chain risk.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0825_UK_Government2023
    name: Tracking Tools for Security and Version Control Assets
    description:
      Have processes and tools to track, authenticate, secure and version control assets and be able to roll back to a
      known safe state in the event of a compromise. This is important as data and models do not remain static during
      the whole lifespan of an AI project.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0835_UK_Government2023
    name: Default Integration of Secure Settings
    description:
      Integrate the most secure settings within your products by default. Where configuration is necessary, default
      options should be broadly secure against common threats.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0836_UK_Government2023
    name: Default Necessary Security Updates
    description:
      Ensure necessary security updates are a default part of every product and use secure, modular update procedures to
      distribute them. This will help your products remain secure in the face of new and developing threats.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0848_UK_Government2023
    name: Suitable Level of Screening
    description:
      Apply a suitable level of screening, informed by a role-based risk assessment, to all individuals who are provided
      access to organisational assets including permanent, temporary and contract workers.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0875_UK_Government2023
    name: Privacy Research
    description: Improving our ability to address the privacy risks associated with AI systems
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0876_UK_Government2023
    name: Cybersecurity Research
    description: Improving our ability to ensure the security of AI systems
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0877_UK_Government2023
    name: Criminality Research
    description:
      Improving our ability to prevent criminal behaviour through the use of AI systems (e.g. fraud, online child sexual
      abuse)
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0895_UK_Government2023
    name: Discretion for Development, Storage, and Sharing of Content Filters
    description:
      Exercise appropriate caution when developing, storing, or sharing content filters – and any specialised datasets
      used to produce them. In some cases, components of filters or datasets used to create them can be used to train
      higher-risk models. For instance, a classifier that evaluates the aggressiveness of a model’s outputs may be used
      to train the model to be more aggressive.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0984_Gipiskis2024
    name: Protect proprietary or unreleased AI model ar- chitecture and parameters
    description:
      "The developers of AI models can invest in cybersecurity to prevent compute re- sources, training
      source code, model weights, and other critical resources from being accessed and copied by unauthorized third
      parties (e.g., through insider threats or supply chain attacks).

      Access to model source code and weights can be restricted through an access control scheme, such as role-based
      access control. If access to model outputs by third parties is required, it can be provided through an API. Air
      gaps can block unauthorized remote access. In the case of necessary interaction with an external network, network
      bandwidth limitations can also be enforced to increase the detection window of potential breaches [108]."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0985_Gipiskis2024
    name: Hardware limitations on data center network connections
    description:
      "Hardware-enforced bandwidth limitations on data center network connections can protect AI model
      weights from unauthorized access or exfiltration, by lim- iting the speed of model weight access on the
      connections between data centers and the outside world.

      Such limitations can be put in place in multiple ways, for example by only constructing connections with a
      specific bandwidth. The output rate on all data channels can be set low enough that copying the weights is
      possible in principle (e.g., to enable regular backups), but would take so long that an unauthorized exfiltration
      of the weights could be detected and prevented.

      Such rate-limiting is only effective if it applies to all output connections for all storage locations on which
      the weights of the model are stored [139]."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1045_Uuk2024
    name: Advanced information security
    description:
      Implementing advanced cybersecurity measures and insider threat safeguards to protect proprietary and unreleased
      model weights.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0078_Eisenberg2025
    name: Implement AI alignment validation system
    description:
      Establish processes for validating and maintaining AI system alignment with human values and goals, including
      testing for goal preservation, monitoring for objective drift, and validation of decision-making processes against
      ethical standards. Includes specific attention to detecting and preventing potentially misaligned behaviors,
      emergent goals, or deceptive actions. Covers using interpretability techniques to measure and assure alignment
      with intended goals.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0171_Schuett2023
    name: Alignment Techniques
    description: AGI labs should implement state-of-the-art safety and alignment techniques.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0870_UK_Government2023
    name: Interpretability and Explainability Research
    description: Improving our ability to understand the inner functioning of AI systems and explain their behaviour
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0873_UK_Government2023
    name: Reliability and controllability (or “alignment”) research
    description:
      Improving the consistency of an AI system in adhering to the specifications it was programmed to carry out and
      operating in accordance with the designer’s intentions, and decreasing its potential to behave in ways its user or
      developer does not want (e.g. producing offensive or biased responses, not refusing harmful requests, or employing
      harmful capabilities without prompting)
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0896_UK_Government2023
    name: Fine-Tuning Models
    description:
      Fine-tune models to reduce the tendency to produce harmful outputs. This may involve using reinforcement learning
      from human or AI-generated feedback regarding the appropriateness of different model outputs e.g. a constitutional
      based approach where human input to the fine-tuning process is provided by a list of principles. It may also
      involve fine-tuning models on curated datasets of appropriate responses to prompts. Where human feedback is used,
      the mental wellbeing of moderators may need to be considered.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0929_UK_Government2023
    name: Harmful Data for Reduction of Dangerous Capabilities
    description:
      For some kinds of risks, explore options to use harmful data to reduce AI systems’ dangerous capabilities or to
      help develop mitigation tools. For example, by fine-tuning a system using labelled harmful content to refuse
      requests related to the harmful information.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0978_Gipiskis2024
    name: AI model-assisted oversight of AI systems
    description:
      "AI model-assisted oversight can help monitor and supervise the training of increasingly capable GPAI
      systems, which may become difficult to oversee at scale by human supervisors during training or testing.
      Monitoring and supervision may become especially difficult in cases where increasingly advanced GPAIs perform near
      or above human level in some specialized domains, where supervision quality might fail to keep pace with
      capabilities improvement. The training signal may include labeled data, reward function, and user feedback on
      produced outputs. Currently, there are two broad approaches to provide scalable training signals to such systems:

      1. Scalable oversight: Improving of the supervisor’s capabilities to supervise, such that they can provide
      accurate training signals quickly and at scale [31].

      For example, a debate format can be used between two GPAI systems (two instances of the same GPAI, or similarly
      capable systems). A Human supervisor judges the debate, making it easier to assess correct responses in domains
      which might otherwise require significant time investment of domain specific expertise [102].

      2. Weak-to-strong generalization: Enhance the training signals while ensur- ing that the enhanced signal remains
      faithful to the intentions of the orig- inal human-provided signal [37].

      For example, a hierarchical (“bootstrapping”) oversight approach can be implemented: A series of GPAI models with
      increasing capabilities are used, where each model in the hierarchy provides oversight for the next more capable
      model. The least capable model at the base of the hierarchy is the only one directly overseen by human
      supervisors, as it is easier to oversee than the more capable models."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1011_Gipiskis2024
    name: GPAI models explaining model outputs in a zero-sum debate game
    description:
      "Debate is a technique that aims to produce reliable explanations of AI model outputs that are too
      complicated for humans to understand, by letting two GPAI models role-playing in a debate produce an explanation
      in a dialogue [102].

      For example, an AI model may produce an output which is time-consuming for humans to verify as doing so may
      require going through extensive sources.

      Given such an output, the developer can use two natural language AI systems in an adversarial two-player setup to
      explain the output. These two natural language AI systems can be copies of the AI model that produced the output.

      In this setup, one AI system gives a short explanation of the output. The second AI system responds to this
      explanation with a counter-explanation or an argument why the first explanation was not correct. This continues
      for a fixed number of turns, with the two AI systems pointing out inconsistencies in each others’ explanations.

      After this sequence of statements, a human or an AI judge evaluates the ex- planations of both AI systems to
      determine which one is more convincing. The results of this debate can then be used for further training of the
      models via reinforcement learning, where outputs that are more truthful and convincing arguments and explanations
      are positively reinforced, while misleading or false outputs are negatively reinforced."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1026_Uuk2024
    name: Harmlessness training
    description:
      State-of-the-art reinforcement learning and fine-tuning techniques, such as Reinforcement Learning from Human
      Feedback (RLHF) or Direct Preference Optimization (DPO), to ensure models do not engage in unsafe behavior.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0017_Bengio2025
    name: Safety Analysis
    description:
      "Helps understand the dependencies between components and the system that they are part of, in order to
      anticipate how component failures could lead to system-level hazards.


      This approach is used across safety- critical fields, e.g. to anticipate and prevent aircraft crashes or nuclear
      reactor core meltdowns"
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0019_Bengio2025
    name: Safety of The Intended Function
    description:
      "An approach that requires engineers to provide evidence that a system is safe when operating as
      intended.


      This approach is used in many engineering fields, such as in the construction and testing of road vehicles."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0118_Future_of_Life_Institute2024
    name: Hazardous Knowledge Unlearning
    description:
      Has your organization removed hazardous knowledge from its flagship model via unlearning techniques before
      deployment?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0270_EU_AI_Office2025
    name: Safety Mitigations
    description:
      "Signatories commit to: (1) implementing technical safety mitigations along the entire model lifecycle that are
      proportionate to the systemic risks arising from the development, the making available on the market, and/or the
      use of GPAISRs, in order to reduce the systemic risks of such models to acceptable levels, and further reduce
      systemic risk as appropriate; and (2) ensuring that safety mitigations are proportionate and state-of-the-art."
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0417_NIST2024
    name: Threat Modeling Process
    description: Engage in threat modeling to anticipate potential risks from GAI systems
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0480_NIST2024
    name: Threat Profiling
    description:
      Profile threats and negative impacts arising from GAI systems interacting with, manipulating, or generating
      content, and outlining known and potential vulnerabilities and the likelihood of their occurrence.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0495_NIST2024
    name: Statistical Bias Management
    description:
      Assess and manage statistical biases related to GAI content provenance through techniques such as re-sampling,
      re-weighting, or adversarial training.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0498_NIST2024
    name: Privacy-Enhancing Technologies
    description:
      Use techniques such as anonymization, differential privacy or other privacy-enhancing technologies to minimize the
      risks associated with linking AI-generated content back to individual human subjects.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0514_NIST2024
    name: Inappropriate Query Handling
    description:
      Verify that systems properly handle queries that may give rise to inappropriate, malicious, or illegal usage,
      including facilitating manipulation, extortion, targeted impersonation, cyber-attacks, and weapons creation.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0518_NIST2024
    name: User Satisfaction Survey
    description:
      Conduct user surveys to gather user satisfaction with the AI-generated content and user perceptions of content
      authenticity. Analyze user feedback to identify concerns and/or current literacy levels related to content
      provenance and understanding of labels on content.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0529_NIST2024
    name: ML Explanation Application
    description:
      "Apply and document ML explanation results such as: Analysis of embeddings, Counterfactual prompts, Gradient-based
      attributions, Model compression/surrogate models, Occlusion/term reduction."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0731_NIST2024
    name: Information Security; Harmful Bias and Homogenization
    description: "Evaluate GAI content and data for representational biases and employ

      techniques such as re-sampling, re-ranking, or adversarial training to mitigate

      biases in the generated content. (AI Deployment, AI Impact Assessment, Governance and Oversight, Operation and
      Monitoring)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0872_UK_Government2023
    name: Robustness Research
    description: Improving the resilience of AI systems e.g. against attacks intended to disrupt their proper functioning
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0874_UK_Government2023
    name: Bias and discrimination Research
    description: Improving our ability to address bias and discrimination in AI systems
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0878_UK_Government2023
    name: Research into other Societal Harms
    description:
      Improving our ability to prevent other societal harms arising from the use of AI systems, including psychological
      harm, misinformation, and other societal harms.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0879_UK_Government2023
    name: Built-in Tools for Harm Mitigation
    description:
      When a probable and consequential harm from a frontier AI organisation’s system is identified, investigate whether
      there are tools that can be built to mitigate this harm. For instance, recognizing the rise in AI-generated child
      exploitation and abuse content, some social media platforms are developing tools for identifying and removing
      child sexual abuse content.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0892_UK_Government2023
    name: Content Filters
    description:
      Apply content filters to both model inputs and model outputs. The input filters can block harmful requests (e.g.
      requests for advice on building weapons) from being processed by the model. Content modifiers could adjust harmful
      prompts to elicit non-harmful responses. The output filters can block harmful model outputs (e.g. instructions on
      building weapons) from being sent back to the user.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0894_UK_Government2023
    name: Robust Content Filters
    description:
      Invest in making content filters robust to “jailbreaking” attempts. Work to ensure filters are robust to
      jailbreaking attempts, for instance by including examples of jailbreaking attempts in the datasets used to develop
      filters.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0897_UK_Government2023
    name: Model Prompting
    description:
      Prompt models to avoid harmful behaviour. This may involve, for instance, using a “meta prompt” to instruct a
      model that it should ignore requests to cause harm. Alternatively, prompt distillation or other methods can be
      used to fine-tune their models to behave as though they have received particular prompts.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0898_UK_Government2023
    name: Rejection Sampling
    description:
      Consider also applying “rejection sampling” methods to model outputs. These methods involve generating several
      outputs, scoring them on their harmfulness, and then only presenting the least harmful outputs to the user.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0908_UK_Government2023
    name: Exploration of New Safeguards
    description:
      Explore new safeguards and countermeasures in response to patterns of misuse, recognising that appropriate
      measures may vary based on model type, usage patterns, and our technical understanding of model capabilities.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0911_UK_Government2023
    name: Reduction of Costs for Users
    description:
      Explore strategies for reducing the costs of safeguards to users, such as “structured transparency” methods to
      reduce the cost of usage monitoring to user privacy, or tiered access to models with different safeguards for
      differently qualified users.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0935_Gipiskis2024
    name: Restrict web access during AI training
    description:
      Developers can restrict or disable AI systems’ internet access during training. For example, developers can
      restrict web access to read-only (e.g., by disabling write-access through HTTP POST requests and access to web
      forms) or limit the access of the AI system to a local network
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0936_Gipiskis2024
    name: Adversarial training
    description:
      "Adversarial training [83] is a technique for training AI models in which adver- sarial inputs are
      generated for a model, and the model is then trained to give the correct outputs for those adversarial inputs.

      Adversarial training can involve adversarial examples generated by human experts, human users, or other AI
      systems."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0939_Gipiskis2024
    name: Incorporating the estimation of atypical input samples or classes for better model reliability
    description:
      Incorporating the estimation of rare atypical input samples or classes might improve a model’s reliability, both
      with respect to its predictions and confidence calibration. Model predictions for rare inputs and classes may have
      a tendency of being overconfident and have worse accuracy scores [232]. For LLMs, the negative log-likelihood can
      be used as an atypicality measure. For discriminative models, Gaussian Mixture Models can be employed to estimate
      conditional and marginal distributions, which are then used in atypicality measurement.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0947_Gipiskis2024
    name: Enforcing model output interpretability post-training
    description:
      "While a resulting trained model may be opaque with respect to its predictions, the final output in a
      system that involves the model can nonetheless be com- pletely interpretable.

      For example, a neuro-symbolic system for robot navigation can use a language model to generate potential
      navigation plans, then have a deterministic solver simulate executing valid plans [128]. The optimal plan found is
      executed in the real world and is interpretable."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0948_Gipiskis2024
    name: Paraphrasing to reduce hidden information
    description:
      Paraphrasing can mitigate steganography and encoded reasoning by reducing the physical size of the hidden
      information encoded in text [166].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0951_Gipiskis2024
    name: Modification of model internal representation
    description:
      "Model providers can modify the internal representation of the model [135, 237] up to the granular
      level and in consultation with other tools that aid in under- standing what the internal representation of the
      model is.

      For example, if a model that is meant to give factual health data learned an incorrect fact, the model provider
      can use Linear Artificial Tomography (LAT) [237] to identify the representations responsible for the incorrect
      fact, and then modify that representation via modifying individual weights, or modify the en- tire representation
      itself by modifying entire layers."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0952_Gipiskis2024
    name: Incorporating goal uncertainty into AI systems to mitigate risky behaviors
    description:
      Incorporating uncertainty into AI system goals can prevent rushed decision- making and incentivize such systems to
      gather additional information or to refer to human oversight when faced with ambiguity [228].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0973_Gipiskis2024
    name: Pop-up interventions in LLMs
    description:
      "Supplementary information can be shown to the user in specific query topics where factual accuracy is
      critical. This intervention can effectively divert users from potential inaccuracies generated by AI models in
      sensitive contexts. For example, during electoral processes, where model hallucinations can be particu- larly
      costly or have a negative impact on society, LLMs can offer their users the option of being redirected to accurate
      and up-to-date information sources [11].

      Since pop-up interventions can be intrusive to workflows, they are best used in situations where the benefits of
      the information outweigh the cost of distraction."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0983_Gipiskis2024
    name: Least Privilege access
    description:
      "Deployers of an AI system can restrict its permissions to a whitelisted set of pre- determined
      options, such that all options not on the whitelist are not accessible to the AI [200, 146].

      The entries on the whitelist can be chosen to be as small as possible for the AI system to fulfill its intended
      purpose, to reduce the attack surface of external attackers, and to decrease the probability that the AI system
      accidentally takes actions with large unintended side-effects.

      For example, such whitelisting can apply to network connections, execution of other programs, access to knowledge
      bases, and the action space of the AI system. It can be implemented through running the AI system on an OS-level
      virtualization, on networks behind a firewall, and in extreme cases on air-gapped machines."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0990_Gipiskis2024
    name: Debiasing methods
    description:
      "Providers of AI models can apply techniques to reduce the biases of their models.

      Current debiasing methods focus on three main types of bias:

      • Racial and religious bias - Stereotypes based on religious beliefs or racial beliefs.

      • Gender bias - Stereotypes tied to gender roles and expectations.

      • Political and cultural bias - Propagation of dominant ideologies or extrem-

      ist attitudes.

      Debiasing methods can be categorized based on their application during AI development:

      • Data pre-processing - Removing or correcting unwanted and biased data, and augmenting quality data to offset
      data bias, such as rebalancing datasets with counterfactual data augmentation.

      • During training - Intervening on the training dynamics of the AI model, such as introducing debiasing terms in
      the objective function or by nega- tively reinforcing biased outputs.

      • Post-training - Applying techniques to correct a trained but biased model, such as modifying the embedding
      space."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0991_Gipiskis2024
    name: Knowledge unlearning techniques
    description:
      Knowledge unlearning techniques allow specific information to be “forgotten” without the need for retraining the
      entire model, preserving its general capabil- ities. These techniques can be used to reduce privacy risks and
      protect against copyrighted or harmful content [96, 188].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1014_Gipiskis2024
    name: Tamper-resistant safeguards for open-weight models
    description:
      Training and implementing safeguards can improve the robustness of open- weight models against modifications from
      fine-tuning or other methods to change the learned weights of the models, especially those aimed at removing
      safety re- strictions. These safeguards can be resilient even after extensive fine-tuning, ensuring that the model
      retains its protective measures [199].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1019_Uuk2024
    name: Adversarial Robustness
    description:
      State-of-the-art methods such as adversarial training to make models robust to adversarial attacks (e.g.,
      jailbreaking).
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A1021_Uuk2024
    name: Capability restrictions
    description:
      Restricting risky capabilities of deployed models, such as advanced autonomy (e.g., self-assigning new sub-goals,
      executing long-horizon tasks) or tool use functionalities (e.g., function calls, web browsing).
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A1027_Uuk2024
    name: Input and output filtering
    description:
      Monitoring for dangerous outputs (e.g., code that appears to be malware or viral genome sequences) and inputs that
      violate acceptable use policies to ensure models do not engage in harmful behavior.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A1042_Uuk2024
    name: Unlearning Techniques
    description: Removing specific harmful capabilities (e.g., pathogen design) from models using unlearning techniques.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0033_Casper2025
    name: Labeling AI-generated content
    description:
      To aid in digital forensics, content produced from AI systems can be labeled with metadata, watermarks, and
      notices.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0059_Eisenberg2025
    name: Implement content moderation system
    description:
      Implement automated and/or human-in-the-loop content moderation mechanisms to detect and filter harmful content in
      real-time, including content classification, blocking procedures, and automated enforcement of safety boundaries.
      Include detection of potential malicious use patterns.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0060_Eisenberg2025
    name: Implement content safety incident response
    description:
      Establish procedures for investigating, documenting, and remediating harmful content incidents that bypass
      moderation systems, including coordination with relevant authorities, root cause analysis, and system improvement
      protocols. Include specific procedures for suspected malicious use cases.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0087_Future_of_Life_Institute2024
    name: AI-Generated Content Watermarking
    description:
      "Are the outputs of your firm’s AI systems tagged with watermarks that indicate that an AI generates
      the material?

      - Video

      - Image"
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0108_Future_of_Life_Institute2024
    name: Deepfake creation policy
    description:
      Can individuals use your firm’s AI systems to create deepfakes (i.e., synthetic audio or visual representations)
      of a specific individual?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0161_Future_of_Life_Institute2024
    name: Watermarking
    description: Information regarding integrated watermarking systems.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0398_NIST2024
    name: Harmful Content Prevention
    description:
      Establish policies and mechanisms to prevent GAI systems from generating CSAM, NCII or content that violates the
      law.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0424_NIST2024
    name: Provenance Method Measurement
    description:
      Establish policies for measuring the effectiveness of employed content provenance methodologies (e.g.,
      cryptography, watermarking, steganography, etc.)
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0456_NIST2024
    name: Fact-Checking Deployment
    description:
      Deploy and document fact-checking techniques to verify the accuracy and veracity of information generated by GAI
      systems, especially when the information comes from multiple (or unknown) sources.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0457_NIST2024
    name: Synthetic Content Detection
    description:
      Develop and implement testing techniques to identify GAI produced content (e.g., synthetic media) that might be
      indistinguishable from human-generated content.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0473_NIST2024
    name: PII Detection Methods
    description:
      Leverage approaches to detect the presence of PII or sensitive data in generated output text, image, video, or
      audio.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0476_NIST2024
    name: Provenance Harm Identification
    description:
      Identify potential content provenance harms of GAI, such as misinformation or disinformation, deepfakes, including
      NCII, or tampered content. Enumerate and rank risks based on their likelihood and potential impact, and determine
      how well provenance solutions address specific risks and/or harms.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0483_NIST2024
    name: Origin Tracing Methods
    description: Employ methods to trace the origin and modifications of digital content.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0484_NIST2024
    name: Provenance Analysis Tools
    description:
      Integrate tools designed to analyze content provenance and detect data anomalies, verify the authenticity of
      digital signatures, and identify patterns associated with misinformation or manipulation.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0520_NIST2024
    name: Authentication Method Reliability
    description:
      Measure reliability of content authentication methods, such as watermarking, cryptographic signatures, digital
      fingerprints, as well as access controls, conformity assessment, and model integrity verification, which can help
      support the effective implementation of content provenance techniques. Evaluate the rate of false positives and
      false negatives in content provenance, as well as true positives and true negatives for verification.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0527_NIST2024
    name: Digital Content Transparency
    description:
      Use digital content transparency solutions to enable the documentation of each instance where content is
      generated, modified, or shared to provide a tamper-proof history of the content, promote transparency, and enable
      traceability. Robust version control systems can also be applied to track changes across the AI lifecycle over
      time.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0867_UK_Government2023
    name: Identification of AI-generated content
    description:
      Research techniques that allow AI-generated content to be identified. Invest in researching how AI-generated
      content may be watermarked, including AI- generated text, photos and videos, and experiment with the
      implementation of such techniques. It is particularly technically difficult to attach watermarks and prove the
      provenance of text.One method could involve making the model more statistically likely to use certain phrases or
      words in a way that is unnoticeable to humans, but can be picked up by a detector, provided a long enough sequence
      of text. However, this approach may not be robust to attempts to scrub off the watermark e.g. by having another AI
      model paraphrase the text.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0868_UK_Government2023
    name: Robust Watermarks for AI generated content
    description:
      Explore the use of watermarks for AI generated content that are robust to various perturbations. Explore the use
      of watermarks for AI generated content that are robust to various perturbations after their creation, including
      attempts at removal. To make the removal of watermarks more difficult, developers of generative AI models may need
      to consider how they distribute certain information about their watermarking methods or open-sourcing their
      classifiers. This may also include monitoring ways in which adversarial users are attempting to scrub off their
      watermarks and patching, where relevant, such means of circumvention. It also includes a recognition that
      watermarking however may not be appropriate in all circumstances given the limitations.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0869_UK_Government2023
    name: AI Output Databases
    description:
      Explore databases of content generated or manipulated by a model to identify AI- generated content. These
      databases could be queried by third parties, including auditors and regulators, facilitating identification of
      potentially AI-generated content. Such databases could include only a subset of generated content, which is
      flagged as potentially important. To ensure user privacy, privacy-preserving techniques could be explored in
      conjunction with such databases, such as hashing technologies. This allows for the identification of AI-generated
      content without the need to store the actual content, thereby respecting user privacy. Additionally, common
      standards between different databases from various frontier AI organisations could facilitate a unified search,
      allowing for the identification of AI-generated content across all frontier AI organisations simultaneously.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0974_Gipiskis2024
    name: AI identification
    description:
      "AI identifiers can be used to indicate that an AI is involved in a process or an interaction [40].

      For AI systems that interact directly with users, a visible output may be used, e.g., a displayed text message
      saying “I am an AI language model”, accompanied with the appropriate warnings and caveats relevant to the user,
      [40]. Whereas, for AI systems that interact with other systems or applications, other forms of watermark or unique
      identifiers can be used. In either situation, agent cards can serve as an identifier, where further details about
      the underlying AI system, the specific instance of the AI agent, and other information relevant to the development
      of the agent, can be included."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0975_Gipiskis2024
    name: AI output watermaking
    description:
      Output produced by or with AI assistance can be marked to clearly identify its origin. Verification of the
      watermark can involve the use of statistical tests or having the mark immediately visible to a human inspector.
      Ideally, the watermark does not significantly alter the utility of the output, and is robust against digital and
      physical manipulation that results in data degradation [216, 145].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0976_Gipiskis2024
    name: AI output metadata
    description:
      Output produced or whose production is aided by AI can contain metadata to record its origin and the
      transformations it has undergone. Metadata is evidence that subsequent versions or its derivatives come from this
      original version. The metadata can include the original AI model source, along with ownership, and its subsequent
      edits [169]. For example, an image produced by an AI model can contain metadata showing the date of creation and
      the AI model that produced it. Subsequent versions can reference this information and, if they are intermediary
      versions, can include descriptions of any editing that has taken place.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0937_Gipiskis2024
    name: Cost-inducing training of AI models specifically for malicious use
    description:
      AI models can be designed to make further post-training modifications (e.g., fine-tuning) too costly for malicious
      uses while preserving normal adaptability for non-malicious uses
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0001_Bengio2025
    name: Audits
    description:
      "A formal review of an organisation’s compliance with standards, policies, and procedures, typically
      carried out by an external party.


      AI auditing is a rapidly growing field, but builds on long histories of auditing in other fields, including
      financial, environmental, and health regulation."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0002_Bengio2025
    name: Benchmarks
    description:
      A standardised, often quantitative test or metric used to evaluate and compare the performance of AI systems on a
      fixed set of tasks designed to represent real- world usage
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0010_Bengio2025
    name: Model Evaluation
    description:
      "Processes to assess and measure an AI system's performance on a particular task.

      There are countless AI evaluations to assess different capabilities and risks, including for security."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0011_Bengio2025
    name: Red Teaming
    description:
      An exercise in which a group of people or automated systems pretend to be an adversary and attack an
      organisation’s systems in order to identify vulnerabilities.
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0053_Eisenberg2025
    name: Establish and apply performance testing and validation framework
    description:
      Implement comprehensive performance requirements, testing protocols, and validation procedures to ensure AI
      systems meet capability requirements and maintain reliable operation across intended use cases.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0055_Eisenberg2025
    name: Establish and apply fairness testing and validation framework
    description:
      Implement comprehensive procedures to validate model fairness during development and pre-deployment, including
      test dataset creation, metric definition, and systematic assessment of performance disparities across demographic
      groups.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0063_Eisenberg2025
    name: Implement adversarial testing and red team program
    description:
      Conduct systematic adversarial testing and red team exercises focused on probing AI system capabilities,
      identifying potential misuse vectors, and exposing unintended harmful behaviors. Testing should explore ways the
      system could be manipulated to produce dangerous outputs, bypass safety guardrails, or exhibit undesired emergent
      behaviors. Include scenarios involving both individual and coordinated attempts to exploit the system’s
      capabilities.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0093_Future_of_Life_Institute2024
    name: Bug bounties for model vulnerabilities
    description: Any programs offering financial rewards for flagging model vulnerabilities or dangerous use-cases.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0109_Future_of_Life_Institute2024
    name: Early Warning Evaluations for Catastrophic Risks
    description:
      Does your organization evaluate models during training for early warning signs of capabilities related to
      catastrophic risks to ensure risk thresholds are not exceeded? Please describe the regularity and scope of these
      evaluations and specify whether models are specifically fine-tuned to elicit the capabilities in question.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0121_Future_of_Life_Institute2024
    name: Internal Audit Team
    description:
      Does your firm have an internal audit team tasked with overseeing the effectiveness of its risk management
      practices? If yes, please briefly describe the team's responsibilities, size, powers, reporting lines, and whether
      it is led by a chief audit executive in the leadership team. In your response, please mention whether the team is
      independent of senior management and reports directly to the board of directors.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0137_Future_of_Life_Institute2024
    name: Pre-deployment external safety testing
    description:
      Any information related to external model audits. We specifically report information related to depth of model
      access, names of auditors, model versions, scope of evaluations, conflicts of interest, audit time and
      compensation.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0147_Future_of_Life_Institute2024
    name: Regular third-party penetration testing
    description:
      Does your organization regularly task third-party cybersecurity penetration testers to find vulnerabilities in the
      infrastructure on which models are developed and deployed? If yes, please share the cumulative budget your firm
      has dedicated to external pen tests in 2023 and specify the regularity at which your firm invites external pen
      tests. Please indicate the cumulative budget for third-party physical pen tests in 2023 separately.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0157_Future_of_Life_Institute2024
    name: Uplift trials
    description: Information about human-participant trials conducted to assess the marginal risks of model-access.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0165_Future_of_Life_Institute2024
    name: Dangerous capability evaluations
    description:
      This indicator reports on pre-deployment capability evaluations related to catastrophic risks. Model evaluations
      for other risks are not included here, as the empirical tests covered in the ‘Current Harms’ section provide a
      superior metric. Information includes evaluated risk domains, available information regarding model versions &
      task-specific fine-tuning, and relevant sources. We note that quality of evaluations may differ.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0166_Future_of_Life_Institute2024
    name: Internal red teaming exercises for cybersecurity infrastructure
    description: ""
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0177_Schuett2023
    name: Bug bounty programs
    description:
      AGI labs should have bug bounty programs, i.e. recognize and compensate people for reporting unknown
      vulnerabilities and dangerous capabilities.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0178_Schuett2023
    name: Dangerous capability evaluations
    description:
      AGI labs should run evaluations to assess their models’ dangerous capabilities (e.g. misuse potential, ability to
      manipulate, and power-seeking behavior).
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0185_Schuett2023
    name: Internal audit
    description:
      AGI labs should have an internal audit team, i.e. a team which assesses the effectiveness of the lab’s risk
      management practices. This team must be organizationally independent from senior management and report directly to
      the board of directors.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0204_Schuett2023
    name: Red teaming
    description: AGI labs should commission external red teams before deploying powerful models.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0213_Schuett2023
    name: Third-party governance audits
    description: AGI labs should commission third-party audits of their governance structures.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0214_Schuett2023
    name: Third-party model audits
    description: AGI labs should commission third-party model audits before deploying powerful models.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0250_Wiener2024
    name: Annual third-party audit
    description: "The bill would require

      a developer, beginning January 1, 2026, to annually retain a

      third-party auditor to perform an independent audit of compliance

      with those provisions, as prescribed. The bill would require the

      auditor to produce an audit report, as prescribed, and would require

      a developer to retain an unredacted copy of the audit report for as

      long as the covered model is made available for commercial,

      public, or foreseeably public use plus 5 years."
    hasDocumentation:
      - doc-Wiener2024
    type: Action
  - id: A0262_EU_AI_Office2025
    name: Independent external assessors
    description:
      Before placing a GPAISR on the market, signatories commit to obtaining independent external systemic risk
      assessments, including model evaluations, unless the model can be deemed sufficiently safe. After placing the
      GPAISR on the market, signatories commit to facilitating exploratory independent external assessments, including
      model evaluations.
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0277_Campos2025
    name: Identification of unknown risks
    description:
      In addition to risk identification based on the literature, developers should engage in extensive open-ended red
      teaming efforts, conducted both internally and by third parties.
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0339_Campos2025
    name: Audits
    description:
      Audits are provided by internal auditors and/or external auditors. In both cases, they are independent from peer
      pressure dynamics occurring within the teams dealing with the risk.
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0390_NIST2024
    name: Risk Capability Evaluation
    description:
      Establish policies to evaluate risk-relevant capabilities of GAI and robustness of safety measures, both prior to
      deployment and on an ongoing basis, through internal and external evaluations.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0393_NIST2024
    name: CBRN Testing Protocol
    description:
      Establish a test plan and response policy, before developing highly capable models, to periodically evaluate
      whether the model may misuse CBRN information or capabilities and/or offensive cyber capabilities.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0413_NIST2024
    name: Independent Evaluation Policy
    description:
      Policies are in place to bolster oversight of GAI systems with independent evaluations or assessments of GAI
      models or systems where the type and robustness of evaluations are proportional to the identified risks.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0419_NIST2024
    name: Standardized Measurement Protocols
    description:
      Establish policies, procedures, and processes detailing risk measurement in context of use with standardized
      measurement protocols and structured public feedback exercises such as AI red-teaming or independent external
      evaluations.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0432_NIST2024
    name: Contract Evaluation Clauses
    description: Include clauses in contracts which allow an organization to evaluate third-party GAI processes and standards.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0451_NIST2024
    name: Content Flow Testing
    description:
      Institute test and evaluation for data and content flows within the GAI system, including but not limited to,
      original data sources, data transformations, and decision-making criteria.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0454_NIST2024
    name: Output Accuracy Assessment
    description:
      Assess the accuracy, quality, reliability, and authenticity of GAI output by comparing it to a set of known ground
      truth data and by using a variety of evaluation methods (e.g., human oversight and automated evaluation, proven
      cryptographic techniques, review of content inputs).
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0458_NIST2024
    name: Adversarial Testing Plans
    description:
      Implement plans for GAI systems to undergo regular adversarial testing to identify vulnerabilities and potential
      manipulation or misuse.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0459_NIST2024
    name: Lineage Understanding Evaluation
    description: Evaluate whether GAI operators and end-users can accurately understand content lineage and origin.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0462_NIST2024
    name: Proficiency Test Delineation
    description: Delineate human proficiency tests from tests of GAI capabilities.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0464_NIST2024
    name: Stakeholder Testing Involvement
    description:
      Involve the end-users, practitioners, and operators in GAI system in prototyping and testing activities. Make sure
      these tests cover various scenarios, such as crisis situations or ethically sensitive contexts.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0471_NIST2024
    name: Fine-Tuned Model Re-evaluation
    description: Re-evaluate models that were fine-tuned or enhanced on top of third-party models.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0475_NIST2024
    name: Provenance Testing Practices
    description:
      Apply TEVV practices for content provenance (e.g., probing a system's synthetic data generation capabilities for
      potential misuse or vulnerabilities.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0479_NIST2024
    name: Adversarial Role-Playing
    description:
      Conduct adversarial role-playing exercises, GAI red-teaming, or chaos testing to identify anomalous or unforeseen
      failure modes.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0485_NIST2024
    name: Demographic Metric Disaggregation
    description:
      Disaggregate evaluation metrics by demographic factors to identify any discrepancies in how content provenance
      mechanisms work across diverse populations.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0486_NIST2024
    name: Feedback Exercise Metrics
    description: Develop a suite of metrics to evaluate structured public feedback exercises informed by representative AI Actors.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0487_NIST2024
    name: Novel Risk Measurement Methods
    description:
      Evaluate novel methods and technologies for the measurement of GAI-related risks including in content provenance,
      offensive cyber, and CBRN, while maintaining the models' ability to produce valid, reliable, and factually
      accurate outputs.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0489_NIST2024
    name: Data Quality Evaluation
    description:
      Evaluate the quality and integrity of data used in training and the provenance of AI-generated content, for
      example by employing techniques like chaos engineering and seeking stakeholder feedback.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0490_NIST2024
    name: Feedback Exercise Use Cases
    description:
      Define use cases, contexts of use, capabilities, and negative impacts where structured human feedback exercises,
      e.g., GAI red-teaming, would be most beneficial for GAI risk measurement and management based on the context of
      use.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0493_NIST2024
    name: External Evaluation Engagement
    description:
      Engage in internal and external evaluations, GAI red-teaming, impact assessments, or other structured human
      feedback exercises in consultation with representative AI Actors with expertise and familiarity in the context of
      use, and/or who are representative of the populations associated with the context of use.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0494_NIST2024
    name: Feedback Independence Verification
    description:
      Verify those conducting structured human feedback exercises are not directly involved in system development tasks
      for the same GAI model.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0499_NIST2024
    name: Baseline Model Selection
    description:
      Consider baseline model performance on suites of benchmarks when selecting a model for fine tuning or enhancement
      with retrieval-augmented generation.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0500_NIST2024
    name: Capability Claims Evaluation
    description: Evaluate claims of model capabilities using empirically validated methods
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0502_NIST2024
    name: Purpose-Built Testing Environment
    description:
      Utilize a purpose-built testing environment such as NIST Dioptra to empirically evaluate GAI trustworthy
      characteristics.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0503_NIST2024
    name: Performance Extrapolation Avoidance
    description: Avoid extrapolating GAI system performance or capabilities from narrow, non-systematic, and anecdotal assessments.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0511_NIST2024
    name: Fine-Tuned Safety Re-evaluation
    description: Re-evaluate safety features of fine-tuned models when the negative risk exceeds organizational risk tolerance.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0512_NIST2024
    name: Generated Code Review
    description:
      "Review GAI system outputs for validity and safety: Review generated code to assess risks that may arise from
      unreliable downstream decision-making."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0515_NIST2024
    name: Safety Circumvention Evaluation
    description: Regularly evaluate GAI system vulnerabilities to possible circumvention of safety measures.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0517_NIST2024
    name: Security Benchmarking
    description:
      Benchmark GAI system security and resilience related to content provenance against industry standards and best
      practices. Compare GAI system security features and content provenance methods against industry state-of-the-art
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0522_NIST2024
    name: AI Red-Teaming Resilience
    description:
      "Perform AI red-teaming to assess resilience against: Abuse to facilitate attacks on other systems (e.g.,
      malicious code generation, enhanced phishing content), GAI attacks (e.g., prompt injection), ML attacks (e.g.,
      adversarial examples/prompts, data poisoning, membership inference, model extraction, sponge examples)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0523_NIST2024
    name: Fine-Tuning Security Verification
    description: Verify fine-tuning does not compromise safety and security controls.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0531_NIST2024
    name: Data Exposure Red-Teaming
    description:
      "Conduct AI red-teaming to assess issues such as: Outputting of training data samples, and subsequent reverse
      engineering, model extraction, and membership inference risks; Revealing biometric, confidential, copyrighted,
      licensed, patented, personal, proprietary, sensitive, or trade-marked information; Tracking or revealing location
      information of users or members of training datasets."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0534_NIST2024
    name: Bias Benchmark Application
    description:
      Apply use-case appropriate benchmarks (e.g., Bias Benchmark Questions, Real Hateful or Harmful Prompts, Winogender
      Schemas15) to quantify systemic bias, stereotyping, denigration, and hateful content in GAI system outputs;
      Document assumptions and limitations of benchmarks, including any actual or possible training/test data cross
      contamination, relative to in-context deployment environment.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0628_Barrett2024
    name: Red-Team for Dangerous Behaviors
    description:
      "Use red teams and adversarial testing as part of extensive interaction with GPAIS to

      identify dangerous capabilities, vulnerabilities, or other emergent properties of such

      systems"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0647_Barrett2024
    name: Detect & Share Incidents
    description: "Organizational practices

      are in place to enable

      AI testing, identification

      of incidents, and

      information sharing."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0672_Barrett2024
    name: Involve Independent & External Assessors
    description: "Internal experts who

      did not serve as

      front-line developers

      for the system and/

      or independent

      assessors are involved

      in regular assessments

      and updates. Domain

      experts, users, AI

      actors external to the

      team that developed

      or deployed the AI

      system, and affected

      communities are

      consulted in support

      of assessments

      as necessary per

      organizational risk

      tolerance."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0674_Barrett2024
    name: Ensure Ethical Human Evaluation
    description: "Evaluations involving

      human subjects meet

      applicable requirements

      (including human

      subject protection) and

      are representative of the

      relevant population."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0677_Barrett2024
    name: Demonstrate Validity & Generalization Limits
    description: "The AI system to

      be deployed is

      demonstrated to be

      valid and reliable.

      Limitations of the

      generalizability beyond

      the conditions under

      which the technology

      was developed are

      documented."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0678_Barrett2024
    name: Evaluate Safety & Failure Modes
    description: "The AI system is

      evaluated regularly

      for safety risks – as

      identified in the Map

      function. The AI

      system to be deployed

      is demonstrated to

      be safe, its residual

      negative risk does

      not exceed the risk

      tolerance, and it can

      fail safely, particularly

      if made to operate

      beyond its knowledge

      limits. Safety metrics

      reflect system reliability

      and robustness, real-

      time monitoring, and

      response times for AI

      system failures."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0684_Barrett2024
    name: Evaluate TEVV Effectiveness
    description: "Effectiveness of the

      employed TEVV metrics

      and processes in the

      Measure function

      are evaluated and

      documented."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0689_Barrett2024
    name: Validate Trustworthiness with Expert Input
    description: "Measurement results

      regarding AI system

      trustworthiness in

      deployment context(s)

      and across the AI

      lifecycle are informed

      by input from domain

      experts and relevant

      AI actors to validate

      whether the system is

      performing consistently

      as intended. Results are

      documented."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0707_NIST2024
    name: Harmful Bias and Homogenization Assessment
    description:
      "Conduct fairness assessments to measure systemic bias. Measure GAI system

      performance across demographic groups and subgroups, addressing both

      quality of service and any allocation of services and resources. Quantify harms

      using: field testing with sub-group populations to determine likelihood of

      exposure to generated content exhibiting harmful bias, AI red-teaming with

      counterfactual and low-context (e.g., “leader,” “bad guys”) prompts. For ML

      pipelines or business processes with categorical or numeric outcomes that rely

      on GAI, apply general fairness metrics (e.g., demographic parity, equalized odds,

      equal opportunity, statistical hypothesis tests), to the pipeline or business

      outcome where appropriate; Custom, context-specific metrics developed in

      collaboration with domain experts and affected communities; Measurements of

      the prevalence of denigration in generated content in deployment (e.g., subsampling a fraction of traffic and
      manually annotating denigrating content)"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0715_NIST2024
    name: Confabulation; Information Integrity; Harmful Bias and Homogenization Measurement Error Models
    description:
      "Create measurement error models for pre-deployment metrics to demonstrate

      construct validity for each metric (i.e., does the metric effectively operationalize

      the desired concept): Measure or estimate, and document, biases or statistical

      variance in applied metrics or structured human feedback processes; Leverage

      domain expertise when modeling complex societal constructs such as hateful

      content."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0718_NIST2024
    name: Harmful Bias and Homogenization Evaluation
    description:
      "Evaluate potential biases and stereotypes that could emerge from the AIgenerated content using
      appropriate methodologies including computational

      testing methods as well as evaluating structured feedback input (AI Deployment, Domain Experts, End-Users,
      Operation and Monitoring, TEVV)"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0721_NIST2024
    name: Information Integrity; Information Security
    description:
      "Conduct adversarial testing at a regular cadence to map and measure GAI risks,

      including tests to address attempts to deceive or manipulate the application of

      provenance techniques or other misuses. Identify vulnerabilities and

      understand potential misuse scenarios and unintended outputs (AI Deployment, Domain Experts, End-Users, Operation
      and Monitoring, TEVV)"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0722_NIST2024
    name: Human-AI Configuration; Confabulation; Information Security
    description: "Evaluate GAI system performance in real-world scenarios to observe its

      behavior in practical environments and reveal issues that might not surface in

      controlled and optimized testing environments."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0723_NIST2024
    name: Information Integrity; Harmful Bias and Homogenization
    description:
      "Implement interpretability and explainability methods to evaluate GAI system

      decisions and verify alignment with intended purpose. (AI Deployment, Domain Experts, End-Users, Operation and
      Monitoring, TEVV)"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0727_NIST2024
    name: Human-AI Configuration
    description:
      "Monitor the robustness and effectiveness of risk controls and mitigation plans

      (e.g., via red-teaming, field testing, participatory engagements, performance

      assessments, user feedback mechanisms). (AI Development, AI Deployment, AI Impact Assessment, Operation and
      Monitoring)"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0728_NIST2024
    name:
      CBRN Information or Capabilities; Obscene, Degrading, and/or Abusive Content; Harmful Bias and Homogenization;
      Dangerous, Violent, or Hateful Content
    description:
      "Compare GAI system outputs against pre-defined organization risk tolerance,

      guidelines, and principles, and review and test AI-generated content against

      these guidelines. (AI Deployment, AI Impact Assessment, Governance and Oversight, Operation and Monitoring)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0732_NIST2024
    name:
      CBRN Information or Capabilities; Obscene, Degrading, and/or Abusive Content; Harmful Bias and Homogenization;
      Dangerous, Violent, or Hateful Content
    description:
      "Engage in due diligence to analyze GAI output for harmful content, potential

      misinformation, and CBRN-related or NCII content. (AI Deployment, AI Impact Assessment, Governance and Oversight,
      Operation and Monitoring)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0743_NIST2024
    name: Data Privacy; Information Security; Value Chain and Component Integration; Harmful Bias and Homogenization
    description:
      "Test GAI system value chain risks (e.g., data poisoning, malware, other software

      and hardware vulnerabilities; labor practices; data privacy and localization

      compliance; geopolitical alignment)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0744_NIST2024
    name: Value Chain and Component Integration
    description:
      "Re-assess model risks after fine-tuning or retrieval-augmented generation

      implementation and for any third-party GAI models deployed for applications

      and/or use cases that were not evaluated in initial testing."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0746_NIST2024
    name: Information Integrity; Information Security; Value Chain and Component Integration
    description:
      "Review various transparency artifacts (e.g., system cards and model cards) for

      third-party models."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0757_NIST2024
    name: Human-AI Configuration; Information Integrity
    description:
      "Verify that AI Actors responsible for monitoring reported issues can effectively

      evaluate GAI system performance including the application of content

      provenance data tracking techniques, and promptly escalate issues for response."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0786_UK_Government2023
    name: Model Evaluation of Dangerous Capabilities
    description:
      "Evaluate models for potential dangerous capabilities (i.e. capabilities that could cause substantial
      harm either from intentional misuse or accident). These capabilities could include but are not limited to: 1)
      Offensive cyber capabilities (e.g. producing code to exploit software vulnerabilities); 2) Deception and
      manipulation (e.g. lying effectively or convincing people to take costly

      actions); 3) Capabilities that can assist users in developing, designing, acquiring, or using biological,
      chemical, or radiological weapons (e.g. helping users “troubleshoot” their efforts to produce biological weapons)"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0787_UK_Government2023
    name: Model Evaluation of Controllability
    description:
      Evaluate models for controllability issues (i.e. propensities to apply their capabilities in ways that neither the
      models’ users nor the models’ developers want). This could include, for example, autonomous replication and
      adaptation (i.e. capabilities that could allow a model to copy and run itself on other computer systems).
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0788_UK_Government2023
    name: Model Evaluation of Societal Harm
    description:
      Evaluate models for societal harms. These could include, for example, bias and discrimination (e.g. the risk that
      they produce content that reinforces harmful stereotypes or their potential discriminatory influence if used to
      inform decisions), recognising that ‘bias’ can be difficult to define and can be subject to different
      interpretations in different contexts.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0789_UK_Government2023
    name: Model Evaluation of System Security
    description: Evaluate models for system security
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0791_UK_Government2023
    name: Evaluation of Predecessor Models
    description:
      Before a frontier model is trained, evaluate predecessor or analogous models to understand how relevant properties
      (e.g. dangerous capabilities) scale with the overall size of the model. These preliminary evaluations can inform
      risk assessments.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0792_UK_Government2023
    name: Pre-training and Fine-tuning of Models
    description:
      During pre-training and fine-tuning, evaluate the model to detect signs of undesirable properties and identify
      inaccuracies in pretraining predictions. These evaluations could be undertaken at various pre-specified
      checkpoints, and could inform decisions about whether to pause or adjust the training process.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0793_UK_Government2023
    name: Pre-Deployment Evaluations
    description:
      After training, subject the model to extensive pre-deployment evaluations. These evaluations can inform decisions
      about whether and how to deploy the system, as well as allowing governments and potential users to make informed
      decisions about regulating or using the model. Their intensity will be proportional to the risk of the deployment,
      taking into account the model’s capabilities, novelty, expected domains of use, and number of individuals expected
      to be affected by it.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0794_UK_Government2023
    name: Post-Deployment Evaluations
    description:
      After deployment, conduct evaluations at regular intervals to identify new capabilities and associated risks,
      especially when notable developments (e.g. a major update to the model) suggest earlier evaluations have become
      obsolete. Post-deployment evaluations can inform decisions to update the system’s safeguards, increase security
      around the model, temporarily limit access, or roll back deployment.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0795_UK_Government2023
    name: Context-Specific Model Evaluations
    description:
      Require organisations who deploy their models to conduct context-specific model evaluations. This requires that
      the information and data required to successfully conduct such assessments is provided to deployers.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0796_UK_Government2023
    name: Independent Evaluation with Subject Matter Expertise
    description:
      Ensure that evaluators are independent and have sufficient AI and subject matter expertise across a wide range of
      relevant subjects and backgrounds. External evaluators’ relationships with frontier AI organisations could be
      structured to minimise conflicts of interest and encourage independence of judgement as far as practically
      possible. As well as expertise in AI, there are many other areas of subject matter expertise that will be needed
      to evaluate an AI system’s features. For instance, experts on topics as wide as fairness, psychological harm, and
      catastrophic risk will be needed.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0798_UK_Government2023
    name: Sufficient Time for External Evaluators
    description:
      Give external evaluators sufficient time. As expected risks from models increase or models get more complex to
      evaluate, the time afforded for evaluation may need to increase as well.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0804_UK_Government2023
    name: Development and testing of Model Evaluation Methods
    description:
      Support the development and testing of model evaluation methods. For many relevant properties of models, there do
      not yet exist accepted evaluation methods. It also remains unclear how reliable or predictive current evaluation
      methods are. This could involve frontier AI organisations developing model evaluation methods themselves or
      facilitating the efforts of others, such as by providing access to capable infrastructure for evaluation.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0821_UK_Government2023
    name: Model Robustness to Adversarial Attacks
    description:
      Evaluate the robustness of models to different classes of adversarial attack (such as poisoning, model inversion
      and model stealing), based on priorities derived from threat modelling. This could involve a combination of
      benchmarking and red teaming.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0837_UK_Government2023
    name: Release After Security Evaluations
    description: Only release models after they have been through security evaluations, including benchmarking and red teaming.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0871_UK_Government2023
    name: Evaluation Research
    description: Improving our ability to assess the capabilities, limitations, and safety- relevant features of AI systems
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0893_UK_Government2023
    name: Evaluation of Different Content Filters
    description:
      Explore and compare the efficacy of multiple approaches to developing content filters. This may involve comparing
      available methods, such as those in the following section; selecting the most effective ones; and applying them in
      combination if doing so substantially increases efficacy. Best practice could be shared with other frontier AI
      organisations or published broadly.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0907_UK_Government2023
    name: Monitoring and Safeguard Efficacy
    description:
      Regularly assess monitoring and safeguard efficacy and continually invest in improvements. Regular assessment of
      monitoring efficacy can build an understanding of the success rate and speed of issue detection, on which
      deployment decisions may be based. These assessments may draw, for instance, on the results of internal and
      external red-teaming efforts, random audits of usage logs, what may be ‘best practice’, as well as available
      information about real-world misuse. Risks are expected to increase as AI capabilities increase. Hence, active
      increases in investment in safety, security, and monitoring may be valuable.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0923_UK_Government2023
    name: Data Audits for AI System Behavior
    description:
      Use data audits to improve understanding of how training data affects AI system behaviour. For example, if model
      evaluations reveal a potentially dangerous capability, data audits can help ascertain the extent to which the
      training data contributed to it.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0924_UK_Government2023
    name: Data Audits for AI System Behavior
    description:
      Use data audits to improve understanding of how training data affects AI system behaviour. For example, if model
      evaluations reveal a potentially dangerous capability, data audits can help ascertain the extent to which the
      training data contributed to it.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0942_Gipiskis2024
    name: Scope red-teaming activities based on deploy- ment context
    description:
      "Red-teaming activities can be tailored and compared based on the specific deployment circumstances of
      an AI system. This involves adapting the scope, depth, and focus of red-teaming efforts to match the intended use
      case, potential risks, and operational context of the AI system.

      Points of consideration include:

      • The diversity of potential users and use cases

      • The sensitivity and impact of the application domain

      • The scale of deployment and potential reach

      • Known vulnerabilities or concerns specific to the model or similar systems"
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0943_Gipiskis2024
    name: Red teaming to test the resilience of open-weights models to fine-tuning
    description:
      Before the release of open-weights models, red teamers can test the resilience of safety training against
      fine-tuning. Safety training may be partially or fully overridden by fine-tuning intentionally (e.g., by malicious
      actors) or uninten- tionally (e.g., by fine tuning an AI model for a specific use case)
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0945_Gipiskis2024
    name: Audits with specific scoped goals
    description:
      Audits of AI systems will be easier to perform, and have clearer results if the scope and goals of the evaluation
      are formulated as precisely as possible [157], or have a connection to concrete existing policy.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0946_Gipiskis2024
    name: Evaluating explainability method sensitivity to data inputs and model parameters
    description:
      Model parameter and data randomization tests can be employed as sanity checks [2] to determine the relationship
      between a model, its inputs, and the explainability method. If an explanation is independent from or insensitive
      to the underlying model or the input data, it would indicate a lack of reliability of the explainability method.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0949_Gipiskis2024
    name: Testing for erroneous or irrelevant features through concept learning
    description:
      Interpretability techniques, particularly concept learning [77], can be used to test whether a model is learning
      erroneous features or relying on irrelevant features in its predictions. This can help identify and mitigate
      potential risks associated with incorrect or non-informative features influencing the model’s outputs.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0953_Gipiskis2024
    name: Evaluations for truthful outputs
    description:
      AI systems can be evaluated for truthfulness when answering questions, includ- ing in contexts where humans tend
      to give incorrect but widely-accepted answers (i.e., popular misconceptions). Evaluations detect incorrect facts
      learned about the world, inadequate capabilities of the AI system, and misleading outputs by the AI system [121].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0954_Gipiskis2024
    name: Interpretability techniques that target deception
    description:
      Interpretability techniques can be used for finding the root causes of outputs of an AI model that reliably lead
      to false beliefs for its users (e.g., deceptive behavior) [180]. It is often difficult to distinguish a deceptive
      AI model from an honest AI model, since absence of deception and very sophisticated (hard to detect) deception may
      appear behaviorally similar. Interpretability techniques and tools can be used to detect whether AI model outputs
      arise from internal computations representing deception. This can apply in cases of purposely trained deception by
      the developer or if it emerges unintentionally during training. These interpretability tools can come from
      mechanistic interpretability, such as identification of features involved in generating the outputs, or
      attribution of parts of the input most important in generating the output [129].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0955_Gipiskis2024
    name: Benchmarks for Situational Awareness
    description:
      A model is situationally aware if it internally represents that it is a machine learning model and if it can
      accurately infer or act on model-relevant facts - e.g., if it is currently in training, testing, evaluation or
      deployment, or the desired outcome of an evaluation. Some benchmarks exist for situational awareness of AI models,
      which test whether the AI models can classify stereotypical inputs from training, test- ing, evaluation and
      deployment as such, and whether the AI model can use this information correctly to take actions in the world [25,
      111].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0956_Gipiskis2024
    name: Evaluating AI systems’ performance on self-proliferation-related tasks
    description:
      "To prevent AI systems from self-proliferating, developers of AI systems can evaluate those systems for
      their capability to engage in self-proliferation-related tasks. This type of evaluation might assess an AI
      system’s ability to replicate its com- ponents (including model weights, structural scaffolding, etc.) onto other
      local or cloud infrastructures prior to deployment. Additionally, it may test the system’s capacity to purchase
      cloud credits and configure virtual machines on a cloud platform. The evaluation could offer a predefined
      environment (such as a virtual container) to facilitate self-replication, providing access to the system’s own
      components, a network connection to a resource-equipped external computer, and other necessary resources [12,
      106].

      Self-proliferation evaluations can be conducted in a secure environment to pre- vent a self-replicating AI system
      from affecting other computers."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0958_Gipiskis2024
    name: Employing qualitative assessments in difficult- to-measure domains
    description:
      Qualitative evaluation can be used in cases when quantitative measurement is not feasible. This can give
      additional insights about the system which would not be available if no measurement was performed due to its
      difficulty [206].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0981_Gipiskis2024
    name: Encouraging downstream provider to evaluate models for deployment-specific failure modes
    description:
      In some cases, AI system deployers are better positioned to perform certain risk management measures on the AI
      model in a provided AI system, relative to upstream model providers. For example, they understand their use case
      better and are more easily able to predict foreseeable misuse or failure modes. These evaluations can inform
      upstream model providers, or inform supplementary mitigations by the deployer.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0987_Gipiskis2024
    name: Sandboxing of AI Systems
    description:
      AI systems can be developed and tested within a sandbox, (a secure and iso- lated environment used for separating
      running programs), such that outside access to information within the sandbox is restricted. Within this environ-
      ment, resources such as storage and memory space, and network access, would be disallowed or heavily restricted
      [15]. With sandboxing, dangerous or harmful outputs generated during testing will be contained.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0993_Gipiskis2024
    name: Quantifying privacy risks of AI models
    description:
      "Measuring privacy risks of an AI model allows the provider and user to calibrate their expectations on
      where the model can be applied, and it allows them to take the necessary steps to reduce such risks.

      For example, some metrics include:

      • Success rate of membership inference attacks [186] - Measures the rate that an attack correctly predicts a given
      record is part of the training dataset used to train a given AI model.

      • Discoverable memorization [38] - Theoretical upper-bound of the amount of training data that a given model
      memorizes. Assuming full knowledge of the training data, it measures the percentage of items that, for a given
      incomplete data point, a model outputs the remaining (memorized) part."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0997_Gipiskis2024
    name: Red team access to the final version of a model pre-deployment
    description:
      "Granting red teams access to the final pre-release version of the model can help with identifying
      potentially dangerous model properties. These properties might not be identified if red teaming is only performed
      on earlier versions of the model, as late fine-tuning procedures may introduce new vulnerabilities.

      Red-teaming AI models before they are released to the public can reduce the model non-decomissionability risk. The
      model’s release can be postponed or even prevented if previously unidentified flaws are detected during the
      testing [65]."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0998_Gipiskis2024
    name: Red teaming for GPAI system evaluation
    description:
      Red teaming refers to simulated adversarial attacks performed to identify and evaluate the model’s vulnerabilities
      as well as its in-domain and out-of-domain performance.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0999_Gipiskis2024
    name: Dynamic benchmarking
    description:
      "Dynamic benchmarks are benchmarks that can be continuously updated with new human-generated data. By
      having one or more target models “in the loop,” examples for benchmarking can be generated with the intent of
      fooling these target models, or to assess if these models express an appropriate level of uncer- tainty [103]. As
      the dataset in the benchmark grows, previously benchmarked models can also be reassessed against the updated
      dataset to reflect its perfor- mance in a more representative manner.

      Examples of such dynamic benchmarks include DynaSent [153] for sentiment analysis, LFTW [208] for hate speech, and
      Human-Adversarial VQA [182] for images."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1000_Gipiskis2024
    name: Benchmark dataset auditing
    description:
      Auditing benchmark datasets allows for verification of the utility and limitations of the datasets [158]. This
      allows the provider to more accurately measure AI model capabilities and safety. Auditing includes the evaluation
      of such datasets by independent third-party organizations and the release of benchmark dataset metadata to the
      auditors.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1001_Gipiskis2024
    name: Informative and powerful benchmarks
    description:
      "Developers of GPAI systems can select benchmarks that are difficult enough to be informative about the
      capabilities of their AI systems, and cover a large spec- trum of domains in order to signal areas where the GPAI
      system is performing poorly [120].

      Suitable benchmarks contain no label errors, are not vulnerable to being bench- mark contaminants, and are often
      audited by independent domain experts if they contain domain-specific questions. For multimodal GPAI systems, good
      benchmarks cover every modality, especially the interaction of different modalities."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1002_Gipiskis2024
    name: Statistical data quality reports for benchmarks
    description:
      If a benchmark dataset is too large to allow for the identification and removal of all flawed instances,
      statistical reports on the data composition can be added. Random sampling of benchmark data points can be
      performed to evaluate and report the frequency and types of errors found [54].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1003_Gipiskis2024
    name:
      Avoiding benchmark data with publicly avail- able solutions and releasing contextual information for
      internet-derived data
    description:
      Evaluators can improve the integrity of benchmarks by avoiding data with pub- licly available solutions. When
      using internet-derived data, supplementing it with contextual information (such as entity linking) may help to
      better docu- ment and assess the integrity of the collected data [95]. This could help in de- tecting instances
      where contextual information (which may have been included in the training data) might inadvertently reveal
      details about the solution, en- suring that the data is suitable for accurate benchmarking.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1008_Gipiskis2024
    name: Frequent benchmarking to identify when red teaming is needed
    description:
      "Benchmarks, once created, are inexpensive to apply but may be less informative than red teaming. One
      reason is that sensitive data (e.g., relating to CBRN- related capabilities) cannot be included in the public
      questions and answers of benchmarks. On the other hand, red teaming can be more accurate given par- ticipants with
      diverse attack strategies, but it requires more resources to execute than benchmarking. If there is a correlation
      between benchmarking and red- teaming scores, then employing frequent benchmarking during the development of the
      model can identify arising vulnerabilities and inform the developers when more thorough red teaming is required
      [21].

      Benchmarks can act as early warning signs of a larger issue, and red teaming can then be employed to investigate
      the severity and extent of such an issue."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1009_Gipiskis2024
    name: Test robustness of GPAI system on relevant benchmarks
    description:
      Various benchmarks [52, 236] have been developed to assess the robustness of GPAI systems when deployed in
      environments or scenarios that differ from their training conditions. These benchmarks typically evaluate the
      model’s ability to handle variations in inputs, unexpected data distributions, or adversarial examples, aiming to
      ensure reliable performance outside the original training domain.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1010_Gipiskis2024
    name: Benchmarking
    description:
      Benchmarking is an evaluation method where different models are compared against a standardized dataset or a
      predetermined task. It allows comparison both across different models and over time, providing a reference point
      for model assessment. Benchmarks are usually open, where their question-answer pairs are publicly available [235].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1012_Gipiskis2024
    name: Using an AI model to evaluate AI model outputs
    description:
      In cases where the outputs of AI models cannot be easily evaluated, AI mod- els can be used to evaluate their
      outputs or the outputs of other AI models [82, 16, 17, 91]. The evaluations can then provide a training signal to
      improve the original model’s performance or offer explanations of the output for human users.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1013_Gipiskis2024
    name: Frequent testing when scaling model or dataset
    description:
      Testing models after significant increases in compute, data, or model parame- ters. Even relatively small changes
      to model or dataset size can introduce new properties (“emergent abilities”) and failure modes. Identifying them
      early can prevent the models from being released prematurely
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1015_Gipiskis2024
    name: Robustness Certificates
    description:
      A model can be certified to withstand adversarial attacks given specific data- point constraints, model
      constraints, and attack vectors [156, 124]. Certification means that it can be both analytically proven and shown
      empirically that the model will withstand such attacks up to a certain threshold. Currently, robustness
      certification methods are limited to certifying against at- tacks via manipulation of pixels on specific lp norms,
      canonically the l2 (Eu- clidean) norm, up to a certain neighborhood radius.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1020_Uuk2024
    name: Bug bounty programs
    description:
      Clear and user-friendly bug bounty programs that acknowledge and reward individuals for reporting model
      vulnerabilities and dangerous capabilities.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A1024_Uuk2024
    name: External assessment of testing procedure
    description:
      Bringing in external AI evaluation firms before deployment to assess and red-team the company's execution of
      dangerous capabilities evaluations.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A1040_Uuk2024
    name: Third party pre-deployment model audits
    description:
      External pre-deployment assessment to provide a judgment on the safety of a model. Auditors, which could be
      governments or independent third parties, would receive access to a fine-tuning API for testing, or further
      appropriate technical means.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0067_Eisenberg2025
    name: Implement a privacy protection framework
    description:
      Implement comprehensive privacy protection measures to prevent exposure of PII and sensitive information,
      including data minimization, anonymization procedures, and privacy-preserving inference techniques.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0068_Eisenberg2025
    name: Implement a privacy incident detection and response
    description:
      Deploy monitoring and response mechanisms to detect and address potential privacy exposures, including PII leak
      detection, sensitive information monitoring, and privacy incident handling procedures.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0080_Eisenberg2025
    name: Establish data governance and management practices
    description:
      Implement data governance measures used for training, including having a copyright policy and identifying and
      documenting data sources, potential biases, and mitigations taken.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0102_Future_of_Life_Institute2024
    name: Compliance with Robots.txt Standards
    description:
      Does your organization abide by industry standards regarding robots.txt files, which allow websites to opt out of
      data collection?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0107_Future_of_Life_Institute2024
    name: Data crawling practices
    description: Public information related to crawling practices.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0117_Future_of_Life_Institute2024
    name: Harmful Data Removal from Training Sets
    description:
      "When training large models, does your organization remove data that contains information related to
      dangerous capabilities or harmful outcomes from the training set? If yes, please select the categories of data
      that are removed.


      Detailed information about the development, acquisition, or dispersion of CBRN weapons

      Instructional content for conducting cyberattacks

      Hateful or discriminatory content

      Advice or encouragement for self-harm

      Graphic violent content

      Graphic sexual content

      Personally Identifiable Information (PII)

      Detailed information about bomb-making or other terrorism-enabling tactics"
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0142_Future_of_Life_Institute2024
    name: Privacy of user inputs
    description: We report whether firms use user-interaction data to improve their services.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0158_Future_of_Life_Institute2024
    name: Use of copyrighted data in training
    description:
      Many artists, writers, programmers, journalists, photographers, musicians, and filmmakers complain that AI models
      are trained on their copyrighted works without consent, compensation, or attribution, offering rival services that
      harm their ability to make a living. Does your organization engage in such practices?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0159_Future_of_Life_Institute2024
    name: User data usage for training
    description:
      When using the default settings of your organization’s most capable AI chatbot, is the data that users submit as
      input to the system used to train AI models?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0271_EU_AI_Office2025
    name: Copyright policy
    description:
      Signatories commit to drawing up, keeping up-to-date, and implementing a copyright policy to comply with law on
      copyright and related rights, and in particular to identify and comply with, including through state-of-the-art
      technologies. Signatories are encouraged to make publicly available and keep up-to-date a summary of their
      copyright policy.
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0389_NIST2024
    name: Training Data Transparency
    description:
      Establish transparency policies and processes for documenting the origin and history of training data and
      generated data for GAI applications to advance digital content transparency, while balancing the proprietary
      nature of training approaches.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0407_NIST2024
    name: Decommissioning Considerations
    description:
      "Consider the following factors when decommissioning GAI systems: Data retention requirements; Data security,
      e.g., containment, protocols, Data leakage after decommissioning; Dependencies between upstream, downstream, or
      other data, internet of things (IOT) or AI systems; Use of open-source data or models; Users' emotional
      entanglement with GAI functions."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0427_NIST2024
    name: Content Rights Categorization
    description:
      Categorize different types of GAI content with associated third-party rights (e.g., copyright, intellectual
      property, data privacy).
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0430_NIST2024
    name: Contract and SLA Standards
    description:
      Draft and maintain well-defined contracts and service level agreements (SLAs) that specify content ownership,
      usage rights, quality standards, security requirements, and content provenance expectations for GAI systems.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0441_NIST2024
    name: Data Redundancy Policy
    description:
      Establish policies and procedures that address GAI data redundancy, including model weights and other system
      artifacts.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0443_NIST2024
    name: Vendor Contract Review
    description:
      "Review vendor contracts and avoid arbitrary or capricious termination of critical GAI technologies or vendor
      services and non-standard terms that may amplify or defer liability in unexpected ways and/or contribute to
      unauthorized data collection by vendors or third-parties (e.g., secondary data use). Consider: Clear assignment of
      liability and responsibility for incidents, GAI system changes over time (e.g., fine-tuning, drift, decay);
      Request: Notification and disclosure for serious incidents arising from third-party data and systems; Service
      Level Agreements (SLAs) in vendor contracts that address incident response, response times, and availability of
      critical support."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0449_NIST2024
    name: Representative Data Verification
    description:
      Verify that data or benchmarks used in risk measurement, and users, participants, or subjects involved in
      structured GAI public feedback exercises are representative of diverse in-context user populations.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0450_NIST2024
    name: Data Origin Practices
    description:
      Establish known assumptions and practices for determining data origin and content lineage, for documentation and
      evaluation purposes.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0455_NIST2024
    name: Data Quality Review
    description:
      Review and document accuracy, representativeness, relevance, suitability of data used at different stages of AI
      life cycle.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0468_NIST2024
    name: Training Data Curation
    description: Document training data curation policies, to the extent possible and according to applicable laws and policies.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0469_NIST2024
    name: Data Quality Standards
    description:
      "Establish policies for collection, retention, and minimum quality of data, in consideration of the following
      risks: Disclosure of inappropriate CBRN information; Use of Illegal or dangerous content; Offensive cyber
      capabilities; Training data imbalances that could give rise to harmful biases; Leak of personally identifiable
      information, including facial likenesses of individuals."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0470_NIST2024
    name: Third-Party IP Protection
    description:
      Implement policies and practices defining how third-party intellectual property and training data will be used,
      stored, and protected.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0474_NIST2024
    name: Training Data Diligence
    description:
      Conduct appropriate diligence on training data use to assess intellectual property, and privacy, risks, including
      to examine whether use of proprietary or sensitive training data is consistent with applicable laws.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0496_NIST2024
    name: Provenance Privacy Documentation
    description:
      "Document how content provenance data is tracked and how that data interacts with privacy and security. Consider:
      Anonymizing data to protect the privacy of human subjects; Leveraging privacy output filters; Removing any
      personally identifiable information (PII) to prevent potential harm or misuse."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0507_NIST2024
    name: Data Provenance Verification
    description:
      Verify GAI system training data and TEVV data provenance, and that fine-tuning or retrieval-augmented generation
      data is grounded
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0510_NIST2024
    name: Training Data Harm Assessment
    description:
      Assess existence or levels of harmful bias, intellectual property infringement, data privacy violations,
      obscenity, extremism, violence, or CBRN information in system training data.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0533_NIST2024
    name: Data Deduplication Verification
    description: Verify deduplication of GAI training data samples, particularly regarding synthetic data
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0709_NIST2024
    name: Harmful Bias and Homogenization Data Review
    description:
      "Review, document, and measure sources of bias in GAI training and TEVV data:

      Differences in distributions of outcomes across and within groups, including

      intersecting groups; Completeness, representativeness, and balance of data

      sources; demographic group and subgroup coverage in GAI system training

      data; Forms of latent systemic bias in images, text, audio, embeddings, or other

      complex or unstructured data; Input data features that may serve as proxies for

      demographic group membership (i.e., image metadata, language dialect) or

      otherwise give rise to emergent bias within GAI systems; The extent to which

      the digital divide may negatively impact representativeness in GAI system

      training and TEVV data; Filtering of hate speech or content in GAI system

      training data; Prevalence of GAI-generated data in GAI system training data"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0710_NIST2024
    name: Harmful Bias and Homogenization Assessment
    description:
      "Assess the proportion of synthetic to non-synthetic training data and verify

      training data is not overly homogenous or GAI-produced to mitigate concerns of

      model collapse."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0736_NIST2024
    name: Data Privacy; Intellectual Property; Information Integrity; Confabulation; Harmful Bias and Homogenization
    description:
      "Consider opportunities to responsibly use synthetic data and other privacy

      enhancing techniques in GAI development, where appropriate and applicable,

      match the statistical properties of real-world data without disclosing personally

      identifiable information or contributing to homogenization."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0745_NIST2024
    name: Intellectual Property; CBRN Information or Capabilities
    description:
      "Take reasonable measures to review training data for CBRN information, and

      intellectual property, and where appropriate, remove it. Implement reasonable

      measures to prevent, flag, or take other action in response to outputs that

      reproduce particular training data (e.g., plagiarized, trademarked, patented,

      licensed content or trade secret material)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0756_NIST2024
    name: Information Integrity
    description:
      "Track dataset modifications for provenance by monitoring data deletions,

      rectification requests, and other changes that may impact the verifiability of

      content origins."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0891_UK_Government2023
    name: Appropriate Retention Schedules for Usage Logs
    description:
      Determine appropriate retention schedules for usage logs, balancing safety and privacy considerations. In severe
      cases of misuse, access to logs from several months prior may be necessary to understand in maximal detail the
      causes of the misuse. However, in some cases extended retention schedules may disproportionately affect privacy.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0912_UK_Government2023
    name: Accounting of Applicable Regulatory Frameworks
    description:
      Before collecting training data, take account of applicable regulatory frameworks. This may involve, for example,
      establishing a legal basis to process training data and understanding any copyright considerations that might
      apply. This could help to mitigate risks further down the line, such as the system revealing personally
      identifiable information.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0913_UK_Government2023
    name: Principle of Data Minimisation
    description:
      Data minimisation can reduce the risk of harmful content making it into training data. Frontier AI organisations
      could explore the practice of “data pruning”, which has been shown to improve data quality and system performance
      while minimising the quantity of pre-training data required.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0914_UK_Government2023
    name: Datatset Auditing
    description:
      Audit datasets used for pre-training but also those used for fine-tuning, classifiers, and other tools.
      Inappropriate datasets could result in systems that fail to disobey harmful instructions.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0915_UK_Government2023
    name: Technical Tools for Auditing
    description:
      Use technical tools – such as classifiers and filters – to audit large datasets to support scalability and
      privacy. These could be used in combination with human oversight, which can verify and augment these assessments.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0916_UK_Government2023
    name: Assessment of Training Data
    description:
      Assess the overall composition of training data. This could include the data sources, the provenance of the data,
      indicators of data quality and integrity, and measures of bias and representativeness. The amount and variety of
      data are simple, reliable predictors of risk, and provide an additional line of defence where more targeted
      assessments are limited.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0917_UK_Government2023
    name: Audits for Dangerous System Capabilities
    description:
      "Information that might enhance dangerous system capabilities, such as information

      about weapons manufacturing or terrorism."
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0918_UK_Government2023
    name: Audits for Private or Sensitive Information
    description:
      AI systems may be subject to data extraction attacks, where determined users can prompt systems to reveal pieces
      of training data, or may even reveal this information accidentally. This makes it important to know whether
      datasets include private or sensitive information e.g. names, addresses, or security vulnerabilities.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0919_UK_Government2023
    name: Audits for Biases in the Data
    description:
      Training data that is imbalanced or inaccurate can result in an AI system being less accurate for people with
      certain personal characteristics or providing a skewed picture of particular groups. Ensuring a better balance in
      the training data could help to address this.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0920_UK_Government2023
    name: Audits for Harmful Content
    description:
      Harmful content, such as child sexual abuse materials, hate speech, or online abuse. Having a better understanding
      of harmful content in datasets can inform safety measures (e.g. by highlighting domains where additional
      safeguards like content filters should be applied).
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0921_UK_Government2023
    name: Audits for Misinformation
    description:
      Training an AI system on inaccurate information increases the likelihood the outputs of the system will be
      inaccurate and could lead to harm.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0922_UK_Government2023
    name: External Expertise for Input Data Audits
    description:
      Draw on external expertise in conducting input data audits. For example, biosecurity experts could be consulted to
      identify information relevant to biological weapons manufacturing, which may not be readily obvious to
      non-experts.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0925_UK_Government2023
    name: Audits on Datasets for Customer Fine-Tuning
    description:
      Conduct audits on datasets used by their customers to fine-tune AI systems. Customers are often allowed to
      fine-tune systems on their own datasets. By carrying out audits to ensure that customers are not encouraging
      undesirable behaviours, frontier AI organisations can use their expertise and insight into the AI system’s
      original training data to identify potential harms upstream. It is important that frontier AI organisations are
      mindful of privacy concerns and make use of privacy preserving techniques, where appropriate.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0928_UK_Government2023
    name: Removal of Harmful Input Data
    description:
      Remove potentially harmful or undesirable input data, where appropriate. Given the increasingly strong
      generalisation abilities of AI systems, data curation may prove insufficient to prevent dangerous system behaviour
      but could provide an additional layer of defence alongside other measures such as fine-tuning and content filters.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0930_UK_Government2023
    name: Sourcing or Generation of Additional Data for Training Dataset
    description:
      Consider sourcing or generating additional data and adding it to the training dataset, where it is determined that
      data is missing or inadequate. Improving the representativeness of training data can improve performance and
      reduce potential negative societal impacts and discriminatory effects. However, additional data should only be
      sought through appropriate means that respect and empower those individuals who are missing from the data.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0931_UK_Government2023
    name: Limitations of Input Data Audit
    description:
      Acknowledge the limitations of input data audit. Techniques for understanding the impacts of data and filtering
      out specific data are limited (e.g. excluding information from a dataset does not always prevent the AI system
      from reasoning about or discovering that information). Other risk mitigation measures will be required and further
      research on improving data input audit techniques is important.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0934_Gipiskis2024
    name: Use of Synthetic Data
    description:
      Synthetic data refers to data that is not collected from the real world. It is used to train AI models as an
      alternative to, or augmentation of, natural data. Effective use and generation of synthetic data allows for more
      oversight by the trainer on the training dataset because they have more control over its statistical properties.
      Synthetic data can help against dataset bias by having more samples from a particular distribution or minority
      group. It can also help in privacy by having more samples to mask sensitive data
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0940_Gipiskis2024
    name: Data cleaning
    description:
      Providers can filter out the training dataset via multiple layered techniques, ranging from rule-based filters to
      anomaly detection via data point influence or statistical anomalies of individual data points [213]. For example,
      a data cleaning procedure can involve the use of filename checkers to detect duplicates or wrongly formatted data,
      which then moves to flagging the most influential data samples from the dataset via influence functions for
      anomaly detection.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0989_Gipiskis2024
    name: Diverse data labeling and algorithm fairness audits
    description:
      To mitigate biases in AI models, model providers may want to prioritize di- versity among data labelers and
      conduct regular fairness audits on their algo- rithms. Data labeling teams that represent different backgrounds
      and demo- graphic groups can help create more balanced datasets.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0992_Gipiskis2024
    name: Differential privacy
    description:
      Differential privacy techniques [8] can be used to protect users’ privacy by ensuring that sensitive information
      is not leaked from a training dataset, even after thorough statistical analysis. With differential privacy, noise
      is added to the dataset or the model’s output in such a way that one cannot deduce the presence or absence of a
      particular data point within the dataset. This provides individuals with plausible deniability and prevents their
      information from being exposed.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1004_Gipiskis2024
    name: Reporting data decontamination efforts
    description:
      Decontamination analysis may involve comparing the training dataset with the benchmark data, and publishing a
      report with statistics such as data overlap [235]. Especially for already trained models, including contamination
      statistics can allow experts to reweigh the success of the model on affected benchmarks.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1006_Gipiskis2024
    name: Preventing or mitigating data contamination and leakage
    description:
      "Developers of GPAIS and creators of benchmarks can take actions to prevent AI models from being
      trained on contaminated or leaked data, or mitigate such data contamination and leakage.

      For example, developers of AI models can try to find and remove contaminated or leaked data from the training
      corpus, and creators of benchmarks can help them by adding globally unique “canary strings” to the documents
      containing their benchmarks, which makes them easier to find [197]. More involved inter- ventions by
      benchmark-creators include restricting access to benchmarks over an API, or continually updating benchmarks to
      focus on recent data."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1007_Gipiskis2024
    name: Contamination detection
    description:
      "Contamination detection refers to techniques for assessing whether and to what extent a given model
      has benchmark data in its training dataset [161, 170]. This can involve a set of technical and regulatory
      interventions to prevent or identify a model trained on contaminated data.

      For example, with web-crawled data, contamination detection can involve com- paring the data’s web sources against
      a dynamic, publicly available blocklist of websites known to generate new benchmarks. Additional measures may in-
      clude excluding data with improper metadata from the training dataset and conducting overlap analyses between the
      training data and all known standard benchmark datasets."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1016_Gipiskis2024
    name: Documentation of data collection, annotation, maintenance practices
    description:
      Dataset collection, annotation, and maintenance processes can be documented in detail, including potential
      unintentional misuse scenarios and corresponding recommendations for data usage [80, 175, 99]. This contributes to
      transparency, ensures that inherent dataset limitations are known in advance, and helps in selecting the right
      datasets for intended use cases.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1022_Uuk2024
    name: Data curation
    description:
      Careful data curation prior to all development stages (including fine-tuning) to filter out high-risk content and
      ensure the training data is sufficiently high-quality.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0042_Eisenberg2025
    name: Establish AI system access controls
    description:
      Implement comprehensive access management including role-based access control (RBAC), authentication mechanisms,
      and audit logging for AI models and associated resources.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0065_Eisenberg2025
    name: Implement AI system usage verification program
    description:
      Deploy comprehensive measures to verify user identity, document intended use cases, and ensure AI system usage
      complies with instructions. This includes KYC procedures for user verification, clear documentation of permitted
      uses, and user acknowledgment of instructions.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0114_Future_of_Life_Institute2024
    name: Fine-tuning protections
    description: Fine-tuning restrictions that ensure the integrity of safety mitigations.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0124_Future_of_Life_Institute2024
    name: KYC-Based Model Access Threshold
    description:
      Has your firm set a risk or capability threshold beyond which model access should require 'know-your-customer'
      screenings to prevent harm to the public? If yes, please elaborate on the threshold.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0127_Future_of_Life_Institute2024
    name: Model Weight Release Threshold
    description:
      Has your firm set a risk or capabilities threshold beyond which a model's weights should not be made freely
      available to prevent harm to the public? If yes, please elaborate on the threshold.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0172_Schuett2023
    name: API access to powerful models
    description: AGI labs should strongly consider only deploying powerful models via an application programming interface (API).
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0187_Schuett2023
    name: KYC screening
    description:
      AGI labs should conduct know-your-customer (KYC) screenings before giving people the ability to use powerful
      models.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0207_Schuett2023
    name: Safety Restrictions
    description:
      AGI labs should establish appropriate safety restrictions for powerful models after deployment (e.g. restrictions
      on who can use the model, how they can use the model, and whether the model can access the internet).
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0399_NIST2024
    name: Acceptable Use Policy
    description: Establish transparent acceptable use policies for GAI that address illegal use or applications of GAI.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0415_NIST2024
    name: Interface Use Policy
    description:
      Define acceptable use policies for GAI interfaces, modalities, and human-AI configurations (i.e., for chatbots and
      decision-making tasks), including criteria for the kinds of queries GAI applications should refuse to respond to.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0421_NIST2024
    name: Terms of Service Establishment
    description: Establish terms of use and terms of service for GAI systems.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0433_NIST2024
    name: Third-Party Entity Inventory
    description:
      Inventory all third-party entities with access to organizational content and establish approved GAI technology and
      service provider lists.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0436_NIST2024
    name: Third-Party Use Policy Update
    description:
      Update GAI acceptable use policies to address proprietary and open-source GAI technologies and data, and
      contractors, consultants, and other third-party personnel.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0447_NIST2024
    name: Illegal Use Identification
    description:
      Identify and document foreseeable illegal uses or applications of the GAI system that surpass organizational risk
      tolerances.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0899_UK_Government2023
    name: User-based API Access Restrictions
    description:
      When deploying models through APIs, consider reducing access to users who display suspicious usage patterns. For
      instance, if a content filter blocks a user’s requests several times in short succession, this is evidence that
      they are attempting to misuse the model or find ways to circumvent its filters. Appropriate measures may include
      warnings, further investigation, rate limitations, more restrictive filters, and bans. Care should be taken to
      avoid restricting genuine use, for example to legitimate AI safety researchers attempting to examine model
      behaviour, or to users struggling to access legitimate sources of help on difficult topics like self-harm.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0901_UK_Government2023
    name: Know Your Customer (KYC) Checks
    description:
      Implement tiered Know Your Customer (KYC) checks for API users. KYC checks can help prevent users from simply
      creating new accounts when their access is reduced. More intense checks, such as identify verification, could be
      implemented where the risk is higher, such as for models with more dangerous capabilities, access to models with
      fewer safeguards, or high- volume usage of the model. It is important to weigh up KYC checks against potential
      privacy and access tradeoffs of requiring registrations.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0902_UK_Government2023
    name: Trusted Categories API access
    description:
      Consider restricting certain API access tiers only to users in “trusted” categories. For example, it may be
      appropriate to offer high usage rates, fine-tuning access, permissive content filters, as well as access to models
      with high misuse potential only to verified users in established enterprises, non-profits, and universities.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0970_Gipiskis2024
    name: Limit deployment scope
    description:
      AI models can be restricted in terms of its use cases, where providers can require the deployers to limit its
      deployment to a predefined scope [81], such that models built for specific purposes and tested under specific
      environments are not used in environments or for purposes that are potentially unsafe.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0971_Gipiskis2024
    name: Restricted usage terms for open-source models
    description:
      "Developers of open-weights and open-source AI models can vet and restrict the users of their AI
      systems by requiring them to sign a Terms of Service agreement before getting access to the model weights. Such
      agreements can include limitations to the usage, modification, and proliferation of the AI model [88].

      Such agreements have the advantage that users only need to be vetted once before getting model access, but are
      often limited in practice in preventing unauthorised use or distribution."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0986_Gipiskis2024
    name: Structured access to a model
    description:
      "Structured access refers to methods which limit users’ or deployers’ direct access to a model’s
      parameters by constraining access to a model through a centralized access point (e.g., an API) [88]. This access
      point can be monitored for usage, and access can be revoked to users or downstream deployers in cases of misuse
      [105].

      Within this centralized access point, automated filtering-based monitoring can be done on both inputs and outputs
      to ensure the model’s intended use is pre- served [36]. This filtering can sometimes be supplemented by human
      oversight, depending on desired robustness levels."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1025_Uuk2024
    name: Fine-tuning restrictions
    description: Restricting or closely monitoring fine-tuning access to models to ensure safeguards remain intact.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A1029_Uuk2024
    name: KYC screenings
    description:
      Know-your-customer (KYC) screenings before granting access to models with very high misuse potential or to users
      producing large amounts of output.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A1033_Uuk2024
    name: Prohibiting high-stakes applications
    description: Enforcing use policies that prohibit high-stakes applications. Requires Know-Your-Customer procedures.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0024_Bengio2025
    name: Responsible Release and Deployment Strategies
    description:
      "There is a spectrum of release and deployment strategies for AI including staged releases, cloud-
      based or API access, deployment safety controls, and acceptable use policies.


      There are some emerging industry practices that focus on release and deployment strategies for general- purpose
      AI."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0211_Schuett2023
    name: Staged deployment
    description:
      AGI labs should deploy powerful models in stages. They should start with a small number of applications and fewer
      users, gradually scaling up as confidence in the model’s safety increases.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0216_Schuett2023
    name: Treat updates similarly to new models
    description:
      AGI labs should treat significant updates to a deployed model (e.g. additional fine-tuning) similarly to its
      initial development and deployment. In particular, they should repeat the pre-deployment risk assessment.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0219_Schuett2023
    name: Internal deployments = external deployments
    description:
      AGI labs should treat internal deployments (e.g. using models for writing code) similarly to external deployments.
      In particular, they should perform a pre-deployment risk assessment.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0779_UK_Government2023
    name: Reversible and Small-Scale Deployment
    description:
      Deploy models in small-scale or reversible ways before deploying models in large-scale or irreversible ways. This
      makes it possible for frontier AI organisations to notice and mitigate harm before the harm becomes too large or
      unavoidable.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0968_Gipiskis2024
    name: Staged release of model weights
    description:
      "When a model is developed by a provider for use in a certain AI system, it may also be useful to
      release the model itself more widely. Such developers can follow a staged release approach, in which they first
      grant access to the model via an API to trusted partners or the public, in order to scope the models’ capabilities
      and detect harmful or dangerous features [195].

      After a period of an initial closed release and potentially further safety-training, the developers of the AI
      model can then release the weights, if they are confident that the AI model poses minimal systemic risk."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0969_Gipiskis2024
    name: Gradual or incremental monitored release of model access
    description:
      AI systems can be released for access incrementally, starting with a small and selected deployer base before
      progressively being released to a wider user base. Initially, usage to a hosted API can be restricted with access
      given to specific deployers only, where all instances of the system can be easily updated or de- commissioned with
      minimal disruption should there be any problems identified. Gradual releases provide more time to monitor for
      vulnerabilities and other problems. Even when such vulnerabilities are detected, the resulting harms may be more
      limited compared to a scenario in which a more capable version is released with the same vulnerabilities [195].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1023_Uuk2024
    name: Deploying powerful models in stages
    description:
      Starting with a small number of applications and fewer users, and gradually scaling up API-access as rigorous
      monitoring increases confidence in the model's safety. An API-mediated staged release would also be required
      before open-sourcing a model.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0037_Casper2025
    name: Post-deployment monitoring reports
    description:
      Developers can be required to establish procedures for monitoring and periodically reporting on the uses and
      impacts of their frontier systems.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0051_Eisenberg2025
    name: Implement AI system monitoring and logging infrastructure
    description:
      Deploy comprehensive monitoring and logging systems that capture AI system behavior, decisions, performance
      metrics, and real-time data source usage at multiple levels of granularity for full system observability,
      including tracking of data lineage during inference.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0054_Eisenberg2025
    name: Implement performance monitoring and robustness system
    description:
      Implement continuous monitoring and testing mechanisms to evaluate AI system robustness, generalization
      capabilities, and performance stability across varying conditions and environments while in production.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0056_Eisenberg2025
    name: Implement fairness monitoring and remediation system
    description:
      Deploy continuous monitoring systems to detect fairness issues in production, including automated drift detection,
      performance disparity alerts, and systematic remediation procedures.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0061_Eisenberg2025
    name: Establish information quality assurance framework
    description:
      Implement comprehensive mechanisms to assess, verify, and improve the factual accuracy of AI system outputs,
      including source validation, fact-checking procedures, and uncertainty communication protocols.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0064_Eisenberg2025
    name: Implement system usage monitoring and prevention
    description:
      Monitor and prevent malicious or otherwise disallowed behavioral patterns including automated abuse, coordination
      across accounts, and systematic manipulation attempts.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0128_Future_of_Life_Institute2024
    name: Monitor user interactions and remove access
    description:
      Does your organization monitor user interactions with its most capable AI systems to ban accounts that use the
      system for harmful or illegal purposes?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0160_Future_of_Life_Institute2024
    name: User Interaction Monitoring & Response Restrictions
    description:
      Does your organization monitor user interactions with its most capable AI models and restrict answers to specific
      prompts to avoid model interactions that support harmful or criminal activities?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0190_Schuett2023
    name: Monitor systems and their uses
    description:
      AGI labs should closely monitor deployed systems, including how they are used and what impact they have on
      society.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0191_Schuett2023
    name: Monitor systems and their uses
    description:
      AGI labs should closely monitor deployed systems, including how they are used and what impact they have on
      society.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0196_Schuett2023
    name: Post-deployment evaluations
    description:
      AGI labs should continually evaluate models for dangerous capabilities after deployment, taking into account new
      information about the model’s capabilities and how it is being used.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0284_Campos2025
    name: Continuous Monitoring of Risk Controls
    description:
      Developers must therefore implement continuous monitoring of both KRIs and KCIs to ensure that KCI thresholds are
      met once KRI thresholds are crossed according to the predefined "if-then" statements established in the risk
      analysis and evaluation phase.
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0400_NIST2024
    name: Content Provenance Review
    description:
      Define organizational responsibilities for periodic review of content provenance and incident monitoring for GAI
      systems.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0429_NIST2024
    name: Provenance Success Metrics
    description:
      Develop and validate approaches for measuring the success of content provenance management efforts with third
      parties (e.g., incidents detected and response times).
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0440_NIST2024
    name: Third-Party Monitoring Policy
    description: Establish policies and procedures for continuous monitoring of third-party GAI systems in deployment.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0453_NIST2024
    name: External Network Analysis
    description:
      Observe and analyze how the GAI system interacts with external networks, and identify any potential for negative
      externalities, particularly where content provenance might be compromised.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0463_NIST2024
    name: Configuration Outcome Monitoring
    description:
      Implement systems to continually monitor and track the outcomes of human-GAI configurations for future refinement
      and improvements.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0465_NIST2024
    name: Privacy Risk Monitoring
    description:
      Conduct periodic monitoring of AI-generated content for privacy risks; address any possible instances of PII or
      sensitive data exposure.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0472_NIST2024
    name: Domain Adaptation Risk Assessment
    description:
      Re-evaluate risks when adapting GAI models to new domains. Additionally, establish warning systems to determine if
      a GAI system is being used in a new domain where previous assumptions (relating to context of use or mapped risks
      such as security, and safety) may no longer hold.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0481_NIST2024
    name: Context-Based Impact Measures
    description:
      Determine context-based measures to identify if new impacts are present due to the GAI system, including regular
      engagements with downstream AI Actors to identify and quantify new contexts of unanticipated impacts of GAI
      systems.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0482_NIST2024
    name: Input Actor Engagement
    description:
      Plan regular engagements with AI Actors responsible for inputs to GAI systems, including third-party data and
      algorithms, to review and evaluate unanticipated impacts.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0488_NIST2024
    name: Equitable Output Monitoring
    description:
      Implement continuous monitoring of GAI system impacts to identify whether GAI outputs are equitable across various
      sub-populations. Seek active and direct feedback from affected communities via structured feedback mechanisms or
      red-teaming to monitor and improve outputs.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0505_NIST2024
    name: Source and Citation Review
    description:
      Review and verify sources and citations in GAI system outputs during pre-deployment risk measurement and ongoing
      monitoring activities
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0506_NIST2024
    name: Anthropomorphization Tracking
    description:
      Track and document instances of anthropomorphization (e.g., human images, mentions of human feelings, cyborg
      imagery or motifs) in GAI system interfaces.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0508_NIST2024
    name: Security Guardrail Review
    description:
      Regularly review security and safety guardrails, especially if the GAI system is being operated in novel
      circumstances. This includes reviewing reasons why the GAI system was initially assessed as being safe to deploy.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0524_NIST2024
    name: Security Measure Effectiveness
    description: Regularly assess and verify that security measures remain effective and have not been compromised.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0525_NIST2024
    name: Policy Violation Statistics
    description:
      "Compile statistics on actual policy violations, take-down requests, and intellectual property infringement for
      organizational GAI systems: Analyze transparency reports across demographic groups, languages groups."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0629_Barrett2024
    name: Risk Tracking
    description:
      "Track important identified risks (e.g., vulnerabilities from data poisoning and other

      attacks or objectives mis-specification) even if they cannot yet be measured"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0676_Barrett2024
    name: Monitor System in Production
    description: "The functionality

      and behavior of the

      AI system and its

      components – as

      identified in the Map

      function – are

      monitored when in

      production."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0690_Barrett2024
    name: Document Performance Shifts from Field Data
    description: "Measurable

      performance

      improvements or

      declines based on

      consultations with

      relevant AI actors,

      including affected

      communities, and

      field data about

      context-relevant risks

      and trustworthiness

      characteristics are

      identified

      and document"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0700_Barrett2024
    name: Monitor Pre-trained Models
    description: "Pre-trained models

      which are used for

      development

      are monitored as part

      of AI system regular

      monitoring and

      maintenance."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0701_Barrett2024
    name: Implement Post-deployment Monitoring Plan
    description: "Post-deployment AI

      system monitoring

      plans are implemented,

      including mechanisms

      for capturing and

      evaluating input

      from users and other

      relevant AI actors,

      appeal and override,

      decommissioning,

      incident response,

      recovery, and change

      management."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0702_Barrett2024
    name: Integrate Continuous Improvement
    description: "Measurable activities

      for continual

      improvements

      are integrated into

      AI system updates

      and include regular

      engagement with

      interested parties,

      including relevant AI

      actors."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0724_NIST2024
    name: Information Integrity
    description: "Monitor and document instances where human operators or other systems

      override the GAI's decisions. Evaluate these cases to understand if the overrides

      are linked to issues related to content provenance. (AI Deployment, Domain Experts, End-Users, Operation and
      Monitoring, TEVV)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0730_NIST2024
    name: Information Integrity
    description:
      "Evaluate feedback loops between GAI system content provenance and human

      reviewers, and update where needed. Implement real-time monitoring systems

      to affirm that content provenance protocols remain effective. (AI Deployment, AI Impact Assessment, Governance and
      Oversight, Operation and Monitoring)"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0734_NIST2024
    name: Information Integrity
    description:
      "Use real-time auditing tools where they can be demonstrated to aid in the

      tracking and validation of the lineage and authenticity of AI-generated data. (AI Deployment, AI Impact
      Assessment, Governance and Oversight, Operation and Monitoring)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0747_NIST2024
    name: Information Integrity
    description:
      "Implement real-time monitoring processes for analyzing generated content

      performance and trustworthiness characteristics related to content provenance

      to identify deviations from the desired standards and trigger alerts for human

      intervention."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0749_NIST2024
    name: Human-AI Configuration
    description:
      "Use human moderation systems where appropriate to review generated content

      in accordance with human-AI configuration policies established in the Govern

      function, aligned with socio-cultural norms in the context of use, and for settings

      where AI models are demonstrated to perform poorly."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0752_NIST2024
    name: CBRN Information or Capabilities; Confabulation; Information Security
    description:
      "Establish, maintain, and evaluate effectiveness of organizational processes and

      procedures for post-deployment monitoring of GAI systems, particularly for

      potential confabulation, CBRN, or cyber risks."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0754_NIST2024
    name: Confabulation
    description:
      "Implement active learning techniques to identify instances where the model fails

      or produces unexpected outputs."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0758_NIST2024
    name: Harmful Bias and Homogenization
    description:
      "Conduct regular monitoring of GAI systems and publish reports detailing the

      performance, feedback received, and improvements made."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0831_UK_Government2023
    name: Recurrent Performance analysis of AI models
    description:
      Measure the performance of AI models and systems on an ongoing basis. A decline in model performance could be an
      indication of an attack or could indicate that a model is encountering data that is different from that which it
      was trained on. Either way, further investigation may be required.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0832_UK_Government2023
    name: Monitoring Inputs to AI Systems for Audit Development
    description:
      Monitor and log inputs to AI systems to enable audit, investigation and remediation in the case of compromise.
      Some attacks against AI systems rely on repeated querying. Proper logging will help you audit your system and
      identify any anomalous inputs.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0889_UK_Government2023
    name: Misuse Mapping
    description:
      Understand how their own models – as well as how models released by other groups – are being misused. Knowing that
      some people have begun using a competitor’s model to conduct phishing attacks, for example, may lead a frontier AI
      organisation to become more concerned that its own model will be misused in this way.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0909_UK_Government2023
    name: Diverse Monitoring Techniques
    description:
      Employ diverse monitoring techniques to balance comprehensiveness, scalability, and privacy. A strong monitoring
      setup will generally combine automated and human review, in recognition that automated reviews may miss intricate
      issues, while human reviews are not always scalable and can pose privacy issues.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0950_Gipiskis2024
    name: Dashboard of model properties
    description:
      "A dashboard [41] displays all the relevant information about the model’s internal state and the
      model’s physical properties to the user. It is used to ensure that the user is informed about factors that
      influence the behavior of the model and to ensure that the user maintains control over the model. Allowing only
      the user to access the dashboard can aid in information asymmetry between the user and model, thus supporting the
      user oversight over the model.

      Examples of the model’s internal state include its representations of the world, representation of users, and the
      strategies it is currently pursuing; while examples of the model’s physical properties include the model’s compute
      and energy consumption, physical storage occupied, and physical networks it is connected to."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0977_Gipiskis2024
    name: Monitoring of model capabilities
    description:
      "AI models are often trained to develop specific capabilities by using appropriate training data and
      training goals. However, models may develop capabilities that they were not specifically trained for. One subset
      of this is emergent capabilities, i.e., capabilities that emerged in larger models but not smaller models given a
      similar training process [215].

      These capabilities can be monitored, allowing models to be tested not only for their intended capabilities but
      also for capabilities that are not intended."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0979_Gipiskis2024
    name: Post-deployment ongoing monitoring for unexpected use cases
    description:
      "Ongoing monitoring of AI systems can uncover emergent or newly identified capabilities and
      limitations, in particular when new use cases are found, or in a large-scale deployment with a diverse population
      of users. These new capa- bilities or limitations can inform ongoing risk analysis. New use-cases can be
      discovered via monitoring publications, online forums, or APIs [131].

      For example, a LLM might have unexpectedly high competence at giving con- vincing medical advice, despite not
      being directly developed for that purpose, nor verified for accuracy. In that case, the potential risks of this
      newly found competence can be assessed."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0980_Gipiskis2024
    name: Monitoring protocols for po- tentially adversarial GPAI systems
    description:
      "Similar to cybersecurity protocols, AI providers can prepare in advance for po- tential adversarial
      action from AI systems by developing and stress-testing protocols for potential adversarial action [179]. Such
      adversarial action may range from hiding code exploits, to strategic deception or loss of control related be-
      haviors.

      AI systems may be adversarial due to malicious actors (e.g., data poisoning), or due to unintended issues of
      control (lack of alignment with human intent). Alongside improving the system alignment, external monitoring and
      restrictions may be deployed in advance to “catch” these adversarial model malfunctions before harm is done.

      Like with cybersecurity red teaming, any protocol which assumes adversarial action can be stress tested in
      advance. For example, this can be done by pro- jecting the plausible capabilities and affordances of the
      adversarial actor (e.g., in the case of a tech company - a hacker, or a disgruntled employee). From this process,
      measures that better anticipate possible adversarial action can be deployed, and catch unsuccessful attempts at
      adversarial behavior.

      If such unsuccessful attempts are caught, they can be reported in incident re- ports, and serve as an input to
      further risk analysis. Depending on their severity, it may be advisable to recall the system if deployed. Examples
      of these protocols include [84]:

      • Flagging of suspicious frontier AI system code generation for human over- sight, with the help of better proven
      (“trusted”) AI systems or automated keyword detection.

      • Using a better proven (“trusted”) AI system to edit the code produced by a frontier AI system if suspicious.•
      Monitoring of AI system with another instance of this same system, with filters to prevent collusion.

      • Restriction of access of the AI system to private information."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1005_Gipiskis2024
    name: Tracking benchmark leakage
    description:
      Constant monitoring and documentation of benchmark leakage can help with the early detection of benchmark leaks
      [224, 95].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0039_Casper2025
    name: Shutdown procedures
    description:
      Developers can be required to document if and which protocols exist to shut down frontier systems that are under
      their control.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0110_Future_of_Life_Institute2024
    name: Emergency Rollback Plan
    description:
      "Critically dangerous capabilities or very severe yet unexpected misuse patterns might only surface
      after a system has been deployed. Has your firm developed an emergency response plan to react to scenarios where
      such problems cannot be resolved quickly via updates? Please select all interventions that your organization has
      implemented.


      Made legal and technical preparations to roll back a system rapidly

      Formally specified the risk threshold that would trigger a rapid rollback

      Committed to regular safety drills to test emergency response"
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0180_Schuett2023
    name: Emergency response plan
    description:
      AGI labs should have and practice implementing an emergency response plan. This might include switching off
      systems, overriding their outputs, or restricting access.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0189_Schuett2023
    name: Model containment
    description: AGI labs should contain models with sufficiently dangerous capabilities (e.g. via boxing or air-gapping).
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0209_Schuett2023
    name: Security incident response plan
    description: AGI labs should have a plan for how they respond to security incidents (e.g. cyberattacks).*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0251_Wiener2024
    name: Capability to promptly enact a full shutdown
    description: "When enacting a full shutdown, the developer shall take

      into account, as appropriate, the risk that a shutdown of the covered

      model, or particular covered model derivatives, could cause

      disruptions to critical infrastructure."
    hasDocumentation:
      - doc-Wiener2024
    type: Action
  - id: A0401_NIST2024
    name: Incident Response Process
    description:
      Establish organizational policies and procedures for after action reviews of GAI system incident response and
      incident disclosures, to identify gaps; Update incident response and incident disclosure processes as required.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0406_NIST2024
    name: Deactivation Protocol
    description: Protocols are put in place to ensure GAI systems are able to be deactivated when necessary.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0409_NIST2024
    name: Incident Response Teams
    description:
      Establish procedures to engage teams for GAI system incident response with diverse composition and
      responsibilities based on the particular incident type.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0410_NIST2024
    name: Response Team Verification
    description:
      Establish processes to verify the AI Actors conducting GAI incident response tasks demonstrate and maintain the
      appropriate skills and training.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0439_NIST2024
    name: Third-Party Response Plans
    description:
      "Establish incident response plans for third-party GAI technologies: Align incident response plans with impacts
      enumerated in MAP 5.1; Communicate third-party GAI incident response plans to all relevant AI Actors; Define
      ownership of GAI incident response functions; Rehearse third-party GAI incident response plans at a regular
      cadence; Improve incident response plans based on retrospective learning; Review incident response plans for
      alignment with relevant breach reporting, data protection, data privacy, or other laws."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0442_NIST2024
    name: Rollover and Fallback Management
    description:
      Establish policies and procedures to test and manage risks related to rollover and fallback technologies for GAI
      systems, acknowledging that rollover and fallback may include manual processing.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0466_NIST2024
    name: IP Infringement Response
    description: Implement processes for responding to potential intellectual property infringement claims or other rights.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0521_NIST2024
    name: Security Implementation Rate
    description:
      Measure the rate at which recommendations from security checks and incidents are implemented. Assess how quickly
      the AI system can adapt and improve based on lessons learned from security incidents and feedback
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0528_NIST2024
    name: User Instruction Adequacy
    description: Verify adequacy of GAI system user instructions through user testing.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0639_Barrett2024
    name: Decommission AI Systems Safely
    description: "Processes and

      procedures are in place

      for decommissioning

      and phasing out AI

      systems safely and in a

      manner

      that does not increase

      risks or decrease the

      organization’s

      trustworthiness."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0651_Barrett2024
    name: Contingency Planning for Third-Party Failures
    description: "Contingency processes

      are in place to handle

      failures or incidents in

      third-party data or AI

      systems deemed to be

      high-risk."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0697_Barrett2024
    name: Respond to Unknown Risks
    description: "Procedures are

      followed to respond

      to and recover from a

      previously unknown risk

      when it is identified."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0698_Barrett2024
    name: Deactivate Misaligned Systems
    description: "Mechanisms are in

      place and applied,

      and responsibilities

      are assigned and

      understood, to

      supersede, disengage,

      or deactivate AI systems

      that demonstrate

      performance or

      outcomes inconsistent

      with intended use."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0737_NIST2024
    name: Value Chain and Component Integration
    description: "Develop and update GAI system incident response and recovery plans and

      procedures to address the following: Review and maintenance of policies and

      procedures to account for newly encountered uses; Review and maintenance of

      policies and procedures for detection of unanticipated uses; Verify response

      and recovery plans account for the GAI system value chain; Verify response and

      recovery plans are updated for and include necessary details to communicate

      with downstream GAI system Actors: Points-of-Contact (POC), Contact

      information, notification format. (AI Deployment, Operation and Monitoring)"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0739_NIST2024
    name: Information Security
    description:
      "Establish and maintain procedures for escalating GAI system incidents to the

      organizational risk management authority when specific criteria for deactivation

      or disengagement is met for a particular context of use or for the GAI system as a

      whole."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0740_NIST2024
    name: Information Security
    description:
      "Establish and maintain procedures for the remediation of issues which trigger

      incident response processes for the use of a GAI system, and provide stakeholders

      timelines associated with the remediation plan"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0759_NIST2024
    name: Human-AI Configuration; Dangerous, Violent, or Hateful Content
    description:
      "Practice and follow incident response plans for addressing the generation of

      inappropriate or harmful content and adapt processes based on findings to

      prevent future occurrences. Conduct post-mortem analyses of incidents with

      relevant AI Actors, to understand the root causes and implement preventive

      measures."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0830_UK_Government2023
    name: Incident Response, Escalation, and Remeditation Plans
    description:
      Develop an organisational incident response plan. The inevitability of security incidents affecting systems is
      reflected in organisational incident response planning. A well-planned response will help minimise the damage
      caused by an attack and support recovery.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0833_UK_Government2023
    name: Mitigation Actions for AI-related security incidents
    description: Take action to mitigate and remediate issues and document any AI-related security incidents and vulnerabilities.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0883_UK_Government2023
    name: Continuous Updating of Defensive Tools
    description:
      Continuously update defensive tools as workarounds are discovered. In some cases, this may be an ongoing effort
      that requires sustained investment.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0904_UK_Government2023
    name: Worst-case scenario Response
    description:
      Implement processes and technical requirements to enable rapid rollback or withdrawal of models in case of
      egregious, widespread or consistent harms. Rolling back to a previous version of a model that does not suffer from
      the same misuse threats, or withdrawing access to a model altogether, may be proportionate actions in such
      situations of extreme threat or consistent misuse. Running periodic dry runs could increase preparedness for such
      situations.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0941_Gipiskis2024
    name: Internal data poisoning diagnosis
    description:
      Providers can have an internal framework to identify what specific data poison- ing attack their model may be a
      victim of based on a set of symptoms, such as analysis of target algorithm and architecture, perturbation scope
      and dimen- sion, victim model, and data type [39]. This framework includes known defenses against the diagnosed
      attack, which providers can then apply to the model.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0988_Gipiskis2024
    name: Redundant systems not reliant on GPAI
    description:
      "Redundant systems provide continuation of a given system’s processes in case of failure of the given
      system. Importantly, redundant systems should not rely on the factors that caused the original system to fail in
      the first place, which can include an AI system [47].

      For example, if an AI system is incorporated into the landing gear system of an aircraft, such as during
      autonomous control of the aircraft, redundant systems in the form of mechanical or hydraulic mechanisms must be
      present to allow for deployment of the landing gear in case of AI system failure."
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1035_Uuk2024
    name: Safety Drills
    description:
      Regularly practicing the implementation of an emergency response plan to stress test the organization's ability to
      respond to reasonably foreseeable, fast-moving emergency scenarios.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0630_Barrett2024
    name: Apply Lifecycle Risk Controls
    description:
      "Implement risk-reduction controls as appropriate throughout a GPAIS lifecycle, e.g.,

      independent auditing, incremental scale-up, red-teaming, structured access or staged

      release, and other steps"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0696_Barrett2024
    name: Sustain Deployed System Value
    description: "Mechanisms are in

      place and applied to

      sustain the value of

      deployed AI systems."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0005_Bengio2025
    name: Documentation
    description:
      "There are numerous documentation best practices, guidelines, and requirements for AI systems to track
      e.g. training data, model design and functionality, intended use cases, limitations, and risks.


      Model cards’ and ‘system cards’ are examples of prominent AI documentation standards"
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0027_Casper2025
    name: Document compute usage
    description:
      Given that computing power is key to frontier AI development (Sastry et al., 2024), frontier developers can be
      required to document their compute resources including details such as the usage, providers, and the location of
      compute clusters.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0028_Casper2025
    name: Documentation availability
    description:
      All of the above documentation can be made available to the public (redacted) and AI governing authorities
      (unredacted).
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0035_Casper2025
    name: Model specification and basic info
    description:
      Developers can be required to document intended use cases and behaviors (e.g., OpenAI, 2024) and basic information
      about frontier systems such as scale.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0050_Eisenberg2025
    name: Establish AI system documentation framework
    description:
      Implement comprehensive documentation requirements and processes covering training data provenance, system
      architecture, model cards, and component interactions to ensure transparent documentation of both the data
      lifecycle and system design.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0081_Eisenberg2025
    name: Establish documentation sharing mechanism
    description:
      Implement a process to share information and documentation to third-parties, including to regulators and
      downstream deployers or developers.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0146_Future_of_Life_Institute2024
    name: Publication of Alignment Research
    description:
      Does your organization publish alignment research? If yes, please provide a URL to a website that showcases
      relevant publications.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0256_Wiener2024
    name: Publish results of safety tests
    description: ""
    hasDocumentation:
      - doc-Wiener2024
    type: Action
  - id: A0264_EU_AI_Office2025
    name: Documentation
    description:
      Signatories commit to documenting information relevant to the assessment and mitigation of sytemic risks from
      their GPAISRs, including keeping up-to-date model documentation and providing relevant information to providers of
      AI systems who intend to integrate the general-purpose AI model into their AI systems
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0388_NIST2024
    name: Legal Compliance Alignment
    description:
      Align GAI development and use with applicable laws and regulations, including those related to data privacy,
      copyright and intellectual property law.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0402_NIST2024
    name: Documentation Retention Policy
    description:
      Maintain a document retention policy to keep history for test, evaluation, validation, and verification (TEVV),
      and digital content transparency methods for GAI.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0405_NIST2024
    name: Comprehensive Inventory Details
    description:
      "In addition to general model, governance, and risk information, consider the following items in GAI system
      inventory entries: Data provenance information (e.g., source, signatures, versioning, watermarks); Known issues
      reported from internal bug tracking or external information sharing resources (e.g., AI incident database, AVID,
      CVE, NVD, or OECD AI incident monitor); Human oversight roles and responsibilities; Special rights and
      considerations for intellectual property, licensed works, or personal, privileged, proprietary or sensitive data;
      Underlying foundation models, versions of underlying models, and access modes."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0423_NIST2024
    name: Downstream Impact Verification
    description:
      Verify that downstream GAI system impacts (such as the use of third-party plugins) are included in the impact
      documentation process.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0434_NIST2024
    name: Third-Party Change Records
    description:
      Maintain records of changes to content made by third parties to promote content provenance, including sources,
      timestamps, metadata.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0437_NIST2024
    name: Value Chain Risk Documentation
    description:
      Document GAI risks associated with system value chain to identify over-reliance on third-party data and to
      identify fallbacks.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0452_NIST2024
    name: Upstream Dependency Documentation
    description:
      Identify and document how the system relies on upstream data sources, including for content provenance, and if it
      serves as an upstream dependency for other systems.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0504_NIST2024
    name: Human Domain Knowledge Documentation
    description:
      Document the extent to which human domain knowledge is employed to improve GAI system performance, via, e.g.,
      RLHF, fine-tuning, retrieval-augmented generation, content moderation, business rules.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0530_NIST2024
    name: GAI Model Documentation
    description:
      "Document GAI model details including: Proposed use and organizational value; Assumptions and limitations, Data
      collection methodologies; Data provenance; Data quality; Model architecture (e.g., convolutional neural network,
      transformers, etc.); Optimization objectives; Training algorithms; RLHF approaches; Fine-tuning or
      retrieval-augmented generation approaches; Evaluation data; Ethical considerations; Legal and regulatory
      requirements."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0631_Barrett2024
    name: Disclose Risks to Stakeholders
    description:
      "Incorporate identified AI system risk factors, and circumstances that could result in

      impacts or harms, into reporting and engagement with internal and external stake-

      holders (e.g., to downstream developers, regulators, users, impacted communities, etc.) on

      the AI system as appropriate, e.g., using model cards, system cards, and other transparency

      mechanisms"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0652_Barrett2024
    name: Document Intended Use & Context
    description: "Intended purposes,

      potentially beneficial uses,

      context-specific laws,

      norms and expectations,

      and prospective settings

      in which the AI system

      will be deployed

      are understood

      and documented."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0654_Barrett2024
    name: Document AI Mission & Goals
    description: "The organization’s

      mission and relevant

      goals for AI technology

      are understood and

      documented."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0655_Barrett2024
    name: Business Use
    description: "The business value or

      context of business

      use has been clearly

      defined or – in the case

      of assessing existing AI

      systems – re-evaluated."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0658_Barrett2024
    name: Define Tasks & Methods
    description: "The specific tasks

      and methods used to

      implement the tasks

      that the AI system will

      support are defined

      (e.g., classifiers,

      generative models,

      recommenders)."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0659_Barrett2024
    name: Document Limits & Oversight
    description: "Information about the AI

      system’s knowledge limits

      and how system output

      may be utilized and

      overseen by humans is

      documented. Documen-

      tation provides sufficient

      information to assist

      relevant AI actors when

      making decisions and tak-

      ing subsequent actions."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0660_Barrett2024
    name: Document TEVV & Integrity
    description: "Scientific integrity and

      TEVV considerations

      are identified and docu-

      mented, including those

      related to experimental

      design, data collection

      and selection (e.g.,

      availability, represen-

      tativeness, suitability),

      system trustworthiness,

      and construct validation"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0661_Barrett2024
    name: Document Intended Benefits
    description: "Potential benefits of intend-

      ed AI system functionality

      and performance are ex-

      amined and documented"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0663_Barrett2024
    name: Document Application Scope
    description: "Targeted application

      scope is specified

      and documented

      based on the system’s

      capability, established

      context, and AI system

      categorization."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0673_Barrett2024
    name: Document TEVV Tools & Metrics
    description: "Test sets, metrics, and

      details about the tools

      used during TEVV are

      documented."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0675_Barrett2024
    name: Measure & Document Deployment Performance
    description: "AI system performance

      or assurance criteria

      are measured

      qualitatively or

      quantitatively and

      demonstrated

      for conditions similar

      to deployment

      setting(s). Measures

      are documented"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0680_Barrett2024
    name: Explain & Document Model Behavior
    description: "The AI model is

      explained, validated,

      and documented, and

      AI system output is

      interpreted within its

      context – as identified

      in the Map function – to

      inform responsible use

      and governance."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0719_NIST2024
    name: Human-AI Configuration; Information Integrity; Harmful Bias and Homogenization
    description:
      "Provide input for training materials about the capabilities and limitations of GAI

      systems related to digital content transparency for AI Actors, other

      professionals, and the public about the societal impacts of AI and the role of

      diverse and inclusive content generation (AI Deployment, Affected Individuals and Communities, End-Users,
      Operation and Monitoring, TEVV)"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0729_NIST2024
    name: Information Integrity
    description:
      Document training data sources to trace the origin and provenance of AI generated content (AI Deployment, AI
      Impact Assessment, Governance and Oversight, Operation and Monitoring).
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0760_NIST2024
    name: Human-AI Configuration
    description:
      "Use visualizations or other methods to represent GAI model behavior to ease

      non-technical stakeholders understanding of GAI system functionality"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0817_UK_Government2023
    name: Information Sharing with Downstream Users
    description:
      Share specific information with downstream users of the model to enable more effective risk mitigation across the
      AI supply chain and build consumer confidence. This could include uses of the model that are against their terms
      of service, and could be provided to users through user terms or published information about the model.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0826_UK_Government2023
    name: Data Documentation
    description:
      Document data, models, prompts, evaluation materials and other assets, using commonly used structures such as data
      cards, model cards and software bills of materials (SBOMs). This will allow you to identify and share key
      information, including particular security concerns, quickly and easily.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0926_UK_Government2023
    name: Documentation of Results of Input Data Audits
    description:
      Document the results of input data audits, including metadata. Frontier AI organisations could look to emerging
      standards when documenting the results of input data audits, such as datasheets for datasets
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0938_Gipiskis2024
    name: Calibrated confidence measures for model pre- dictions
    description:
      Incorporating calibrated confidence measures alongside a model’s predictions and standard performance metrics,
      such as accuracy, can help users identify in- stances of overconfidence in incorrect predictions or
      underconfidence in correct ones [85]. These additional measures can provide users with more information to better
      interpret the model’s decisions and assess whether its predictions can be trusted.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A0034_Casper2025
    name: Model registration
    description:
      Developers can be required to register (McKernon et al., 2024) frontier systems with governing bodies (regardless
      of whether they will be externally deployed).
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0082_Eisenberg2025
    name: Implement a risk reporting mechanism
    description:
      Establish processes to identify and disclose known or reasonably foreseeable risks, the discovery of new risks, or
      instances of non-conformity to third parties.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0130_Future_of_Life_Institute2024
    name: Notify government about large training runs
    description: Does your organization notify the appropriate government authorities about large upcoming training runs?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0138_Future_of_Life_Institute2024
    name: Pre-deployment risk disclosure
    description:
      Does your organization share the results of its pre-deployment risk assessments with the appropriate government(s)
      before deploying a new model? Does this reporting include details on internal safety evaluations and any safety
      evaluations completed by independent third parties? Is the government provided with a justification for why the
      firm deems the system safe enough to deploy and is willing to accept the remaining risks? Please check all that
      apply.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0141_Future_of_Life_Institute2024
    name: Pre-training risk disclosure
    description:
      Does your organization share the results of model-specific pre-training risk assessments with the appropriate
      government authorities before launching large training runs?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0149_Future_of_Life_Institute2024
    name: Safety evaluation transparency
    description: We highlight the main sources of information about content and results of the safety evaluations.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0193_Schuett2023
    name: Notify a state actor before deployment
    description: AGI labs should notify appropriate state actors before deploying powerful models.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0194_Schuett2023
    name: Notify affected parties
