  - id: A0269_EU_AI_Office2025
    name: Public Transparency
    description:
      Signatories commit to publishing information relevant to the public understanding of systemic risks stemming from
      their GPAISRs, where necessary to effectively enable assessment and mitigation of systemic risks, including new or
      updated versions of their Frameworks and Model Reports.
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0273_EU_AI_Office2025
    name: Safety and Security Model Reports
    description:
      "Signatories should commit to reporting to the AI Office about their implementation of the Code, and especially
      the application of their Framework to the development, making available on the market, and/or use of their
      GPAISRs, by creating a Safety and Security Model Report, which will document: (1) the results of systemic risk
      assessment and mitigation for the model in question; and (2) justifications of decisions to make the model in
      question available on the market."
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0280_Campos2025
    name: Stakeholder Sharing of Risk Documentation
    description:
      The results of the risk modeling work should be well documented, including the methodologies used, the experts
      involved, and the list of identified scenarios. This documentation should be shared with relevant stakeholders
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0411_NIST2024
    name: National Security Involvement
    description:
      When systems may raise national security risks, involve national security professionals in mapping, measuring, and
      managing those risks.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0501_NIST2024
    name: Pre-Deployment Results Sharing
    description:
      Share results of pre-deployment testing with relevant GAI Actors, such as those with system release approval
      authority
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0526_NIST2024
    name: Annotator Instruction Documentation
    description: Document the instructions given to data annotators or AI red-teamers.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0632_Barrett2024
    name: Document Mitigation Rationale
    description: "Document the process used in considering risk mitigation controls,

      the options considered, and reasons for choices."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0646_Barrett2024
    name: Document & Share AI Risk Impacts
    description: "Organizational teams

      document the risks and

      potential impacts of

      the AI technology they

      design, develop, deploy,

      evaluate, and use, and

      they communicate

      about the impacts more

      broadly."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0755_NIST2024
    name: Human-AI Configuration; Harmful Bias and Homogenization
    description:
      "Share transparency reports with internal and external stakeholders that detail

      steps taken to update the GAI system to enhance transparency and

      accountability"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0782_UK_Government2023
    name: Risk Assessment Disclosure to Third Parties
    description:
      "Regularly update relevant stakeholders on risk assessment and mitigation measures: This will enable
      assessment of whether AI organisations have sufficient risk management processes in place, build up a picture of
      best practices, and make recommendations to address gaps. When sharing this information with external actors,
      consideration should be given to commercially sensitive information. Additional ad hoc updates could be provided
      in cases of major developments.Include information on evaluations, risk assessment and mitigation, and individuals
      involved. For example: 1) What types of tests and evaluations are being run on which types of models; 2) What
      other risk assessment methods are being used, which kinds of expertise are

      drawn on, and whether impacted stakeholders are being involved; 3) How risk mitigation measures are being
      monitored; 4) Which teams and individuals are involved at different stages of the risk management process (and
      how, if at all, third parties are involved); 5) Measures taken to address specific categories of risk, such as
      cybersecurity measures"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0803_UK_Government2023
    name: Discretionary Evaluator Disclosure
    description:
      Allow evaluators to share and discuss the results of their evaluations, with potential restrictions where
      necessary e.g. not sharing proprietary information, information whose spread could lead to substantial harm or
      information that would have an adverse effect on competition in the market. Sharing the results of evaluations can
      allow governments, regulators, users, and other frontier AI organisations to make informed decisions.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0805_UK_Government2023
    name: Disclosure of Model Evaluation Research and Development
    description:
      Share the products of their model evaluation research and development, except when sharing the results might be
      harmful. In some cases, findings (e.g. about how to elicit dangerous capabilities) could be harmful if spread.
      When the expected harm is sufficiently small, the AI research community, other frontier AI organisations, and
      relevant government bodies could benefit from being informed of their work.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0806_UK_Government2023
    name: Disclosure of Risk Assessment Processes
    description:
      Share details of risk assessment processes and risk mitigation measures with relevant government authorities and
      other AI companies, as set out in Responsible Capability Scaling.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0809_UK_Government2023
    name: Pre-training Disclosure of High-Level Model Details to Government Authorities
    description:
      "Before training, share high-level model details with the relevant government authorities and justify why the
      training run does not impose unacceptable risk. This includes: 1) A high-level description of the model (including
      high-level information on intended use cases, intended users, training data, and model architecture); 2) Compute
      details (including the maximum the organisation plans to use, as well as information about its location and who
      provides it); 3) Description of the data that will be used to train the model; 4) Evidence from scaling small
      models that the full training run does not pose unacceptably high risks; 5) Descriptions of specific internal and
      external risk assessments and mitigation efforts,3 and an overall safety assessment justifying why and how the
      training run is sufficiently low-risk to execute; 6) Description of which, if any, domain experts and impacted
      stakeholders have been involved in the project’s design, as well as risk and impact assessment; 7) Plans for model
      evaluations during and after training, as well as predicted dangerous capabilities"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0810_UK_Government2023
    name: Updates to Government Authorities During Training
    description:
      "During training, update information provided to relevant government authorities with any significant changes to
      the model itself or its risk profile. This could include: 1) Updates on model development at each evaluation
      checkpoint as well as any significant updates to the development plan; 2) Results from model evaluations,
      including details of emergent dangerous capabilities and whether these were expected; 3) Whether and how the risk
      context has changed (e.g. if other AI tools have been published that the model could interact with)"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0811_UK_Government2023
    name: Disclosure of Risk Context to Government Authorities at Deployment
    description:
      "At the point of deployment, share details of the model, any risks the model might pose and what steps
      have been taken to mitigate those risks with relevant government authorities and the wider public. Information can
      be provided in full to the relevant government authority, ensuring that robust security measures are in place to
      protect sensitive information. Some of this information can be made available to the public by publishing a
      transparency report (e.g. a model card) and providing general overviews of model purpose and risk assessment
      evaluation results. Information that exposes model vulnerabilities or facilitates the spread of dangerous
      capabilities should be redacted from the transparency report, unless sharing this information publicly would be
      sufficiently helpful for mitigating the risks the model poses. Information that is commercially sensitive (e.g.
      detailed information on training data) or exposes the capabilities or vulnerabilities of the model should be
      redacted. Commercially sensitive information could be shared with government or regulators, who could share this
      information with industry in an aggregated or anonymised form. Information shared at deployment could include: 1)
      A description of the model; 2) Information about safe practices for model usage (including domains of
      inappropriate and appropriate use, or guidelines on determining whether a use is appropriate); 3) Training
      details, including a detailed description of the training data and any biases they may encode; 4) The model’s
      biases, risks and limitations; 5) Pre-development and pre-deployment risk and impact assessment procedures; 6)
      Details of the evaluation process the frontier AI organisation conducted, including time and resources spent,
      information about the expertise and independence of people conducting the evaluations, the level of access given
      to evaluators, and anticipated limitations of the evaluations used; 7) Details about which, if any, domain experts
      and impacted stakeholders have been involved in the project’s design and risk and impact assessment; 8) The
      results of any internal or external evaluations that were conducted; 9) Holistic assessments of the models’
      robustness, interpretability, and controllability,

      drawing on more specific evaluation results; 9) Significant measures taken to mitigate potential harmful
      consequences of deployment, including accountability and verification mechanisms put in place, and internal
      governance processes carried out; 10) Capabilities and risks of the final, public-release model before and after
      safety mitigations, including a description of the mitigations to prevent accidents and misuse (e.g. available
      tools and their expected effectiveness); 11) Plans for ongoing, post-deployment monitoring of risks and
      capabilities and how the organisation will respond to future incidents (unless releasing this information would
      allow bad actors to circumvent post-deployment safety measures); 12) Descriptions of post-deployment access
      controls; 13) Expected compute requirements for running the model during deployment"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0812_UK_Government2023
    name: Adjucation around Publicly Sharing Risks
    description:
      Before sharing information, consider the risks of sharing this information and judge whether it is inappropriate
      to share certain pieces of information. In particular, it is important to consider potential harms from publicly
      sharing information about dangerous capabilities and methods for eliciting them, as this information could
      motivate or help other actors to acquire these capabilities. It is also important to consider potential harms from
      publicly sharing detailed information about how models were produced, as this may lower barriers to producing
      similar models. If the models have or could be modified to possess dangerous capabilities (e.g. biological
      capabilities or surveillance capabilities), then facilitating widespread distribution of the model in this way may
      be harmful. The National Protective Security Authority (NPSA) guidance on a security-minded approach to
      information management may prove helpful for sharing information appropriately.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0813_UK_Government2023
    name: Principled Policies for Disclosure
    description:
      Develop principled policies about what information to share publicly, with governments, or not at all. These
      policies could specify situations under which sharing some piece of information is subject to a risk assessment,
      along with guidelines for conducting the risk assessment and responding to it. It is important, however, to avoid
      creating risk assessment criteria and procedures that are overly strict and intensive to prevent excessive
      opacity. These policies could be guided and overseen by an independent review panel of multidisciplinary experts
      to ensure decisions made about or against information sharing are justifiable and oriented to optimal
      transparency.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0814_UK_Government2023
    name: Disclosure of Information with AI-focused Government Authorities
    description:
      Share complete forms of this information with central AI-focused government authorities (including central
      government bodies, security agencies, and regulators) to enable robust government oversight of potentially
      high-risk areas of AI development and the processes in place to identify and manage those risks. These authorities
      could then further share information selectively with additional government bodies where relevant. Some
      particularly security-relevant pieces of information may need to be shared directly with security agencies, such
      as the cybersecurity measures being used in model development (which would make it easier for those agencies to
      identify potential security risks), or specific physical or cybersecurity threat incidents. Robust security
      measures are in place when sharing more sensitive information.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0815_UK_Government2023
    name: Sharing of Limited Information
    description:
      Share more limited information with other AI organisations in order to facilitate learning and the development of
      best practices. This could include best practices and lessons learned in the development of risk assessment and
      mitigation measures and risk governance processes, some details about safety and security incidents (to enable
      increased awareness while protecting intellectual property), and highlights and lessons learned from risk
      assessments and capability evaluation. In general, it will be easier for organisations to share model-agnostic
      information with one another than model-specific information, which may be more commercially sensitive. It will
      also be important to consider that there is no privileged access to information that may give a competitive
      advantage to some firms.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0818_UK_Government2023
    name: Sharing General Information with the Public
    description:
      Share more general versions of the information outlined with the public to enable public scrutiny and build public
      confidence in the safety and reliability of AI systems. This could include high-level summaries of risk assessment
      and mitigation processes, high-level details of safety and security incidents, summaries of risk governance
      processes, and general overviews of model purpose, use cases, and the results of risk assessments and capability
      evaluations.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0863_UK_Government2023
    name: Cost-Benefit Analysis of Sharing Vulnerability Reports
    description:
      Consider the ways in which sharing information about vulnerabilities can both exacerbate and mitigate risks.
      Sharing can alert would-be attackers, but also alert would-be victims and actors with the power to create
      defences. One particularly important factor is how easily fixable the model vulnerability is. If a vulnerability
      will take a very long time to fix, or cannot be fixed, then public reporting may not be justified.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0864_UK_Government2023
    name: Development of Protocols for Disclosure of Model Vulnerability Information
    description:
      Developing – and publicly describe – protocols for deciding how to share model vulnerability information. These
      protocols may, for example, outline conditions under which information is to be shared with different actors
      depending on the type of harm or vulnerability identified.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0865_UK_Government2023
    name: Mechanisms to Disclose Vulnerability Reports to Third Parties
    description:
      Put in place mechanisms to disclose information about vulnerabilities to relevant government authorities, law
      enforcement, and other affected organisations. This may be particularly relevant for vulnerabilities where public
      disclosure might increase the risk of harm.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0866_UK_Government2023
    name: Public Sharing of Model Vulnerability Reporting Programs
    description:
      Publicly share general lessons learned from model vulnerability reporting programs. This might include, for
      example, lessons about challenges faced and the relative efficacy of different incentive strategies. Such sharing
      could be done via a mechanism similar to the National Institute for Science and Technology’s National
      Vulnerability Database in the US.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0882_UK_Government2023
    name: Discretion around sharing Defense Tools
    description:
      Disseminate defensive tools responsibly, sometimes sharing them publicly and sometimes sharing them only with
      particular actors. In some cases, making a tool freely available (e.g. by open-sourcing it) may reduce its
      effectiveness by allowing malicious actors to study it and circumvent it.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0888_UK_Government2023
    name: Public Sharing of Societal Impact Assessments
    description:
      In the absence of sufficiently substantial downsides to sharing, frontier AI organisations are encouraged to share
      the products of this work broadly.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0890_UK_Government2023
    name: Reporting of Broad Patterns of Misuse
    description:
      Report information on broad patterns of misuse. This information can help governments, the public, and other
      frontier AI organisations to better understand risks. Reports may focus on population-level metrics related to API
      usage, such as the rate of harmful inputs filtered or the number of users banned for misuse. This information may
      benefit from being presented in a clear and understandable way and made optimally accessible.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0903_UK_Government2023
    name: Protocols for Sharing API users Information with government authorities
    description:
      Establish protocols for deciding when and how to share information about API users with relevant government
      authorities. These protocols may include covering circumstances under which information about a user is
      proactively shared with government bodies (e.g. cases where there is reason to think a user may be attempting to
      cause grave harm), and how to respond to government requests for data.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0933_UK_Government2023
    name: Disclosure of Input Data Audits with External Stakeholders
    description:
      Share information about input data audits with users and external stakeholders. Some information could be included
      in transparency reports, such as high-level information about training data (including data sources), data
      auditing procedures, and measures taken to reduce risk (see Model Reporting and Information Sharing). More
      sensitive information may be shared directly with regulators and external auditors.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A1032_Uuk2024
    name: Pre-registration of large training runs
    description:
      Registering upcoming training runs above a certain size with an appropriate state actor. Such reports could
      include descriptions of architecture, training compute, data collection and curation, training objectives and
      techniques, and planned risk management procedures.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0009_Bengio2025
    name: Incident Reporting
    description:
      "The process of systematically documenting and sharing cases in which developing or deploying AI has
      caused direct or indirect harms.


      Incident reporting is common in many domains, from human resources to cybersecurity. It has also become more
      common for AI."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0030_Casper2025
    name: Incident reporting
    description: Frontier developers can be required to document and report on substantial incidents in a timely manner.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0083_Eisenberg2025
    name: Establish a general purpose incident response mechanism
    description:
      Establish processes to enable incident monitoring and reporting. This includes defining ”serious incidents” or set
      a threshold for formal reporting based on regulatory requirements to third-parties, regulators, and impacted
      individuals.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0085_Future_of_Life_Institute2024
    name: AI incident reporting
    description:
      Does your organization report AI incidents, adverse events, and near-misses related to frontier AI models to the
      appropriate government?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0106_Future_of_Life_Institute2024
    name: Cyber Threat Intelligence Sharing
    description:
      Does your organization share cyber threat intelligence information with the appropriate government(s) and other
      leading AI firms?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0151_Future_of_Life_Institute2024
    name: Security breach disclosure
    description:
      Does your organization disclose security breaches to the appropriate government(s)? Does this policy include
      reporting of near-misses?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0152_Future_of_Life_Institute2024
    name: Security breach disclosure
    description:
      Does your organization disclose security breaches to the appropriate government(s)? Does this policy include
      reporting of near-misses?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0184_Schuett2023
    name: Industry sharing of security information
    description: AGI labs should share threat intelligence and information about security incidents with each other.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0205_Schuett2023
    name: Report safety incidents
    description:
      AGI labs should report accidents and near misses to appropriate state actors and other AGI labs (e.g. via an AI
      incident database).
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0263_EU_AI_Office2025
    name: Serious Incident Reporting
    description:
      Signatories commit to setting up processes for keeping track of, documenting, and reporting to the AI Office and
      national competent authorities without undue delay relevant information about serious incidents throughout the
      entire model lifecycle and possible corrective measures to address them.
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0408_NIST2024
    name: Incident Communication Framework
    description:
      Establish organizational roles, policies, and procedures for communicating GAI incidents and performance to AI
      Actors and downstream stakeholders (including those potentially impacted), via community or official resources
      (e.g., AI incident database, AVID, CVE, NVD, or OECD AI incident monitor).
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0425_NIST2024
    name: Feedback Resource Allocation
    description: Allocate time and resources for outreach, feedback, and recourse processes in GAI system development.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0438_NIST2024
    name: Third-Party Incident Documentation
    description: Document incidents involving third-party GAI data and systems, including open-source data and open-source software
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0703_Barrett2024
    name: Report & Respond to Incidents
    description: "Incidents and errors

      are communicated

      to relevant AI actors,

      including affected

      communities. Processes

      for tracking, responding

      to, and recovering

      from incidents and

      errors are followed and

      documented."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0761_NIST2024
    name: Confabulation; Information Integrity
    description:
      "Establish and maintain policies and procedures to record and track GAI system

      reported errors, near-misses, and negative impacts."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0762_NIST2024
    name: Information Security; Data Privacy
    description:
      "Report GAI incidents in compliance with legal and regulatory requirements (e.g.,

      HIPAA breach reporting, e.g., OCR (2023) or NHTSA (2022) autonomous vehicle

      crash reporting requirements."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0808_UK_Government2023
    name: Reporting Security Details to Government Authorities
    description:
      Report any details of security or safety incidents or near-misses to relevant government authorities. This
      includes any compromise to the security of the organisation or its systems, or any incident where an AI system –
      deployed or not – causes substantial harm or is close to doing so. This will enable government authorities to
      build a clear picture of when safety and security incidents occur and make it easier to anticipate and mitigate
      future risks. Incident reports could include a description of the incident, the location, start and end date,
      details of any parties affected and harms occurred, any specific models involved, any relevant parties responsible
      for managing and responding to the incident, as well as ways in which the incident could have been avoided. It is
      important that incidents indicative of more severe risks are reported as soon as possible after they occur.
      High-level details of safety and security incidents - with sensitive information removed - could also be made
      public, such as have been shared in the AI incident database.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0838_UK_Government2023
    name: Open Lines of Communication for Product Security Feedback
    description:
      Maintain open lines of communication for feedback regarding product security, both internally and externally to
      your organisation, including mechanisms for security researchers to report vulnerabilities and receive legal safe
      harbour for doing so, and for escalating issues to the wider community. Helping to share knowledge and threat
      information will strengthen the overall community’s ability to respond to AI security threats.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0854_UK_Government2023
    name: Jailbreaking Method Vulnerability Reports
    description:
      "This process could have as wide a scope as is necessary and ensure that frontier AI organisations have the
      ability to respond appropriately to reports of vulnerabilities. The process could accept reports on any class of
      model vulnerabilities and methods for exploiting them, including: Reports for inducing models to bypass moderation
      features, which the frontier AI organisation has attempted to prevent through the use of filters or fine-tuning"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0855_UK_Government2023
    name: Prompt Injection Vulnerability Reports
    description:
      This process could have as wide a scope as is necessary and ensure that frontier AI organisations have the ability
      to respond appropriately to reports of vulnerabilities. The process could accept reports on any class of model
      vulnerabilities and methods for exploiting them, including:Reports used by malicious actors to induce models to
      exhibit behaviours they want by presenting models with prompts that contain instructions to perform these
      behaviours
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0856_UK_Government2023
    name: Privacy Attacks Vulnerability Reports
    description:
      "This process could have as wide a scope as is necessary and ensure that frontier AI organisations have the
      ability to respond appropriately to reports of vulnerabilities. The process could accept reports on any class of
      model vulnerabilities and methods for exploiting them, including: methods for extracting information that should
      be private from models (e.g. sensitive information from training data or users’ private conversations with models)"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0857_UK_Government2023
    name: Vulnerability Reports for Unaddressed Misuse Opportunities
    description:
      "This process could have as wide a scope as is necessary and ensure that frontier AI organisations have the
      ability to respond appropriately to reports of vulnerabilities. The process could accept reports on any class of
      model vulnerabilities and methods for exploiting them, including: methods for using the capabilities of models to
      cause harm, which have not already been addressed"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0858_UK_Government2023
    name: Vulnerability Reports for Poisoning Attacks
    description:
      "This process could have as wide a scope as is necessary and ensure that frontier AI organisations have the
      ability to respond appropriately to reports of vulnerabilities. The process could accept reports on any class of
      model vulnerabilities and methods for exploiting them, including: Reports for when an adversary has manipulated
      training data in order to degrade model performance"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0859_UK_Government2023
    name: Vulnerability Reports for Bias and Discrimination
    description:
      This process could have as wide a scope as is necessary and ensure that frontier AI organisations have the ability
      to respond appropriately to reports of vulnerabilities. The process could accept reports on any class of model
      vulnerabilities and methods for exploiting them, including:Reports for when a model is exhibiting behaviours that
      reveal specific biases or discrimination regarding known protected characteristics
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0860_UK_Government2023
    name: Vulnerability Reports for Performance Issues
    description:
      "This process could have as wide a scope as is necessary and ensure that frontier AI organisations have the
      ability to respond appropriately to reports of vulnerabilities. The process could accept reports on any class of
      model vulnerabilities and methods for exploiting them, including: when a model performs inadequately for a
      situation it is being deployed in e.g. a healthcare chatbot AI that provides incorrect information and causes harm
      to patients"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0861_UK_Government2023
    name: Vulnerability Reports for Controllability Issues (i.e., "Misalignment")
    description:
      "This process could have as wide a scope as is necessary and ensure that frontier AI organisations have the
      ability to respond appropriately to reports of vulnerabilities. The process could accept reports on any class of
      model vulnerabilities and methods for exploiting them, including: when models apply their capabilities in ways
      that substantially diverge from what users intend or desire"
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0862_UK_Government2023
    name: Model Vulnerability Reports
    description:
      "This process could have as wide a scope as is necessary and ensure that frontier AI organisations have the
      ability to respond appropriately to reports of vulnerabilities. The process could accept reports on any class of
      model vulnerabilities and methods for exploiting them, including: Establish clear, user-friendly, and publicly
      described processes for receiving model vulnerability reports drawing on established software vulnerability
      reporting processes. These processes can be built into – or take inspiration from – processes that organisations
      have built to receive reports of traditional software vulnerabilities. It is crucial that these policies are made
      publicly accessible and function effectively."
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0982_Gipiskis2024
    name: Encourage reporting of critical vulnerabilities to the upstream provider or other relevant stakeholders
    description:
      Downstream AI system deployers can report critical vulnerabilities or incidents to the upstream model provider and
      other relevant regulators. This can con- tribute to safe use, and allow other downstream deployers to be informed
      about any potential problems.
    hasDocumentation:
