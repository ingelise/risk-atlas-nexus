  - id: A0340_Campos2025
    name: External Disclosure
    description:
      The first type of communication is external disclosure of the risks faced by the organization… this should be
      broadened to include risks to society from the company’s products.
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0636_Barrett2024
    name: Transparent RM Policies
    description: "The risk management

      process and its

      outcomes are

      established through

      transparent policies,

      procedures, and other

      controls based on

      organizational risk

      priorities."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0785_UK_Government2023
    name: Verification Mechanisms
    description:
      Include verification mechanisms, such that external actors can have increased confidence that responsible
      capability scaling policies are executed as intended.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0807_UK_Government2023
    name: Disclosure of Information about Internal Governance Processes
    description:
      Share information about how internal governance processes are set up with relevant government authorities. This
      will ensure that risks are appropriately identified, communicated and mitigated, and allow government and other
      external actors to identify gaps that might lead to risks being overlooked. This information could be updated
      regularly (e.g. every 12 months). This information could also be made public, provided sensitive details are
      removed.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0972_Gipiskis2024
    name: Release strategy disagreement between developers
    description:
      Developers of restricted-access models with similar capabilities may disagree about the strategy or precautions to
      take for model release, especially in the case of competitive pressure or minimal safety regulation oversight. In
      such a case, if only a single developer releases an equally capable model unrestricted, malicious actors can use
      it instead of restricted-access alternatives [88].
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1039_Uuk2024
    name: Sharing safety cases
    description: Disclosing to a regulator how high-stakes decisions regarding model development and deployment are made.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A1041_Uuk2024
    name: Transparent governance structures
    description: Disclosing to a regulator how high-stakes decisions regarding model development and deployment are made.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0074_Eisenberg2025
    name: Establish third-party assessment and management framework
    description:
      Establish comprehensive procedures for documenting, assessing, and managing upstream providers and dependencies in
      the AI system value chain, including transparency requirements, compliance verification, dependency tracking, and
      contingency planning.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0116_Future_of_Life_Institute2024
    name: Government access to AI systems
    description:
      Is the firm proactively granting government officials free access to its most capable systems so the government
      can better understand what the technology is capable of?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0135_Future_of_Life_Institute2024
    name: Post-deployment external researcher access
    description:
      Any programs that support good faith safety research by external stakeholders. We report available funding, depth
      of model access, model versions, technical infrastructure, and any technical or legal safe harbors designed to
      mitigate barriers to safety research imposed by usage policy enforcement, interaction-logging, and stringent terms
      of service.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0154_Future_of_Life_Institute2024
    name: Support for Independent AI Safety Research
    description:
      Does your organization support trusted independent AI safety researchers by allowing them to use your firm’s most
      capable systems free of charge or at a strongly discounted rate and not disabling their accounts if they trigger
      safety-monitoring systems? Please roughly indicate the current number of such collaborations with independent
      safety researchers your organization supports.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0156_Future_of_Life_Institute2024
    name: Third-party Dangerous Capabilities Assessment
    description:
      Has your organization collaborated with independent third-party organizations to assess your most capable AI model
      for dangerous capabilities as part of your pre-deployment risk assessment? If so, please provide the names of the
      organizations you worked with. Please also comment on the depth of model access provided to these organizations
      (e.g., access to fine-tuning or access to model without safety filters).
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0206_Schuett2023
    name: Researcher model access
    description: AGI labs should give independent researchers API access to deployed models.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0218_Schuett2023
    name: Inter-lab scrutinies
    description: AGI labs should allow researchers from other labs to scrutinize powerful models before deployment.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0285_Campos2025
    name: Independent Third-Party Evaluations
    description:
      Independent third parties should vet evaluation protocols. These third parties should also be granted permission
      and resources to independently perform their evaluations, verifying the accuracy of the results.
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0797_UK_Government2023
    name: Appropriate Safeguards Against External Evaluations
    description:
      Ensure that there are appropriate safeguards against external evaluations leading to unintended widespread
      distribution of models. Allowing external evaluators to download models onto their own hardware increases the
      chance of the models being stolen or leaked. Therefore, unless adequate security against widespread model
      distribution can be assured, external evaluators could only be allowed to access models through interfaces that
      prevent exfiltration (such as current API access methods). It may be appropriate to limit evaluators’ access to
      information that could indirectly facilitate widespread model distribution in other ways, such as requiring
      in-depth KYC checks or watermarking copies of the model.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0799_UK_Government2023
    name: Fine-tuning by External Evaluators
    description:
      Give external evaluators the ability to securely “fine-tune” the AI systems being tested. Evaluators cannot fully
      assess risks associated with widespread model distribution if they cannot fine-tune the model. This may involve
      providing external evaluators with access to capable infrastructure to enable fine-tuning.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0800_UK_Government2023
    name: External Evaluation of Model without Safety Regulations
    description:
      Give external evaluators access to versions of the model that lack safety mitigations. Where possible, sharing
      these versions of a model gives evaluators insight into the risks that might be created if users find ways to
      circumvent safeguards (i.e. “jailbreak” the model). If the model is open-sourced, leaked, or stolen, users may
      also simply be able to remove or bypass the safety mitigations.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0801_UK_Government2023
    name: External Evaluation of Model Families
    description:
      Give external evaluators access to model families and internal metrics. Frontier AI organisations often develop
      “model families” where multiple models differ along only one or two dimensions – such as parameters, data, or
      training compute. Evaluating such a model family would enable scaling analysis to better forecast future
      performance, capabilities and risks.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0802_UK_Government2023
    name: External Evaluation of Deployed System Components
    description:
      Give external evaluators the ability to study all of the components of deployed systems, where possible. Deployed
      AI systems typically combine a core model with smaller models and other software components, including moderation
      filters, user interfaces to incentivise particular user behaviour, and plug-ins for extension capabilities like
      web browsing or code execution. For example, a red team cannot find all the flaws in the defences of a system if
      they aren’t able to test all of its different components. It is important to consider the need to balance external
      evaluators’ ability to access all components of the system against the need to protect information that would
      allow bypassing model defences.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0816_UK_Government2023
    name: Sharing with Independent Third-Parties
    description:
      Share specific information with independent third-parties where this aids evaluation and technical audit (see
      Model Evaluations and Red Teaming). This may require sharing much of the same information that is shared with
      governments in full but may be shared on a case-by- case basis.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0887_UK_Government2023
    name: Equitable Access to Frontier AI Systems
    description:
      Transparent and fair processes for researchers to get restricted access to AI systems are important. To ensure
      systems are appropriately understood, particular attention could be paid to promote academic freedom and diversity
      of thought, for example, not withholding access based on previous or expected criticism and encouraging different
      types of academics, civil society groups and independent researchers to study AI systems.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0932_UK_Government2023
    name: Independent Data Input Audits
    description:
      Facilitate independent data input audits from external parties. Since training data constitutes sensitive
      intellectual property, it is important to implement appropriate technical and organisational safeguards to ensure
      privacy and security when sharing the training data. In order to protect sensitive information, frontier AI
      organisations could explore the possibility of providing synthetic datasets to auditors with sensitive information
      removed, or providing auditors with privacy-preserving access to the training data.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0944_Gipiskis2024
    name: Pre-deployment access by third-party auditors
    description:
      Prior to full deployment of general-purpose AI models, a group of third-party auditors who are not selected by the
      GPAI model provider could get early access to AI models in order to evaluate them from a variety of different
      perspectives and with diverse interests [30, 157]. This prevents cases where the developers of AI models select
      auditors that are especially favorable to the developers, which could result in biased or incomplete evaluations,
      or contribute to an unjustified public perception of the capabilities and risks of the model.
    hasDocumentation:
      - doc-Gipiskis2024
    type: Action
  - id: A1018_Uuk2024
    name: Advanced model access for vetted external researchers
    description:
      "Examples of advanced access rights could include any of the following: increased control over sampling, access to
      fine-tuning functionality, the ability to inspect and modify model internals, access to training data, or
      additional features like stable model versions."
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A1043_Uuk2024
    name: Vetted researcher access
    description:
      Giving good faith, public interest evaluation researchers access to black-box research APIs that provide technical
      and legal safe harbours to limit barriers imposed by usage policy enforcement, logging, and stringent terms of
      service.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0029_Casper2025
    name: Documentation comparison in court
    description:
      To incentivize a race to the top where frontier developers pursue established best safety practices, courts can be
      given the power to compare documentation for defendants with that of peer developers.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0052_Eisenberg2025
    name: Establish AI decision explanation framework
    description:
      Implement mechanisms and tools for generating human-understandable explanations of AI system decisions, including
      feature importance, decision paths, confidence levels, and clear attribution of data sources and their
      characteristics used during inference.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0057_Eisenberg2025
    name: Establish universal access and performance design framework
    description:
      Establish and follow a structured framework ensuring the AI system is designed and developed to deliver
      consistent, high-quality performance and accessibility for all intended user groups, regardless of their
      characteristics or circumstances.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0066_Eisenberg2025
    name: Implement AI System Disclosure Requirements
    description:
      Deploy mechanisms to ensure clear, timely disclosure of AI system use to end users, including automated
      notifications of AI involvement in interactions, explicit identification of AI-generated content, and clear
      communication of when users are interacting with AI systems.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0069_Eisenberg2025
    name: Establish user rights and recourse framework
    description:
      Implement comprehensive mechanisms for user reporting, feedback collection, incident investigation, and recourse
      provision, including clear procedures for users to report issues, request explanations or corrections, appeal
      decisions, and receive appropriate remediation. The system should handle various types of user concerns including
      system errors, unfair treatment, privacy violations, and safety issues.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0416_NIST2024
    name: User Feedback Mechanism
    description:
      Establish policies for user feedback mechanisms for GAI systems which include thorough instructions and any
      mechanisms for recourse.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0426_NIST2024
    name: User Interaction Documentation
    description:
      Document interactions with GAI systems to users prior to interactive activities, particularly in contexts
      involving more significant risks.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0477_NIST2024
    name: Use Disclosure Consideration
    description:
      Consider disclosing use of GAI to end users in relevant contexts, while considering the objective of disclosure,
      the context of use, the likelihood and magnitude of the risk posed, the audience of the disclosure, as well as the
      frequency of the disclosures.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0497_NIST2024
    name: Participation Withdrawal Options
    description:
      Provide human subjects with options to withdraw participation or revoke their consent for present or future use of
      their data in GAI applications.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0687_Barrett2024
    name: Enable User Feedback & Appeals
    description: "Feedback processes for

      end users and impacted

      communities to report

      problems and appeal

      system outcomes are

      established and inte-

      grated into AI system

      evaluation metrics."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0720_NIST2024
    name: Human-AI Configuration; Information Integrity; Harmful Bias and Homogenization
    description: "Record and integrate structured feedback about content provenance from

      operators, users, and potentially impacted communities through the use of

      methods such as user research studies, focus groups, or community forums.

      Actively seek feedback on generated content quality and potential biases.

      Assess the general awareness among end users and impacted communities

      about the availability of these feedback channels."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0725_NIST2024
    name: Human-AI Configuration; Information Security
    description:
      "Verify and document the incorporation of results of structured public feedback

      exercises into design, implementation, deployment approval (“go”/“no-go”

      decisions), monitoring, and decommission decisions. (AI Deployment, Domain Experts, End-Users, Operation and
      Monitoring, TEVV)"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0735_NIST2024
    name: Human-AI Configuration; Harmful Bias and Homogenization
    description:
      "Use structured feedback mechanisms to solicit and capture user input about AI generated content to
      detect subtle shifts in quality or alignment with

      community and societal values. (AI Deployment, AI Impact Assessment, Governance and Oversight, Operation and
      Monitoring)."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0738_NIST2024
    name: Human-AI Configuration
    description:
      "Establish and maintain communication plans to inform AI stakeholders as part of

      the deactivation or disengagement process of a specific GAI system (including for

      open-source models) or context of use, including reasons, workarounds, user

      access removal, alternative processes, contact information, etc."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0834_UK_Government2023
    name: Security Responsible User Communication
    description:
      Communicate clearly to users which elements of security they are responsible for and where and how their data may
      be used or accessed.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0900_UK_Government2023
    name: Communication of and Appeal for API access Reduction Policies
    description:
      Communicate API access reduction policies – and allow users to appeal access reductions. Users should be able to
      understand the reasons why their access may be reduced and be able to appeal access reductions if they believe
      policies have not been applied correctly. Alternatively, users may be able to perform actions to mitigate misuse
      risks, such as providing evidence to justify behaviour.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0905_UK_Government2023
    name: User Informed Rapid Rollback of models
    description:
      Inform end users that rapid rollback or withdrawal of models may be necessary, and that the disruption to its end
      users will be minimised as far as safely possible. This is especially important where models are deployed in
      safety critical domains.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0041_Casper2025
    name: AI governance institutes
    description:
      National governments (or international coalitions) can create AI governance institutes to research risks, evaluate
      systems, and curate best risk management practices that developers are encouraged to adhere to.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0047_Eisenberg2025
    name: Establish AI system integration framework
    description:
      Define and implement a comprehensive framework for AI system integration including architecture review,
      compatibility testing, and integration validation processes.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0048_Eisenberg2025
    name: Implement AI system lifecycle management
    description:
      Deploy systematic processes for AI system maintenance, updates, and retraining, including version control,
      deployment pipelines, and performance monitoring to ensure consistent system reliability and performance.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0049_Eisenberg2025
    name: Implement scalable AI infrastructure
    description:
      Apply architecture and infrastructure practices to ensure AI systems can scale effectively, including load
      testing, resource monitoring, and capacity planning to maintain performance under increased demand.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0070_Eisenberg2025
    name: Implement AI literacy and competency program
    description:
      Implement comprehensive training and education programs to ensure personnel develop and maintain appropriate
      levels of AI literacy, risk awareness, and operational competency. This includes role-based training on AI
      capabilities, limitations, safety protocols, ethical considerations, and proper system usage.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0155_Future_of_Life_Institute2024
    name: Supporting external safety research
    description: We note actions by which the firm supports external existentialsafety-relevant researchers.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0170_Future_of_Life_Institute2024
    name: Testimonies to policymakers
    description:
      Public information related to direct communication with policymakers. We note whether company leadership used the
      opportunity to inform policymakers about the potential for catastrophic risks from advanced AI. Note that we have
      selected the most explicit risk-related statements. These do reflect overall communication strategies.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0174_Schuett2023
    name: Avoiding Hype
    description:
      AGI labs should avoid releasing powerful models in a way that is likely to create hype around AGI (e.g. by
      overstating results or announcing them in attention-grabbing ways).
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0337_Campos2025
    name: Company Risk Culture
    description:
      All aspects of culture are ultimately driven by the ‘tone at the top’. This can be defined as ‘top management’s
      way to express [...] values pursued in the organization and provide guidance to employees’…
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0653_Barrett2024
    name: Prioritize Interdisciplinary Collaboration
    description: "Interdisciplinary AI actors,

      competencies, skills, and

      capacities for establish-

      ing context reflect de-

      mographic diversity and

      broad domain and user

      experience expertise,

      and their participation

      is documented. Oppor-

      tunities for interdisci-

      plinary collaboration are

      prioritized."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0880_UK_Government2023
    name: External Input into Tool Development
    description:
      Work closely with external actors who will need to deploy the tools to ensure that they are usable and suit their
      needs. For instance collaborating closely with social media organisations to help them produce more capable tools
      for identifying AI-generated content.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
