controls:
  - id: A0086_Future_of_Life_Institute2024
    name: AI Safety Team
    description:
      Does your organization have a safety team? If yes, please provide the team name, a URL to the team’s website (if
      applicable), the team size (defined as FTE technical staff), and briefly describe its mission.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0089_Future_of_Life_Institute2024
    name: Board of directors
    description:
      Information about board independence; any non-standard safety-related powers; whether it has a mandate to
      prioritize safety over profits.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0091_Future_of_Life_Institute2024
    name: BOD formal risk committee
    description:
      Does the board of directors feature a formal risk committee that is tasked with overseeing the firm’s risk
      management practices? If yes, please name the members of this committee.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0092_Future_of_Life_Institute2024
    name: BOD regular crisis training
    description: Does the BOD engage in regular crisis response training?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0096_Future_of_Life_Institute2024
    name: Chief Information Security Officer (CISO)
    description: Does your firm's leadership team feature a chief information security officer (CISO)?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0099_Future_of_Life_Institute2024
    name: Company structure
    description:
      Information that indicates whether the structure of the firm would allow it to prioritize safety in critical
      situations or whether shareholder pressure could drive it to deploy capable but dangerous systems.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0123_Future_of_Life_Institute2024
    name: Internal review of high-stakes deployment decisions
    description:
      Does your company have one or more internal bodies that review deployment decisions related to highly capable AI
      models? This might be an ethics board or other body with a responsibility/safety related mandate.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0129_Future_of_Life_Institute2024
    name: Multi-party authorisation for LLM deployment system changes
    description:
      Does your organization require multi-party authorization for all changes to systems directly involved in the
      deployment of large models?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0133_Future_of_Life_Institute2024
    name: Partnerships
    description: Any partnerships that can significantly shape company strategy.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0136_Future_of_Life_Institute2024
    name: Powers of the BOD
    description: Does the board have powers beyond appointing a new CEO (e.g., is it able to veto large deployment decisions?)
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0164_Future_of_Life_Institute2024
    name: Chief Risk Officer (CRO)
    description: ""
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0176_Schuett2023
    name: Board risk committee
    description:
      AGI labs should have a board risk committee, i.e. a permanent committee within the board of directors which
      oversees the lab’s risk management practices.*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0179_Schuett2023
    name: Dual control
    description:
      Critical decisions in model development and deployment should be made by at least two people (e.g. promotion to
      production, changes to training datasets, or modifications to production).*
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0217_Schuett2023
    name: Chief risk officer
    description: AGI labs should have a chief risk officer (CRO), i.e. a senior executive who is responsible for risk management.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0275_EU_AI_Office2025
    name: Systemic Risk Responsibility Allocation
    description:
      Signatories commit to (1) clearly defining and allocating responsibilities for managing systemic risk from their
      GPAISRs across all levels of the organisation; (2) allocating appropriate resources to actors who have been
      assigned responsibilities for managing systemic risk; and (3) promoting a healthy risk culture.
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0286_Campos2025
    name: Decision-Making Executives
    description:
      Best practices from other industries include the establishment of clear risk ownership, with designated senior
      managers responsible for specific risks…
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0334_Campos2025
    name: Appoint Chief Risk Officer
    description:
      There should be a senior executive responsible for risk management processes (often called a Chief Risk Officer)
      who is accountable for the risk management processes, but is importantly not a risk owner making risk decisions
      themselves.
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0338_Campos2025
    name: Board Level Oversight
    description: Board-level oversight is necessary to provide checks and balances to senior management.
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0414_NIST2024
    name: Organizational Role Adjustment
    description:
      "Consider adjustment of organizational roles and components across lifecycle stages of large or complex GAI
      systems, including: Test and evaluation, validation, and red-teaming of GAI systems; GAI content moderation; GAI
      system development and engineering; Increased accessibility of GAI tools, interfaces, and systems, Incident
      response and containment."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0420_NIST2024
    name: Lifecycle Oversight Functions
    description:
      Establish policies, procedures, and processes for oversight functions (e.g., senior leadership, legal, compliance,
      including internal evaluation) across the GAI lifecycle, from problem formulation and supply chains to system
      decommission.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0448_NIST2024
    name: Interdisciplinary Team Formation
    description:
      Establish and empower interdisciplinary teams that reflect a wide range of capabilities, competencies, demographic
      groups, domain expertise, educational backgrounds, lived experiences, professions, and skills across the
      enterprise to inform and conduct risk measurement and management functions.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0460_NIST2024
    name: Transparency Training Adaptation
    description: Adapt existing training programs to include modules on digital content transparency
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0461_NIST2024
    name: Risk Management Certification
    description:
      Develop certification programs that test proficiency in managing GAI risks and interpreting content provenance,
      relevant to specific industry and context.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0642_Barrett2024
    name: Executive Risk Accountability
    description: "Executive leadership

      of the organization

      takes responsibility for

      decisions about risks

      associated with AI sys-

      tem development and

      deployment."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0644_Barrett2024
    name: Human-AI Oversight Roles
    description: "Policies and procedures

      are in place to define

      and differentiate roles

      and responsibilities for

      human-AI configurations

      and oversight of AI

      systems."
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0665_Barrett2024
    name: Define Human Oversight Protocols
    description: "Processes for

      human oversight are

      defined, assessed,

      and documented

      in accordance with

      organizational policies

      from the Govern

      function"
    hasDocumentation:
      - doc-Barrett2024
    type: Action
  - id: A0748_NIST2024
    name: Information Integrity; Value Chain and Component Integration
    description: "Leverage feedback and recommendations from organizational boards or

      committees related to the deployment of GAI applications and content

      provenance when using third-party pre-trained models."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0783_UK_Government2023
    name: Robust and Meaningful Accountability Mechanisms
    description:
      Introduce robust and meaningful accountability mechanisms, especially in evaluating capabilities thresholds, with
      clear processes that ensure the correct mitigations or courses of action are followed if the thresholds are met.
      This may include board sign-off for the responsible capability scaling policy, and named individual accountability
      for key decisions.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0827_UK_Government2023
    name: Training Relevant Actors in AI Security
    description:
      Train developers, system owners and senior leaders in secure AI practices. It is crucial to establish a positive
      security culture where leaders demonstrate good security practice and staff from across a project understand
      enough about AI security to understand the potential consequences of decisions they take.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0847_UK_Government2023
    name: Board-level Responsibility for Protective Security
    description:
      Ensure board-level responsibility for protective security with regular engagement with key stakeholders from
      across the business and a firm understanding of the risks the organisation faces. Ensure stakeholder engagement
      throughout the business for specialist insight and development and implementation of an insider risk mitigation
      programme.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0850_UK_Government2023
    name: Proportionate Policies
    description:
      Put in place proportionate policies, clear reporting procedures and escalation guidelines that are accessible,
      understood and consistently enforced.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0851_UK_Government2023
    name: Appropriate Security Training
    description:
      Provide appropriate security education and training for all workers. Without effective education and training
      individuals cannot be expected to know what procedures are in place to maintain security.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0852_UK_Government2023
    name: Program of Monitoring for Security Issues
    description:
      Ensure that a programme of monitoring and review is in place to enable potential security issues, or personal
      issues that may impact on an employee's work, to be recognised and dealt with effectively throughout their career
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A0906_UK_Government2023
    name: Governance Responses to Worst-case of Misuse Scenarios
    description:
      Establish governance processes to ensure internal clarity in response to worst-case or consistent misuse
      scenarios. Such processes could draw on similar accountability and governance mechanisms used within a Responsible
      Capability Scaling policy. It may be valuable to clarify the approvals needed to roll back a model to a previous
      version or withdraw a model, the types of misuse that would warrant such actions, and the timeframe under which
      such actions would occur.
    hasDocumentation:
      - doc-UK Government2023
    type: Action
  - id: A1034_Uuk2024
    name: Risk-focused governance structures
    description:
      Companies adopt practices typical of high-reliability organizations (HROs), including board risk committees, chief
      risk officers, multi-party authorization requirements, ethics boards for reviewing development and deployment
      decisions, and internal audit teams that report directly to the board, tasked with auditing risk management
      practices.
    hasDocumentation:
      - doc-Uuk2024
    type: Action
  - id: A0003_Bengio2025
    name: Bowtie Method
    description:
      "A technique for visualising risk quantitatively and qualitatively, providing clear differentiation
      between proactive and reactive risk management, intended to help prevent and mitigate major accident hazards.


      Oil companies and national governments use the bowtie method."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0004_Bengio2025
    name: Defence in Depth
    description:
      "The idea that multiple independent and overlapping layers of defence can be implemented such that if
      one fails, others will still be effective.


      An example comes from the field of infectious diseases, where multiple preventative measures (e.g. vaccines,
      masks, hand washing) can layer to reduce overall risk."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0012_Bengio2025
    name: Risk management frameworks
    description:
      "Whole organisation frameworks to reduce gaps in risk coverage and ensure various risk activities (i.e.
      all of the above) are cohesively structured and aligned, risk roles and responsibilities are clearly defined, and
      checks and balances are in place to avoid silos and manage conflicts of interest.


      In other safety critical industries, the Three Lines of Defence framework – separating risk ownership, oversight
      and audit – is widely used and can be usefully applied to advanced AI companies"
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0013_Bengio2025
    name: Risk Register
    description:
      "A risk management tool that serves as a repository of all risks, their prioritisation, owners, and
      mitigation plans. They are sometimes used to fulfil regulatory compliance.


      Risk registers are a relatively standard tool used across many industries, including cybersecurity and recently
      AI."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0014_Bengio2025
    name: Risk Taxonomy
    description: "A way to categorise and organise risks across multiple dimensions.


      There are several well- known risk taxonomies for AI."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0016_Bengio2025
    name: Risk Tolerance
    description: "The level of risk an organisation is willing to take on.\n\n In AI,\
      \ risks tolerances are often left up to AI companies, but regulatory regimes can\
      \ help identify unacceptable risks that are legally prohibited"
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0020_Bengio2025
    name: Scenario Analysis
    description:
      Developing plausible future scenarios and analysing how risks materialise. Scenario analysis and planning are
      widely used across industries including for the energy sector and to address uncertainties of power systems.
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0021_Bengio2025
    name: Threat Modelling
    description:
      A process to identify threats and vulnerabilities to a system. Threat modelling is commonly used to support AI
      security throughout AI research and development
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0023_Bengio2025
    name: Delphi Method
    description:
      "A group decision-making technique that uses a series of questionnaires to gather consensus from a
      panel of experts.


      The Delphi method has been used to help identify key AI risks."
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0025_Bengio2025
    name: Risk Matrices
    description:
      "A visual tool that helps prioritise risks according to their likelihood of occurrence and potential
      impact.


      Risk matrices are used in many industries and for many purposes, such as by financial institutions for evaluating
      credit risk, or by companies to assess possible disruptions to their supply chains"
    hasDocumentation:
      - doc-Bengio2025
    type: Action
  - id: A0031_Casper2025
    name: Independent third-party risk assessments
    description:
      Developers can be required to have an independent third-party conduct and produce a report (including access,
      methods, and findings) on risk assessments of frontier systems (Raji et al., 2022; Anderljung et al., 2023; Casper
      et al., 2024). They can also be required to document if and what “safe harbor” policies they have to facilitate
      independent evaluation and red-teaming (Longpre et al., 2024).
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0032_Casper2025
    name: Internal risk assessments
    description: Developers can be required to conduct and report on internal risk assessments of frontier systems.
    hasDocumentation:
      - doc-Casper2025
    type: Action
  - id: A0075_Eisenberg2025
    name: Establish AI legal compliance process
    description:
      Evaluate and document how the AI system complies with relevant regulations and standards, identifying use
      case-specific legal risks and required controls. Apply the organization’s legal compliance framework to ensure
      appropriate safeguards are in place, with clear documentation of compliance assessments and risk mitigations.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0079_Eisenberg2025
    name: Establish AI Risk Management System
    description:
      Implement a comprehensive AI risk management system including risk assessment processes, monitoring frameworks,
      governance structures, and response procedures.
    hasDocumentation:
      - doc-Eisenberg2025
    type: Action
  - id: A0084_Future_of_Life_Institute2024
    name: Adopted Risk Management Frameworks
    description:
      "Does your firm implement any of the following risk management approaches?


      ISO 31000

      NIST AI Risk Management Framework

      The 3 Lines of Defense Model (3LOD)"
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0103_Future_of_Life_Institute2024
    name: Comprehensive pre-training risk assessments
    description:
      Does your firm conduct comprehensive pre-training risk assessments? Such assessments should include forecasting
      (dangerous) capabilities and developing a model-specific risk taxonomy that includes reasonably foreseeable
      impacts on individuals, groups, organizations, and society. The taxonomy should include misuse cases and scenarios
      where malicious actors steal the model.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0119_Future_of_Life_Institute2024
    name: Implementation of cybersecurity frameworks
    description:
      AGI labs should comply with information security standards (e.g. ISO/IEC 27001 or NIST Cybersecurity Framework).
      These standards need to be tailored to an AGI context.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0120_Future_of_Life_Institute2024
    name: Independent Delphi Risk Assessments
    description:
      Is your organization collaborating with independent experts to conduct full Delphi processes to more accurately
      assess the risks associated with large development or deployment decisions?
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0132_Future_of_Life_Institute2024
    name: Ongoing model risk assessments
    description:
      Is your organization committed to regularly repeating risk assessments for its most capable models to account for
      progress in post-deployment model enhancements (e.g., scaffolding programs, tool use, prompt engineering)? If yes,
      please comment on the frequency and scope of these repeated model-specific risk assessments.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0139_Future_of_Life_Institute2024
    name: Pre-development risk assessments
    description:
      Any information related to risk assessments and forecasts of dangerous capabilities conducted before large models
      are trained.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0140_Future_of_Life_Institute2024
    name: Pre-specified risk tolerance
    description:
      Does the firm pre-specify its risk tolerance as part of its risk management approach to prevent unacceptable
      risks? If your firm sets any quantitative risk thresholds, please describe them here.
    hasDocumentation:
      - doc-FLI2024
    type: Action
  - id: A0181_Schuett2023
    name: Enterprise risk management
    description:
      AGI labs should implement an enterprise risk management (ERM) framework (e.g. the NIST AI Risk Management
      Framework or ISO 31000). This framework should be tailored to an AGI context and primarily focus on the lab’s
      impact on society.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0186_Schuett2023
    name: Internal review before publications
    description: Before publishing research, AGI labs should conduct an internal review to assess potential harms.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0197_Schuett2023
    name: Pre-deployment risk assessment
    description:
      AGI labs should take extensive measures to identify, analyze, and evaluate risks from powerful models before
      deploying them.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0198_Schuett2023
    name: Pre-training risk assessment
    description: AGI labs should conduct a risk assessment before training powerful models.
    hasDocumentation:
      - doc-Schuett2023
    type: Action
  - id: A0253_Wiener2024
    name: Developers “shall consider” guidance from US AISI and NIST and other reputable standard-setting organizations
    description: ""
    hasDocumentation:
      - doc-Wiener2024
    type: Action
  - id: A0258_Wiener2024
    name: Yearly re-evaluation of safety procedures
    description: ""
    hasDocumentation:
      - doc-Wiener2024
    type: Action
  - id: A0265_EU_AI_Office2025
    name: Systemic Risk Analysis
    description:
      Signatories commit to carrying out a rigorous analysis of the systemic risks identified in order to understand the
      severity and probability of the systemic risks. Signatories commit to making use of a range of information and
      methods in their systemic risk analysis including model-independent information and state-of-the-art model
      evaluations, taking into account model affordances, safe originator models, and the context in which the model may
      be made available on the market and/or used and its effects
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0266_EU_AI_Office2025
    name: Systemic risk assessment and mitigations
    description:
      Signatories commit to conducting systemic risk assessment at appropriate points along the entire model lifecycle,
      in particular before making the model available on the market. Specifically, signatories commit to starting to
      assess and mitigate systemic risks during the development of a GPAISR.
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0272_EU_AI_Office2025
    name: Systemic Risk Acceptance Documentation
    description:
      Signatories commit to determining the acceptability of the systemic risks stemming from their GPAISRs by comparing
      the results of their systemic risk analysis to their pre-defined systemic risk acceptance criteria, in order to
      ensure proportionality between the systemic risks of the GPAISR and their mitigations.
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0274_EU_AI_Office2025
    name: Adequacy Assessments
    description:
      Signatories commit to assessing the adequacy of their safety and security framework and to updating it based on
      new findings
    hasDocumentation:
      - doc-EU AI Office2025
    type: Action
  - id: A0276_Campos2025
    name: Classification of applicable known risks
    description:
      Developers should address known risks in the literature using resources such as (Weidinger et al., 2022) or the AI
      Risk Repository (Slattery, et al., 2024). Developers should only exclude risks from the scope of their assessment
      in case of scientific agreement that the specific risk is negligible or unlikely to apply to the AI model under
      consideration. This decision should be clearly justified and documented.
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0283_Campos2025
    name: Risk Register
    description:
      Throughout the risk management process, developers should maintain a continuously up-to-date risk register, which
      serves as the central repository for documenting and tracking all identified risks and their associated mitigation
      measures. This repository should include information like ownership, risk levels, indicators, mitigation status,
      and actionable response plans.
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0335_Campos2025
    name: Enterprise Risk Management Function
    description:
      To provide support to the Chief Risk Officer, it is common in many industries to have a central risk function...
      In most industries, this function is known as Enterprise Risk Management (ERM).
    hasDocumentation:
      - doc-Campos2025
    type: Action
  - id: A0391_NIST2024
    name: Risk Tier Definition
    description:
      "Consider the following factors when updating or defining risk tiers for GAI: Abuses and impacts to information
      integrity; Dependencies between GAI and other IT or data systems; Harm to fundamental rights or public safety;
      Presentation of obscene, objectionable, offensive, discriminatory, invalid or untruthful output; Psychological
      impacts to humans (e.g., anthropomorphization, algorithmic aversion, emotional entanglement); Possibility for
      malicious use; Whether the system introduces significant new security vulnerabilities; Anticipated system impact
      on some groups compared to others; Unreliable decision making capabilities, validity, adaptability, and
      variability of GAI system performance over time."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0395_NIST2024
    name: Risk Hierarchy Maintenance
    description:
      Maintain an updated hierarchy of identified and expected GAI risks connected to contexts of GAI model advancement
      and use, potentially including specialized risk levels for GAI systems that address issues such as model collapse
      and algorithmic monoculture.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0396_NIST2024
    name: Risk Tolerance Reassessment
    description:
      "Reevaluate organizational risk tolerances to account for unacceptable negative risk (such as where significant
      negative impacts are imminent, severe harms are actually occurring, or large-scale risks could occur); and broad
      GAI negative risks, including: Immature safety or risk cultures related to AI and GAI design, development and
      deployment, public information integrity risks, including impacts on democratic processes, unknown long-term
      performance characteristics of GAI."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0403_NIST2024
    name: System Inventory Enumeration
    description:
      Enumerate organizational GAI systems for incorporation into AI system inventory and adjust AI system inventory
      requirements to account for GAI risks.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0404_NIST2024
    name: Inventory Exemption Definition
    description: Define any inventory exemptions in organizational policies for GAI systems embedded into application software.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0418_NIST2024
    name: Risk Measurement Improvement
    description:
      "Establish policies and procedures that address continual improvement processes for GAI risk measurement. Address
      general risks associated with a lack of explainability and transparency in GAI systems by using ample
      documentation and techniques such as: application of gradient-based attributions, occlusion/term reduction,
      counterfactual prompts and prompt engineering, and analysis of embeddings; Assess and update risk measurement
      approaches at regular cadences"
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0431_NIST2024
    name: Supplier Risk Assessment
    description:
      Implement a use-cased based supplier risk assessment framework to evaluate and monitor third-party entities'
      performance and adherence to content provenance standards and technologies to detect anomalies and unauthorized
      changes; services acquisition and value chain risk management; and legal compliance.
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0435_NIST2024
    name: Due Diligence Process Update
    description:
      "Update and integrate due diligence processes for GAI acquisition and procurement vendor assessments to include
      intellectual property, data privacy, security, and other risks. For example, update processes to: Address
      solutions that may rely on embedded GAI technologies; Address ongoing monitoring, assessments, and alerting,
      dynamic risk assessments, and real-time reporting tools for monitoring third-party GAI risks; Consider policy
      adjustments across GAI modeling libraries, tools and APIs, fine-tuned models, and embedded tools; Assess GAI
      vendors, open-source or proprietary GAI tools, or GAI service providers against incident or vulnerability
      databases."
    hasDocumentation:
      - NIST.AI.600-1
    type: Action
  - id: A0446_NIST2024
    name: Risk Measurement Planning
    description:
      "Document risk measurement plans to address identified risks. Plans may include, as applicable: Individual and
      group cognitive biases (e.g., confirmation bias, funding bias, groupthink) for AI Actors involved in the design,
